<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #070b12;
    font-family: 'VT323', monospace;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 30% 20%, #16243a 0%, #0a0f1a 55%, #06090f 100%);
  }
  #game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #0c1320;
    box-shadow: 0 0 0 2px #1d2c44, 0 20px 60px rgba(0,0,0,0.6);
    border-radius: 6px;
    touch-action: none;
  }
  /* Landscape prompt for mobile portrait */
  #rotate {
    position: fixed; inset: 0; z-index: 50;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0f1a; color: #cfe0ff; text-align: center; padding: 24px;
  }
  #rotate .ph { font-size: 64px; margin-bottom: 18px; animation: rot 2s ease-in-out infinite; }
  #rotate h2 { font-family: 'Press Start 2P', monospace; font-size: 16px; color: #ffd23f; margin-bottom: 14px; line-height: 1.6; }
  #rotate p { font-size: 22px; color: #9fb3c8; }
  @keyframes rot { 0%,100% { transform: rotate(0deg);} 50% { transform: rotate(90deg);} }
  #hint {
    position: fixed; bottom: 6px; left: 0; right: 0; text-align: center;
    color: #3f4d60; font-size: 15px; pointer-events: none; z-index: 5;
  }
  @media (pointer: coarse) { #hint { display: none; } }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="540"></canvas>
  </div>

  </div>

function resize() {
  const wrap = document.getElementById("wrap");
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const s = Math.min(w / VW, h / VH);
  canvas.style.width = (VW * s) + "px";
  canvas.style.height = (VH * s) + "px";
  const rect = canvas.getBoundingClientRect();
  scale = rect.width / VW;
  offX = rect.left; offY = rect.top;
  checkOrientation();
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));

const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
function checkOrientation() {
  const rot = document.getElementById("rotate");

// ----------------------------------------------------------------------------
// Persistence — window.storage (Claude artifacts) with localStorage fallback
// ----------------------------------------------------------------------------
const Persist = {
  async load(key, def) {
    try {
      if (window.storage && window.storage.get) {
        const r = await window.storage.get(key);
        return r && r.value ? JSON.parse(r.value) : def;
      }
    } catch (e) {}
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
    catch (e) {}
    return def;
  },
  async save(key, val) {
    const s = JSON.stringify(val);
    try { if (window.storage && window.storage.set) { await window.storage.set(key, s); return; } }
    catch (e) {}
    try { localStorage.setItem(key, s); } catch (e) {}
  }
};

// ----------------------------------------------------------------------------
// Tiny WebAudio SFX
// ----------------------------------------------------------------------------
const Audio2 = (() => {
  let ac = null, muted = false;
  function ensure() { if (!ac) { try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return ac; }
  function blip(freq, dur, type, vol) {
    if (muted) return; const a = ensure(); if (!a) return;
    try {
      const o = a.createOscillator(), g = a.createGain();
      o.type = type || "square"; o.frequency.value = freq;
      g.gain.value = (vol || 0.08);
      o.connect(g); g.connect(a.destination);
      const t = a.currentTime;
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur);
    } catch (e) {}
  }
  return {
    resume() { const a = ensure(); if (a && a.state === "suspended") a.resume(); },
    toggleMute() { muted = !muted; return muted; },
    isMuted() { return muted; },
    attack() { blip(420, 0.07, "square", 0.05); },
    special() { blip(620, 0.18, "sawtooth", 0.06); },
    dash() { blip(220, 0.1, "sine", 0.05); },
    hit() { blip(180, 0.06, "triangle", 0.05); },
    hurt() { blip(120, 0.18, "sawtooth", 0.09); },
    pickup() { blip(880, 0.08, "square", 0.05); },
    boon() { blip(660, 0.12, "triangle", 0.08); blip(990, 0.12, "triangle", 0.06); },
    die() { blip(160, 0.5, "sawtooth", 0.1); },
    boss() { blip(90, 0.6, "sawtooth", 0.1); },
    ui() { blip(520, 0.05, "square", 0.04); }
  };
})();

const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const dist = (ax, ay, bx, by) => Math.sqrt(dist2(ax, ay, bx, by));

  for (let i = uiButtons.length - 1; i >= 0; i--) {
    const b = uiButtons[i];
    if (vx >= b.x && vx <= b.x + b.w && vy >= b.y && vy <= b.y + b.h) {

    }
  }
  return false;
}

    swing: 0,            // melee swing animation timer
    swingDir: 1,

    // base stats with meta upgrades baked in

      maxHp: s.base.maxHp + u.tough * 22,

      atkDmg: s.base.atkDmg + u.power * 3,
      atkCd: s.base.atkCd,
      atkRange: s.base.atkRange,
      atkArc: s.base.atkArc,
      spDmg: s.base.spDmg * (1 + u.focus * 0.12),
      spCd: s.base.spCd,
      dashCd: 0.7 - u.agility * 0.06,
      dashIframe: 0.2,
    },
    // multiplicative / additive in-run modifiers from boons
    mods: {
      maxHp: 0, speed: 1, atkDmg: 1, atkCd: 1, spDmg: 1,
      crit: 0, lifesteal: 0, multishot: 0, dmgTaken: 1, greed: meta.upgrades.fortune * 0.15,

    boons: [],
  };
  p.heal = function (n) { this.hp = clamp(this.hp + n, 0, this.maxHp()); };
  p.maxHp = function () { return Math.round(this.base.maxHp + this.mods.maxHp); };
  p.spd = function () { return this.base.speed * this.mods.speed; };
  p.atkDamage = function () { return this.base.atkDmg * this.mods.atkDmg; };
  p.atkCooldown = function () { return this.base.atkCd * this.mods.atkCd; };
  p.spDamage = function () { return this.base.spDmg * this.mods.spDmg; };
  p.dashCooldown = function () { return this.base.dashCd * this.mods.dashCd; };
  p.dashIframes = function () { return this.base.dashIframe + this.mods.dashIframe; };
  p.hp = p.maxHp();
  return p;
}

function applyBoon(boon, rare) {
  boon.apply(player, rare ? 1.6 : 1);
  player.boons.push({ icon: boon.icon, color: boon.color, name: boon.name, rare: !!rare });
  Audio2.boon();
}

// ----------------------------------------------------------------------------
// Run / world management
// ----------------------------------------------------------------------------
function startRun() {
  player = makePlayer(selectedStarter);
  run = { world: 0, room: 0, roomsInWorld: randi(5, 7), stardust: 0, kills: 0, cleared: false, eliteRoom: false, pendingEliteBoon: null };
  enemies = []; projectiles = []; particles = []; pickups = []; floaters = []; gates = []; obstacles = [];
  meta.runs++;
  // head-start boons
  for (let i = 0; i < meta.upgrades.headstart; i++) applyBoon(pick(BOONS));
  state = STATE.PLAY;
  enterRoom();
  flash("WORLD 1 — " + WORLDS[0].short, WORLDS[0].accent);
}

function enterRoom() {
  enemies = []; projectiles = []; pickups = []; gates = [];
  particles = []; floaters = [];
  player.x = ARENA.x + 60; player.y = ARENA.cy;
  player.invuln = 1.0;
  run.cleared = false;
  if (player.mods.roomHeal > 0) player.heal(player.mods.roomHeal);

  const w = WORLDS[run.world];
  const isBoss = run.room >= run.roomsInWorld;
  genObstacles(w, isBoss || run.eliteRoom);
  if (isBoss) { spawnBoss(w); Audio2.boss(); flash("⚠ BOSS: " + BOSS_DEFS[w.boss].name, "#ff6a6a"); }
  else if (run.eliteRoom) { spawnElite(w); Audio2.boss(); flash("★ ELITE: " + ELITE_DEFS[w.elite].name, "#ffd95e"); }
  else spawnRoomEnemies(w);
}

function spawnElite(w) {
  const key = w.elite, d = ELITE_DEFS[key];
  const diff = difficulty();
  const hpScale = 0.85 + run.world * 0.12;
  enemies.push({
    type: key, name: d.name, elite: true,
    x: ARENA.cx, y: ARENA.y + 110, r: d.r,
    hp: Math.round(d.hp * hpScale), maxHp: Math.round(d.hp * hpScale),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: d.kind,
    color: d.color, color2: d.color2, accent: d.accent, sd: d.sd,
    touchCd: 0, touchCdMax: d.touchCd, shootCd: rand(0.4, d.shootCd || 1.5),
    shootCdMax: d.shootCd || 1.5, projSpeed: d.projSpeed || 3.5,
    burn: 0, hurtFlash: 0, bob: rand(0, 6), kb: { x: 0, y: 0 },
    chargeT: 0, charging: false, boss: false,
  });
  // a couple of minions to support the sub-boss
  const minions = 2 + run.world;
  for (let i = 0; i < minions; i++) spawnEnemy(pick(w.enemies), diff);
}

// ---- Obstacles -------------------------------------------------------------
function genObstacles(w, isBoss) {
  obstacles = [];
  const count = isBoss ? 2 : randi(3, 5);
  const startZone = { x: ARENA.x + 60, y: ARENA.cy }; // keep player spawn clear
  let tries = 0;
  while (obstacles.length < count && tries < 200) {
    tries++;
    const ow = rand(50, 92), oh = rand(46, 84);
    const ox = rand(ARENA.x + 40, ARENA.r - 110 - ow); // leave the right gate column clear
    const oy = rand(ARENA.y + 40, ARENA.b - 40 - oh);
    const cx = ox + ow / 2, cy = oy + oh / 2;
    // keep spawn area and arena center lanes navigable
    if (dist(cx, cy, startZone.x, startZone.y) < 150) continue;
    if (isBoss && dist(cx, cy, ARENA.cx, ARENA.cy) < 170) continue;
    let overlap = false;
    for (const o of obstacles) {
      if (ox < o.x + o.w + 28 && ox + ow + 28 > o.x && oy < o.y + o.h + 28 && oy + oh + 28 > o.y) { overlap = true; break; }
    }
    if (overlap) continue;
    obstacles.push({ x: ox, y: oy, w: ow, h: oh, seed: rand(0, 1000) });
  }
}

// Push a circular entity {x,y,r} out of any obstacle it overlaps.
function resolveObstacles(ent) {
  for (const o of obstacles) {
    const nx = clamp(ent.x, o.x, o.x + o.w);
    const ny = clamp(ent.y, o.y, o.y + o.h);
    let dx = ent.x - nx, dy = ent.y - ny;
    let d2 = dx * dx + dy * dy;
    if (d2 < ent.r * ent.r) {
      if (d2 > 0.0001) {
        const d = Math.sqrt(d2);
        ent.x = nx + (dx / d) * ent.r;
        ent.y = ny + (dy / d) * ent.r;
      } else {
        // center inside the rect: eject along the shallowest axis
        const left = ent.x - o.x, right = o.x + o.w - ent.x;
        const top = ent.y - o.y, bottom = o.y + o.h - ent.y;
        const m = Math.min(left, right, top, bottom);
        if (m === left) ent.x = o.x - ent.r;
        else if (m === right) ent.x = o.x + o.w + ent.r;
        else if (m === top) ent.y = o.y - ent.r;
        else ent.y = o.y + o.h + ent.r;
      }
    }
  }
}

function hitsObstacle(x, y, r) {
  for (const o of obstacles) {
    const nx = clamp(x, o.x, o.x + o.w), ny = clamp(y, o.y, o.y + o.h);
    const dx = x - nx, dy = y - ny;
    if (dx * dx + dy * dy < r * r) return true;
  }
  return false;
}

function difficulty() {
  // global difficulty grows slowly across rooms and worlds
  const w = WORLDS[run.world];
  const roomScale = 1 + run.room * 0.06;
  return { hp: w.hpMul * roomScale, dmg: w.dmgMul * (1 + run.room * 0.03) };
}

function spawnRoomEnemies(w) {
  const diff = difficulty();
  const count = clamp(3 + run.room + run.world, 3, 9);
  for (let i = 0; i < count; i++) {
    const type = pick(w.enemies);
    spawnEnemy(type, diff);
  }
}

function spawnEnemy(type, diff) {
  const d = ENEMY_DEFS[type];
  let x, y, tries = 0;
  do {
    x = rand(ARENA.x + 30, ARENA.r - 30);
    y = rand(ARENA.y + 30, ARENA.b - 30);
    tries++;
  } while ((dist(x, y, player.x, player.y) < 180 || hitsObstacle(x, y, d.r + 6)) && tries < 40);
  enemies.push({
    type, name: d.name, x, y, r: d.r,
    hp: Math.round(d.hp * diff.hp), maxHp: Math.round(d.hp * diff.hp),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: d.kind,
    color: d.color, color2: d.color2, sd: d.sd,
    touchCd: 0, touchCdMax: d.touchCd, shootCd: rand(0.5, d.shootCd || 2),
    shootCdMax: d.shootCd || 2, projSpeed: d.projSpeed || 3,
    burn: 0, hurtFlash: 0, bob: rand(0, 6), kb: { x: 0, y: 0 },
    chargeT: 0, charging: false, boss: false,
  });
}

function spawnBoss(w) {
  const d = BOSS_DEFS[w.boss];
  const diff = difficulty();
  enemies.push({
    type: w.boss, name: d.name, boss: true,
    x: ARENA.cx, y: ARENA.y + 120, r: d.r,
    hp: Math.round(d.hp * (0.8 + run.world * 0.1)), maxHp: Math.round(d.hp * (0.8 + run.world * 0.1)),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: "boss",
    color: d.color, color2: d.color2, accent: d.accent, sd: d.sd,
    touchCd: 0, touchCdMax: 0.8, burn: 0, hurtFlash: 0, bob: 0, kb: { x: 0, y: 0 },
    phase: 0, atkTimer: 1.5, atkIndex: 0, moveTimer: 0, tx: ARENA.cx, ty: ARENA.cy,
  });
}

function onRoomCleared() {
  run.cleared = true;
  let eliteJustCleared = false;
  // elite sub-boss reward: greater boon + full heal
  if (run.eliteRoom) {
    run.eliteRoom = false;
    eliteJustCleared = true;
    if (run.pendingEliteBoon) { applyBoon(run.pendingEliteBoon, true); run.pendingEliteBoon = null; }
    player.heal(player.maxHp());
    spawnParticles(player.x, player.y, "#ffd95e", 26);
    Audio2.boon();
  }
  if (run.room >= run.roomsInWorld) {
    // boss cleared -> next world or win
    bossCleared();
    return;
  }
  openGates();
  flash(eliteJustCleared ? "★ GREATER BOON GAINED!" : "ROOM CLEAR", eliteJustCleared ? "#ffd95e" : WORLDS[run.world].accent);
}

function openGates() {
  const n = randi(2, 3);
  const pool = BOONS.slice();
  // shuffle
  for (let i = pool.length - 1; i > 0; i--) { const j = randi(0, i); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  const chosen = pool.slice(0, n);
  gates = [];
  // Offer an ELITE gate at random — but only when the room it leads to is a
  // normal slot (so the boss room still comes afterward).
  const canElite = (run.room + 1) < run.roomsInWorld;
  const eliteIdx = (canElite && Math.random() < 0.5) ? randi(0, n - 1) : -1;
  const gapY = ARENA.h / (n + 1);
  for (let i = 0; i < n; i++) {
    gates.push({
      x: ARENA.r - 6, y: ARENA.y + gapY * (i + 1),
      w: 46, h: i === eliteIdx ? 92 : 76, boon: chosen[i], glow: 0,
      elite: i === eliteIdx,
    });
  }
}

function takeGate(gate) {
  gates = [];
  run.room++;
  if (gate.elite) {
    // Don't grant the boon yet — it's earned by clearing the sub-boss room.
    run.eliteRoom = true;
    run.pendingEliteBoon = gate.boon;
    enterRoom();
  } else {
    applyBoon(gate.boon);
    enterRoom();
  }
}

function bossCleared() {
  meta.bestWorld = Math.max(meta.bestWorld, run.world + 1);
  if (run.world >= WORLDS.length - 1) {
    // WIN
    endRun(true);
  } else {
    // Evolve! Each world boss advances the starter one evolution stage.
    evolvePlayer();
    run.world++;
    run.room = 0;
    run.roomsInWorld = randi(5, 7);
    enterRoom();
    flash("WORLD " + (run.world + 1) + " — " + WORLDS[run.world].short, WORLDS[run.world].accent);
  }
}

function evolvePlayer() {
  const evo = player.s.evo;
  if (!evo || player.evoStage >= evo.length - 1) return;
  player.evoStage++;
  player.evoAnim = 1.6;
  player.invuln = Math.max(player.invuln, 1.0);
  const name = evo[player.evoStage].name;
  flash("✦ EVOLVED INTO " + name.toUpperCase() + "!", "#ffe14d");
  spawnParticles(player.x, player.y, "#ffffff", 40);
  spawnParticles(player.x, player.y, evo[player.evoStage].color, 30);
  Audio2.boon(); Audio2.boss();
}

function endRun(won) {
  const earned = Math.round(run.stardust * (1 + meta.upgrades.fortune * 0.15));
  run.earned = earned;
  meta.stardust += earned;
  if (won) meta.wins++;
  shake = 0; timeScale = 1;
  state = won ? STATE.WIN : STATE.DEAD;
  if (won) Audio2.boss(); else Audio2.die();
  Persist.save("pokerogue_meta", meta); // fire-and-forget; state already updated
}

// ----------------------------------------------------------------------------
// Combat helpers
// ----------------------------------------------------------------------------
function flash(text, color) { flashMsg = { text, t: 1.8, color: color || "#fff" }; }

function floater(x, y, text, color, big) {
  floaters.push({ x, y, vy: -28, t: 0.9, text, color: color || "#fff", big: !!big });
}

function damageEnemy(e, amount, opts) {
  opts = opts || {};
  let dmg = amount;
  let crit = false;
  if (!opts.noCrit && Math.random() < player.mods.crit) { dmg *= 2; crit = true; }
  dmg = Math.round(dmg);
  e.hp -= dmg;
  e.hurtFlash = 0.12;
  floater(e.x, e.y - e.r - 6, dmg + (crit ? "!" : ""), crit ? "#ffe14d" : "#ffffff", crit || e.boss);
  if (player.mods.lifesteal > 0 && opts.melee) player.heal(dmg * player.mods.lifesteal);
  Audio2.hit();
  spawnParticles(e.x, e.y, e.color, crit ? 10 : 5);
  if (opts.knockback) { const a = Math.atan2(e.y - player.y, e.x - player.x); e.kb.x += Math.cos(a) * opts.knockback; e.kb.y += Math.sin(a) * opts.knockback; }
  if (player.mods.burn && opts.melee) e.burn = Math.max(e.burn, 2.2);
  if (e.hp <= 0) killEnemy(e);
}

function killEnemy(e) {
  e.dead = true;
  spawnParticles(e.x, e.y, e.color, e.boss ? 40 : e.elite ? 28 : 12);
  run.kills++;
  const sd = Math.round(e.sd * (1 + player.mods.greed));
  if (e.elite) {
    // sub-boss drops several stardust motes
    for (let i = 0; i < 4; i++) pickups.push({ x: e.x + rand(-20, 20), y: e.y + rand(-20, 20), r: 7, vy: 0, t: 0, value: Math.round(sd / 4), type: "stardust" });
  } else {
    pickups.push({ x: e.x, y: e.y, r: 7, vy: 0, t: 0, value: sd, type: "stardust" });
  }
  if (e.boss || e.elite) shake = e.boss ? 0.5 : 0.35;
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), sp = rand(0.5, 4);
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: rand(1.5, 4), t: rand(0.3, 0.7), color });
  }
}

function spawnProjectile(o) { projectiles.push(Object.assign({ r: 7, life: 2.5, pierce: false, hits: [], owner: "player", explode: false, burn: false }, o)); }

function hurtPlayer(amount) {
  if (player.invuln > 0 || player.dashing) return;
  let dmg = Math.round(amount * player.mods.dmgTaken);
  player.hp -= dmg;
  player.invuln = 0.6;
  player.hurtFlash = 0.3;
  shake = Math.max(shake, 0.35);
  Audio2.hurt();
  floater(player.x, player.y - player.r - 8, "-" + dmg, "#ff6a6a");
  if (player.hp <= 0) {
    if (player.revives > 0) { player.revives--; player.hp = Math.round(player.maxHp() * 0.5); player.invuln = 1.5; flash("REVIVED!", "#7df0a0"); spawnParticles(player.x, player.y, "#7df0a0", 30); }
    else { endRun(false); }
  }
}

// ----------------------------------------------------------------------------
// Player actions
// ----------------------------------------------------------------------------
function doAttack() {
  if (player.atkTimer > 0) return;
  player.atkTimer = player.atkCooldown();
  player.swing = 0.18;
  player.swingDir *= -1;
  player.atkFx = { t: 0.22, dur: 0.22, dir: player.facing };
  Audio2.attack();
  const range = player.base.atkRange, arc = player.base.atkArc;
  const dmg = player.atkDamage();
  for (const e of enemies) {
    const d = dist(player.x, player.y, e.x, e.y);
    if (d <= range + e.r) {
      const a = Math.atan2(e.y - player.y, e.x - player.x);
      if (Math.abs(angDiff(a, player.facing)) <= arc / 1.4) {
        damageEnemy(e, dmg, { melee: true, knockback: player.key === "squirtle" ? 8 : 3 });
      }
    }
  }
}

function doSpecial() {
  if (player.spTimer > 0) return;
  player.spTimer = player.base.spCd;
  Audio2.special();
  const dmg = player.spDamage();
  const type = player.s.special;
  const base = player.facing;
  const explode = player.mods.explode, pierce = player.mods.pierce;
  if (type === "fireball") {
    const n = 1 + player.mods.multishot;
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * 0.14;
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 6, vy: Math.sin(a) * 6, r: 11, dmg, life: 1.6, color: "#ff7a2c", trail: "#ffd27a", explode: true, burn: true, pierce, big: true });
    }
  } else if (type === "aqua") {
    const n = 3 + player.mods.multishot;
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * 0.22;
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 7, vy: Math.sin(a) * 7, r: 8, dmg, life: 1.3, color: "#56b0e0", trail: "#cfeefb", explode, pierce, knockback: 4 });
    }
  } else if (type === "leaf") {
    const n = 5 + player.mods.multishot;
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * 0.16;
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 7.5, vy: Math.sin(a) * 7.5, r: 7, dmg, life: 1.4, color: "#6fc28b", trail: "#d8f2c8", explode, pierce: true, leaf: true });
    }
  }
}

function doDash() {
  if (player.dashCdTimer > 0 || player.dashing) return;
  let dx = 0, dy = 0;
  if (keys["a"] || keys["arrowleft"]) dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;
  if (keys["w"] || keys["arrowup"]) dy -= 1;
  if (keys["s"] || keys["arrowdown"]) dy += 1;
  if (touch.move.active) { dx = touch.move.dx; dy = touch.move.dy; }
  if (dx === 0 && dy === 0) { dx = Math.cos(player.facing); dy = Math.sin(player.facing); }
  const m = Math.hypot(dx, dy) || 1;
  player.dashVx = dx / m; player.dashVy = dy / m;
  player.dashing = true;
  player.dashTimer = 0.16;
  player.dashCdTimer = player.dashCooldown();
  player.invuln = Math.max(player.invuln, player.dashIframes());
  Audio2.dash();
  spawnParticles(player.x, player.y, player.s.color2, 8);
}

// ----------------------------------------------------------------------------
// Update
// ----------------------------------------------------------------------------
function update(dt) {
  if (state !== STATE.PLAY) return;

  // timers
  if (shake > 0) shake = Math.max(0, shake - dt);
  if (flashMsg) { flashMsg.t -= dt; if (flashMsg.t <= 0) flashMsg = null; }

  const p = player;
  // motion factor: 1.0 at 60fps, 0.5 at 120fps, etc. (dt already clamped to 0.05 in loop)
  frameScale = clamp(dt * 60, 0.1, 3);
  p.bob += dt * 8;
  if (p.atkTimer > 0) p.atkTimer -= dt;
  if (p.spTimer > 0) p.spTimer -= dt;
  if (p.dashCdTimer > 0) p.dashCdTimer -= dt;
  if (p.invuln > 0) p.invuln -= dt;
  if (p.swing > 0) p.swing -= dt;
  if (p.atkFx && p.atkFx.t > 0) p.atkFx.t -= dt;
  if (p.evoAnim > 0) p.evoAnim -= dt;
  if (p.hurtFlash > 0) p.hurtFlash -= dt;

  // input -> movement
  let dx = 0, dy = 0;
  if (keys["a"] || keys["arrowleft"]) dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;
  if (keys["w"] || keys["arrowup"]) dy -= 1;
  if (keys["s"] || keys["arrowdown"]) dy += 1;
  if (touch.move.active) { dx = touch.move.dx; dy = touch.move.dy; }

  if (p.dashing) {
    p.dashTimer -= dt;
    const sp = 9.5 * frameScale * MOVE_SCALE;
    p.x += p.dashVx * sp;
    p.y += p.dashVy * sp;
    if (p.mods.dashTrail) {
      particles.push({ x: p.x, y: p.y, vx: 0, vy: 0, r: 10, t: 0.4, color: "#ff8c4d", trail: true, dmg: p.atkDamage() * 0.4 });
    }
    if (p.dashTimer <= 0) p.dashing = false;
  } else {
    const m = Math.hypot(dx, dy);
    if (m > 0) {
      const sp = p.spd() * frameScale * MOVE_SCALE;
      p.x += (dx / m) * sp;
      p.y += (dy / m) * sp;
      p.facing = Math.atan2(dy, dx);
    }
  }
  p.x = clamp(p.x, ARENA.x + p.r, ARENA.r - p.r);
  p.y = clamp(p.y, ARENA.y + p.r, ARENA.b - p.r);
  resolveObstacles(p);

  // actions (keyboard edge + touch edge)
  if (justPressed["j"] || touchEdge.attack) doAttack();
  if (justPressed["k"] || touchEdge.special) doSpecial();
  if (justPressed[" "] || touchEdge.dash) doDash();
  // dash trail damage
  for (const pt of particles) {
    if (pt.trail && pt.dmg) {
      for (const e of enemies) {
        if (!e.dead && dist(pt.x, pt.y, e.x, e.y) < e.r + pt.r) {
          if (!pt._hit) { pt._hit = {}; }
          if (!pt._hit[e.type + e.x.toFixed(0)]) { damageEnemy(e, pt.dmg, { noCrit: true }); pt.dmg = 0; }
        }
      }
    }
  }

  clearEdges();

  // update enemies
  for (const e of enemies) {
    if (e.dead) continue;
    updateEnemy(e, dt);
  }
  enemies = enemies.filter(e => !e.dead);

  // projectiles
  updateProjectiles(dt);

  // particles
  for (const pt of particles) { pt.x += pt.vx * frameScale; pt.y += pt.vy * frameScale; pt.vx *= Math.pow(0.92, frameScale); pt.vy *= Math.pow(0.92, frameScale); pt.t -= dt; }
  particles = particles.filter(pt => pt.t > 0);

  // pickups
  for (const pk of pickups) {
    pk.t += dt;
    const d = dist(pk.x, pk.y, p.x, p.y);
    if (d < 120) { const a = Math.atan2(p.y - pk.y, p.x - pk.x); pk.x += Math.cos(a) * 3.2 * frameScale; pk.y += Math.sin(a) * 3.2 * frameScale; }
    if (d < p.r + pk.r) { collectPickup(pk); pk.dead = true; }
  }
  pickups = pickups.filter(pk => !pk.dead);

  // floaters
  for (const f of floaters) { f.y += f.vy * dt; f.vy *= 0.94; f.t -= dt; }
  floaters = floaters.filter(f => f.t > 0);

  // room clear check
  if (!run.cleared && enemies.length === 0 && pickups.length === 0) {
    // small grace so the last drop can be grabbed; we check pickups too
    onRoomCleared();
  } else if (!run.cleared && enemies.length === 0 && gates.length === 0) {
    // enemies gone but pickups remain — open gates once pickups collected handled above
  }

  // gates
  for (const g of gates) {
    g.glow += dt;
    if (p.x + p.r > g.x && Math.abs(p.y - (g.y)) < g.h / 2 + 4) {
      takeGate(g);
      break;
    }
  }
}

function collectPickup(pk) {
  if (pk.type === "stardust") { run.stardust += pk.value; Audio2.pickup(); floater(pk.x, pk.y - 8, "+" + pk.value + "✦", "#ffd95e"); }
}

function updateEnemy(e, dt) {
  if (e.burn > 0) { e.burn -= dt; e._burnTick = (e._burnTick || 0) - dt; if (e._burnTick <= 0) { e._burnTick = 0.4; e.hp -= 3; floater(e.x, e.y - e.r, "3", "#ff8c4d"); spawnParticles(e.x, e.y, "#ff8c4d", 2); if (e.hp <= 0) { killEnemy(e); return; } } }
  if (e.hurtFlash > 0) e.hurtFlash -= dt;
  if (e.touchCd > 0) e.touchCd -= dt;
  e.bob += dt * 6;
  // knockback decay
  e.x += e.kb.x * frameScale; e.y += e.kb.y * frameScale;
  e.kb.x *= Math.pow(0.8, frameScale); e.kb.y *= Math.pow(0.8, frameScale);

  if (e.kind === "boss") { updateBoss(e, dt); }
  else {
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    const d = dist(e.x, e.y, player.x, player.y);
    const es = e.speed * frameScale * MOVE_SCALE;
    if (e.kind === "rusher" || e.kind === "tank") {
      e.x += Math.cos(a) * es; e.y += Math.sin(a) * es;
    } else if (e.kind === "charger") {
      // wind up then dash
      if (!e.charging && d < 280) { e.charging = true; e.chargeT = 0.5; e.chargeA = a; }
      if (e.charging) {
        e.chargeT -= dt;
        if (e.chargeT > 0.2) { /* windup, slow */ e.x += Math.cos(a) * es * 0.2; e.y += Math.sin(a) * es * 0.2; }
        else { e.x += Math.cos(e.chargeA) * es * 1.8; e.y += Math.sin(e.chargeA) * es * 1.8; }
        if (e.chargeT <= -0.25) e.charging = false;
      } else { e.x += Math.cos(a) * es * 0.6; e.y += Math.sin(a) * es * 0.6; }
    } else if (e.kind === "shooter") {
      // keep distance
      if (d < 200) { e.x -= Math.cos(a) * es; e.y -= Math.sin(a) * es; }
      else if (d > 300) { e.x += Math.cos(a) * es; e.y += Math.sin(a) * es; }
      e.shootCd -= dt;
      if (e.shootCd <= 0) {
        e.shootCd = e.shootCdMax;
        projectiles.push({ x: e.x, y: e.y, vx: Math.cos(a) * e.projSpeed, vy: Math.sin(a) * e.projSpeed, r: 8, dmg: e.dmg, life: 3, color: e.color2, owner: "enemy", trail: e.color });
      }
    }
  }
  // bounds
  e.x = clamp(e.x, ARENA.x + e.r, ARENA.r - e.r);
  e.y = clamp(e.y, ARENA.y + e.r, ARENA.b - e.r);
  resolveObstacles(e);

  // contact damage
  if (e.touchCd <= 0 && dist(e.x, e.y, player.x, player.y) < e.r + player.r) {
    hurtPlayer(e.dmg); e.touchCd = e.touchCdMax;
  }
}

function updateBoss(e, dt) {
  e.atkTimer -= dt;
  e.moveTimer -= dt;
  const a = Math.atan2(player.y - e.y, player.x - e.x);
  // hover-move toward a target point, keeping mid distance
  if (e.moveTimer <= 0) { e.moveTimer = rand(1.2, 2.2); e.tx = rand(ARENA.x + 120, ARENA.r - 120); e.ty = rand(ARENA.y + 100, ARENA.cy + 40); }
  const ta = Math.atan2(e.ty - e.y, e.tx - e.x);
  if (dist(e.x, e.y, e.tx, e.ty) > 10) { const bs = e.speed * frameScale * MOVE_SCALE; e.x += Math.cos(ta) * bs; e.y += Math.sin(ta) * bs; }
  e.x = clamp(e.x, ARENA.x + e.r, ARENA.r - e.r);
  e.y = clamp(e.y, ARENA.y + e.r, ARENA.b - e.r);

  const hpFrac = e.hp / e.maxHp;
  const enraged = hpFrac < 0.5;
  if (e.atkTimer <= 0) {
    e.atkIndex = (e.atkIndex + 1) % 3;
    if (e.type === "butterfree") bossAttackSpread(e, a, enraged ? 12 : 8, 4);
    else if (e.type === "golbat") {
      if (e.atkIndex === 0) bossAttackSpread(e, a, enraged ? 16 : 10, 3.6);
      else bossAttackAimed(e, a, 3, 5);
    } else { // golem
      if (e.atkIndex === 0) bossAttackSpread(e, a, enraged ? 20 : 14, 4.5);
      else if (e.atkIndex === 1) bossAttackRing(e, enraged ? 16 : 12, 3.4);
      else bossAttackAimed(e, a, 5, 6);
    }
    e.atkTimer = enraged ? rand(0.9, 1.4) : rand(1.4, 2.0);
  }
  if (e.touchCd <= 0 && dist(e.x, e.y, player.x, player.y) < e.r + player.r) {
    hurtPlayer(e.dmg); e.touchCd = e.touchCdMax;
  }
}
function bossProj(e, a, sp) {
  projectiles.push({ x: e.x, y: e.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 10, dmg: e.dmg, life: 4, color: e.accent, owner: "enemy", trail: e.color });
}
function bossAttackSpread(e, a, count, sp) { const spread = 0.9; for (let i = 0; i < count; i++) { const ang = a - spread / 2 + spread * (i / (count - 1)); bossProj(e, ang, sp); } }

function bossAttackAimed(e, a, count, sp) {
  // Fire a straight stream in ONE locked direction (snapshot at volley start) — no homing.
  for (let i = 0; i < count; i++) {
    setTimeout(() => { if (!e.dead && state === STATE.PLAY) bossProj(e, a, sp); }, i * 110);
  }
}

function updateProjectiles(dt) {
  for (const pr of projectiles) {
    pr.x += pr.vx * frameScale; pr.y += pr.vy * frameScale; pr.life -= dt;
    if (pr.trail) particles.push({ x: pr.x, y: pr.y, vx: 0, vy: 0, r: pr.r * 0.6, t: 0.25, color: typeof pr.trail === "string" ? pr.trail : pr.color });
    // out of bounds
    if (pr.x < ARENA.x || pr.x > ARENA.r || pr.y < ARENA.y || pr.y > ARENA.b) {
      if (pr.owner === "player" && pr.explode) explode(pr); pr.dead = true; continue;
    }
    // blocked by obstacles
    if (hitsObstacle(pr.x, pr.y, pr.r)) {
      if (pr.owner === "player" && pr.explode) explode(pr);
      spawnParticles(pr.x, pr.y, pr.color, 4);
      pr.dead = true; continue;
    }
    pr.life <= 0 && (pr.dead = true);
    if (pr.owner === "player") {
      for (const e of enemies) {
        if (e.dead) continue;
        if (pr.hits.includes(e)) continue;
        if (dist(pr.x, pr.y, e.x, e.y) < pr.r + e.r) {
          damageEnemy(e, pr.dmg, { knockback: pr.knockback || 0 });
          if (pr.burn) e.burn = Math.max(e.burn, 2.2);
          pr.hits.push(e);
          if (pr.explode) { explode(pr); pr.dead = true; break; }
          if (!pr.pierce) { pr.dead = true; break; }
        }
      }
    } else {
      if (dist(pr.x, pr.y, player.x, player.y) < pr.r + player.r) { hurtPlayer(pr.dmg); pr.dead = true; }
    }
  }
  projectiles = projectiles.filter(pr => !pr.dead);
}

function explode(pr) {
  spawnParticles(pr.x, pr.y, pr.color, 16);
  shake = Math.max(shake, 0.15);
  const R = 60;
  for (const e of enemies) { if (!e.dead && dist(pr.x, pr.y, e.x, e.y) < R + e.r) damageEnemy(e, pr.dmg * 0.6, { noCrit: true }); }
}

function clearEdges() { for (const k in justPressed) justPressed[k] = false; touchEdge.attack = touchEdge.special = touchEdge.dash = false; }

// ----------------------------------------------------------------------------
// Rendering
// ----------------------------------------------------------------------------
const FONT = "'VT323', monospace";
const FONTH = "'Press Start 2P', monospace";

function setFont(size, head) { ctx.font = (head ? "" : "") + size + "px " + (head ? FONTH : FONT); }

function render() {
  ctx.save();
  // screen shake — only while actively playing (never on win/dead/menus)
  if (shake > 0 && (state === STATE.PLAY || state === STATE.PAUSE)) {
    ctx.translate(rand(-shake, shake) * 8, rand(-shake, shake) * 8);
  }

  if (state === STATE.TITLE) renderTitle();
  else if (state === STATE.HUB) renderHub();
  else if (state === STATE.PLAY || state === STATE.PAUSE) { renderPlay(); if (state === STATE.PAUSE) renderPause(); }
  else if (state === STATE.DEAD) { renderPlay(); renderDead(); }
  else if (state === STATE.WIN) renderWin();

  ctx.restore();
}

// ---- Backgrounds ----
function bgGradient(top, bottom) {
  const g = ctx.createLinearGradient(0, 0, 0, VH);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  ctx.fillStyle = g; ctx.fillRect(0, 0, VW, VH);
}

function renderPlay() {
  const w = WORLDS[run.world];
  // sky/backdrop
  bgGradient(shade(w.sky, 1.1), w.sky);
  // arena floor
  drawArena(w);
  // entities sorted by y
  const ents = [];
  for (const pk of pickups) ents.push({ y: pk.y, draw: () => drawPickup(pk) });
  for (const o of obstacles) ents.push({ y: o.y + o.h, draw: () => drawObstacle(o, w) });
  for (const e of enemies) ents.push({ y: e.y, draw: () => drawEnemy(e) });
  ents.push({ y: player.y, draw: () => drawPlayer() });
  ents.sort((a, b) => a.y - b.y);
  // ground particles below
  for (const pt of particles) drawParticle(pt);
  for (const e of ents) e.draw();
  for (const pr of projectiles) drawProjectile(pr);
  // gates
  for (const g of gates) drawGate(g);
  // floaters
  for (const f of floaters) drawFloater(f);

  // fog overlay
  if (w.fog && w.fog !== "rgba(40,90,55,0.0)") { ctx.fillStyle = w.fog; ctx.fillRect(0, 0, VW, VH); }

  drawHUD();
  if (flashMsg) drawFlash();
  if (isTouch) drawTouchControls();
}

function drawArena(w) {
  // checker floor
  const tile = 60;
  for (let y = ARENA.y; y < ARENA.b; y += tile) {
    for (let x = ARENA.x; x < ARENA.r; x += tile) {
      const odd = ((Math.floor((x - ARENA.x) / tile) + Math.floor((y - ARENA.y) / tile)) % 2) === 0;
      ctx.fillStyle = odd ? w.ground : w.ground2;
      ctx.fillRect(x, y, Math.min(tile, ARENA.r - x), Math.min(tile, ARENA.b - y));
    }
  }
  // decorations
  drawDeco(w);
  // border frame
  ctx.lineWidth = 6; ctx.strokeStyle = shade(w.ground, 0.6);
  ctx.strokeRect(ARENA.x, ARENA.y, ARENA.w, ARENA.h);
  ctx.lineWidth = 2; ctx.strokeStyle = shade(w.accent, 0.8);
  ctx.strokeRect(ARENA.x + 3, ARENA.y + 3, ARENA.w - 6, ARENA.h - 6);
  // vignette
  const vg = ctx.createRadialGradient(VW / 2, VH / 2, VH * 0.3, VW / 2, VH / 2, VH * 0.8);
  vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(0,0,0,0.35)");
  ctx.fillStyle = vg; ctx.fillRect(0, 0, VW, VH);
}

let decoCache = null, decoWorld = -1, decoRoom = -1;
function drawDeco(w) {
  if (decoWorld !== run.world || decoRoom !== run.room) {
    decoWorld = run.world; decoRoom = run.room; decoCache = [];
    for (let i = 0; i < 22; i++) decoCache.push({ x: rand(ARENA.x + 20, ARENA.r - 20), y: rand(ARENA.y + 20, ARENA.b - 20), s: rand(0.7, 1.4), rot: rand(0, 6.28) });
  }
  for (const d of decoCache) {
    ctx.save(); ctx.translate(d.x, d.y); ctx.scale(d.s, d.s);
    if (w.deco === "grass") {
      ctx.strokeStyle = shade(w.ground, 1.4); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, 4); ctx.quadraticCurveTo(-3, -4, -5, -8); ctx.moveTo(0, 4); ctx.quadraticCurveTo(0, -5, 0, -10); ctx.moveTo(0, 4); ctx.quadraticCurveTo(3, -4, 5, -8); ctx.stroke();
    } else if (w.deco === "rock") {
      ctx.fillStyle = shade(w.ground, 0.7); ctx.beginPath(); ctx.moveTo(-6, 4); ctx.lineTo(-3, -5); ctx.lineTo(4, -4); ctx.lineTo(6, 4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(168,120,255,0.25)"; ctx.fillRect(-1, -3, 2, 4);
    } else if (w.deco === "snow") {
      ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, 6.28); ctx.fill();
      ctx.fillStyle = shade(w.ground, 0.8); ctx.beginPath(); ctx.moveTo(-5, 5); ctx.lineTo(0, -6); ctx.lineTo(5, 5); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

function shade(hex, f) {
  const c = hex.replace("#", "");
  let r = parseInt(c.substr(0, 2), 16), g = parseInt(c.substr(2, 2), 16), b = parseInt(c.substr(4, 2), 16);
  r = clamp(Math.round(r * f), 0, 255); g = clamp(Math.round(g * f), 0, 255); b = clamp(Math.round(b * f), 0, 255);
  return "rgb(" + r + "," + g + "," + b + ")";
}

// ---- Creatures ----
function drawShadow(x, y, r) { ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.beginPath(); ctx.ellipse(x, y + r * 0.7, r * 0.9, r * 0.4, 0, 0, 6.28); ctx.fill(); }

function drawObstacle(o, w) {
  const x = o.x, y = o.y, ww = o.w, hh = o.h;
  // ground shadow
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath(); ctx.ellipse(x + ww / 2, y + hh - 4, ww * 0.55, hh * 0.22, 0, 0, 6.28); ctx.fill();
  if (w.deco === "grass") {
    // leafy bush: clustered blobs
    const base = "#3f8f55", dark = "#2f6f40", light = "#6fc07f";
    ctx.fillStyle = dark; roundRect(x, y + hh * 0.45, ww, hh * 0.5, 10); ctx.fill();
    const blobs = [[0.28, 0.42, 0.34], [0.62, 0.36, 0.4], [0.45, 0.62, 0.42], [0.78, 0.62, 0.3], [0.2, 0.66, 0.3]];
    for (const b of blobs) { ctx.fillStyle = base; ctx.beginPath(); ctx.arc(x + ww * b[0], y + hh * b[1], Math.min(ww, hh) * b[2], 0, 6.28); ctx.fill(); }
    ctx.fillStyle = light;
    ctx.beginPath(); ctx.arc(x + ww * 0.4, y + hh * 0.4, Math.min(ww, hh) * 0.18, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x + ww * 0.66, y + hh * 0.5, Math.min(ww, hh) * 0.13, 0, 6.28); ctx.fill();
  } else if (w.deco === "rock") {
    // jagged boulder with crystal
    ctx.fillStyle = "#5a5060"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.1, y + hh); ctx.lineTo(x, y + hh * 0.45); ctx.lineTo(x + ww * 0.3, y + hh * 0.12);
    ctx.lineTo(x + ww * 0.72, y + hh * 0.05); ctx.lineTo(x + ww, y + hh * 0.5); ctx.lineTo(x + ww * 0.9, y + hh);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#6e6276"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.3, y + hh * 0.12); ctx.lineTo(x + ww * 0.72, y + hh * 0.05); ctx.lineTo(x + ww * 0.6, y + hh * 0.5);
    ctx.lineTo(x + ww * 0.28, y + hh * 0.55); ctx.closePath(); ctx.fill();
    // crystal accent
    ctx.fillStyle = "rgba(168,120,255,0.85)"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.5, y + hh * 0.3); ctx.lineTo(x + ww * 0.58, y + hh * 0.58); ctx.lineTo(x + ww * 0.46, y + hh * 0.66);
    ctx.lineTo(x + ww * 0.4, y + hh * 0.42); ctx.closePath(); ctx.fill();
  } else {
    // snow-capped ice block
    ctx.fillStyle = "#7f99b3"; roundRect(x, y + hh * 0.25, ww, hh * 0.72, 8); ctx.fill();
    ctx.fillStyle = "#9fb8d2"; roundRect(x + 4, y + hh * 0.3, ww - 8, hh * 0.5, 6); ctx.fill();
    ctx.fillStyle = "#eaf4ff"; ctx.beginPath();
    ctx.moveTo(x, y + hh * 0.34); ctx.quadraticCurveTo(x + ww * 0.25, y + hh * 0.12, x + ww * 0.5, y + hh * 0.24);
    ctx.quadraticCurveTo(x + ww * 0.75, y + hh * 0.12, x + ww, y + hh * 0.34);
    ctx.lineTo(x + ww, y + hh * 0.44); ctx.quadraticCurveTo(x + ww * 0.5, y + hh * 0.3, x, y + hh * 0.44);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.35)"; roundRect(x + ww * 0.12, y + hh * 0.4, ww * 0.16, hh * 0.4, 4); ctx.fill();
  }
}

function drawPlayer() {
  const p = player;
  const bobY = Math.sin(p.bob) * 2;
  const x = p.x, y = p.y + bobY;
  drawShadow(p.x, p.y, p.r);
  // dash ghost
  if (p.dashing) { ctx.globalAlpha = 0.4; }
  const blink = p.invuln > 0 && Math.floor(p.invuln * 20) % 2 === 0;
  if (blink && !p.dashing) ctx.globalAlpha = 0.5;
  ctx.save();
  ctx.translate(x, y);
  const flip = Math.cos(p.facing) < 0 ? -1 : 1;
  ctx.scale(flip, 1);
  // slight size growth with evolution stage
  const evoScale = 1 + p.evoStage * 0.12;
  ctx.scale(evoScale, evoScale);
  // evolution flash: brief bright pulse + expanding ring
  let evoFlash = false;
  if (p.evoAnim > 0) {
    const a = p.evoAnim / 1.6;
    if (Math.floor(p.evoAnim * 12) % 2 === 0) evoFlash = true;
  }
  drawStarterBody(p.key, p.r, p.hurtFlash > 0 || evoFlash, p.evoStage);
  ctx.restore();
  ctx.globalAlpha = 1;

  // evolution shockwave ring (drawn in world space, unflipped)
  if (p.evoAnim > 0) {
    const prog = 1 - (p.evoAnim / 1.6);
    ctx.save();
    ctx.globalAlpha = clamp(1 - prog, 0, 1) * 0.8;
    ctx.strokeStyle = "#ffe14d"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r + prog * 70, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = 1; ctx.restore();
  }

  // themed attack burst
  if (p.atkFx && p.atkFx.t > 0) drawAttackFx(p);
}

function drawAttackFx(p) {
  const fx = p.atkFx;
  const prog = 1 - clamp(fx.t / fx.dur, 0, 1); // 0..1
  const range = p.base.atkRange, arc = p.base.atkArc;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(fx.dir);
  if (p.key === "charmander") {
    // FIRE — expanding flame cone
    const reach = range * (0.55 + prog * 0.55);
    const fade = 1 - prog;
    ctx.globalAlpha = 0.85 * fade;
    // outer cone
    const grad = ctx.createLinearGradient(0, 0, reach, 0);
    grad.addColorStop(0, "rgba(255,210,80,0.95)");
    grad.addColorStop(0.5, "rgba(255,120,40,0.9)");
    grad.addColorStop(1, "rgba(220,60,20,0.1)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.arc(0, 0, reach, -arc / 2, arc / 2); ctx.closePath(); ctx.fill();
    // flickering flame tongues
    ctx.globalAlpha = fade;
    for (let i = -2; i <= 2; i++) {
      const a = (i / 2) * (arc / 2) * 0.8;
      const fr = reach * (0.7 + Math.random() * 0.4);
      ctx.fillStyle = i % 2 ? "#ffd24d" : "#ff7a2a";
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * reach * 0.4, Math.sin(a) * reach * 0.4);
      ctx.quadraticCurveTo(Math.cos(a - 0.1) * fr, Math.sin(a - 0.1) * fr, Math.cos(a) * fr, Math.sin(a) * fr);
      ctx.quadraticCurveTo(Math.cos(a + 0.1) * fr, Math.sin(a + 0.1) * fr, Math.cos(a) * reach * 0.4, Math.sin(a) * reach * 0.4);
      ctx.fill();
    }
  } else if (p.key === "squirtle") {
    // WATER GUN — focused forward jet
    const reach = range * (0.4 + prog * 0.85);
    const fade = 1 - prog;
    ctx.globalAlpha = 0.9 * fade;
    const grad = ctx.createLinearGradient(0, 0, reach, 0);
    grad.addColorStop(0, "rgba(255,255,255,0.95)");
    grad.addColorStop(0.4, "rgba(120,200,240,0.9)");
    grad.addColorStop(1, "rgba(60,140,210,0.05)");
    ctx.fillStyle = grad;
    const halfW = 7 + prog * 4;
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.quadraticCurveTo(reach * 0.5, -halfW, reach, -halfW * 0.5);
    ctx.lineTo(reach, halfW * 0.5);
    ctx.quadraticCurveTo(reach * 0.5, halfW, 0, 6);
    ctx.closePath(); ctx.fill();
    // droplets at the tip
    for (let i = 0; i < 4; i++) {
      const a = rand(-0.25, 0.25);
      const rr = reach * rand(0.8, 1.05);
      ctx.fillStyle = "rgba(200,235,255,0.9)";
      ctx.beginPath(); ctx.arc(Math.cos(a) * rr, Math.sin(a) * rr, rand(2, 4), 0, 6.28); ctx.fill();
    }
  } else {
    // BULBASAUR — sweeping tail whip
    const fade = 1 - prog;
    const sweep = arc * 1.1;
    const ang = -sweep / 2 + sweep * prog; // sweeps across
    const reach = range * 0.95;
    ctx.globalAlpha = 0.85 * fade;
    // motion trail (a few fading arcs behind the sweep)
    for (let k = 0; k < 3; k++) {
      const pa = ang - k * 0.18 * p.swingDir;
      ctx.globalAlpha = (0.5 - k * 0.13) * fade;
      ctx.strokeStyle = k === 0 ? "#d8f2c8" : "#6fc28b";
      ctx.lineWidth = 6 - k * 1.5;
      ctx.beginPath(); ctx.arc(0, 0, reach * (0.7 + k * 0.05), pa - 0.5, pa + 0.5); ctx.stroke();
    }
    // the tail itself (a tapering green whip)
    ctx.globalAlpha = fade;
    ctx.strokeStyle = "#5aa86f"; ctx.lineWidth = 7; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(Math.cos(ang) * reach * 0.5, Math.sin(ang) * reach * 0.5,
                         Math.cos(ang) * reach, Math.sin(ang) * reach);
    ctx.stroke();
    // leafy tip
    ctx.fillStyle = "#7ec48f";
    ctx.beginPath(); ctx.ellipse(Math.cos(ang) * reach, Math.sin(ang) * reach, 9, 5, ang, 0, 6.28); ctx.fill();
    ctx.lineCap = "butt";
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawStarterBody(key, r, hurt, stage) {
  stage = stage || 0;
  const fn = STARTER_SPRITES[key] && STARTER_SPRITES[key][stage];
  if (fn) fn(r, hurt);
  else drawCharmander(r, hurt); // fallback
}

function drawCharizard(r, hurt) {
  const s = STARTERS.charmander, body = hurt ? "#fff" : s.evo[2].color, belly = hurt ? "#fff" : s.evo[2].color2;
  const flap = Math.sin(Date.now() / 220) * 0.25;

  ctx.save();
  ctx.fillStyle = hurt ? "#fff" : "#3aa0a8";
  for (const sgn of [-1, 1]) {
    ctx.save(); ctx.scale(1, 1); ctx.rotate(0);
    ctx.beginPath();
    ctx.moveTo(-r * 0.2, -r * 0.3);
    ctx.quadraticCurveTo(-r * 1.5, -r * 1.3 + sgn * r * 0.2 - flap * r, -r * 1.9, -r * 0.2 + sgn * r * 0.3);
    ctx.quadraticCurveTo(-r * 1.2, -r * 0.2, -r * 0.9, r * 0.3);
    ctx.quadraticCurveTo(-r * 0.6, 0, -r * 0.2, -r * 0.3);
    ctx.closePath(); ctx.fill();
    break; // single composite wing mass (behind), keeps it readable top-down
  }
  ctx.restore();
  // big wing on the visible side
  ctx.fillStyle = hurt ? "#fff" : "#3aa0a8";
  ctx.beginPath();
  ctx.moveTo(-r * 0.1, -r * 0.2);
  ctx.quadraticCurveTo(-r * 1.4, -r * 1.5 - flap * r * 2, -r * 2.0, -r * 0.6);
  ctx.quadraticCurveTo(-r * 1.3, -r * 0.5, -r * 1.5, r * 0.2);
  ctx.quadraticCurveTo(-r * 0.7, -r * 0.1, -r * 0.1, -r * 0.2);
  ctx.closePath(); ctx.fill();
  // tail with large flame (to the side)
  ctx.fillStyle = hurt ? "#fff" : shade(body, 0.85);
  ctx.beginPath(); ctx.moveTo(r * 0.4, r * 0.4); ctx.quadraticCurveTo(r * 1.5, r * 0.7, r * 1.7, -r * 0.2); ctx.lineTo(r * 1.4, -r * 0.3); ctx.quadraticCurveTo(r * 1.2, r * 0.4, r * 0.3, r * 0.65); ctx.closePath(); ctx.fill();
  const fl = Math.sin(Date.now() / 70) * 3;
  ctx.fillStyle = "#ff5a1a"; ctx.beginPath(); ctx.moveTo(r * 1.7, -r * 0.2); ctx.quadraticCurveTo(r * 2.15, -r * 0.9 - fl, r * 1.6, -r * 1.2 - fl); ctx.quadraticCurveTo(r * 1.45, -r * 0.6, r * 1.55, -r * 0.2); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#ffd24d"; ctx.beginPath(); ctx.ellipse(r * 1.68, -r * 0.7 - fl, r * 0.12, r * 0.32, 0, 0, 6.28); ctx.fill();
  // body (tall, powerful)
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, 0, r * 0.85, r * 1.15, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(r * 0.2, r * 0.25, r * 0.5, r * 0.7, 0, 0, 6.28); ctx.fill();
  // head with two horns
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(r * 0.4, -r * 0.7, r * 0.58, 0, 6.28); ctx.fill();
  ctx.fillStyle = hurt ? "#fff" : shade(body, 0.8);
  ctx.beginPath(); ctx.moveTo(r * 0.15, -r * 1.0); ctx.lineTo(-r * 0.25, -r * 1.5); ctx.lineTo(r * 0.3, -r * 1.05); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.5, -r * 1.0); ctx.lineTo(r * 0.55, -r * 1.55); ctx.lineTo(r * 0.7, -r * 1.0); ctx.closePath(); ctx.fill();
  // snout + eyes
  ctx.fillStyle = "#1a1a22";
  ctx.beginPath(); ctx.arc(r * 0.62, -r * 0.78, r * 0.12, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.22, -r * 0.82, r * 0.1, 0, 6.28); ctx.fill();
  ctx.strokeStyle = "#1a1a22"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(r * 0.45, -r * 1.02); ctx.lineTo(r * 0.8, -r * 0.9); ctx.stroke();

  ctx.fillStyle = "#f4ead0";
  ctx.beginPath(); ctx.ellipse(-r * 0.2, r * 1.05, r * 0.27, r * 0.16, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.5, r * 1.05, r * 0.27, r * 0.16, 0, 0, 6.28); ctx.fill();
}

  ctx.beginPath(); ctx.arc(r * 0.1, r * 0.2, r * 0.17, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.5, r * 0.45, r * 0.12, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  // red eyes (Venusaur)
  ctx.fillStyle = "#1a1a22";
  ctx.beginPath(); ctx.arc(r * 0.62, -r * 0.52, r * 0.13, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.2, -r * 0.56, r * 0.12, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#d94a4a";
  ctx.beginPath(); ctx.arc(r * 0.62, -r * 0.52, r * 0.05, 0, 6.28); ctx.fill();
  // sturdy legs
  ctx.fillStyle = shade(s.color, 0.8);
  ctx.beginPath(); ctx.ellipse(-r * 0.2, r * 1.0, r * 0.3, r * 0.2, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.5, r * 1.0, r * 0.3, r * 0.2, 0, 0, 6.28); ctx.fill();
}

const STARTER_SPRITES = {
  charmander: [drawCharmander, drawCharmeleon, drawCharizard],
  squirtle:   [drawSquirtle, drawWartortle, drawBlastoise],
  bulbasaur:  [drawBulbasaur, drawIvysaur, drawVenusaur],
};

function drawEnemy(e) {
  drawShadow(e.x, e.y, e.r);
  const bobY = Math.sin(e.bob) * 2;
  const x = e.x, y = e.y + bobY;
  const flash = e.hurtFlash > 0;
  ctx.save(); ctx.translate(x, y);
  if (e.boss) drawBoss(e, flash);
  else if (e.elite) {
    const fn = ELITE_SPRITES[e.type] || drawGenericCritter;
    fn(e, flash);
    if (e.charging && e.chargeT > 0.2) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(0, 0, e.r + 6, 0, 6.28); ctx.stroke(); ctx.globalAlpha = 1; }
    if (e.burn > 0) { ctx.fillStyle = "rgba(255,120,40,0.6)"; ctx.beginPath(); ctx.arc(0, -e.r - 2, 4, 0, 6.28); ctx.fill(); }
  }
  else {
    const fn = ENEMY_SPRITES[e.type] || drawGenericCritter;
    fn(e, flash);
    // charger windup glow
    if (e.charging && e.chargeT > 0.2) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(0, 0, e.r + 4, 0, 6.28); ctx.stroke(); ctx.globalAlpha = 1; }
    if (e.burn > 0) { ctx.fillStyle = "rgba(255,120,40,0.6)"; ctx.beginPath(); ctx.arc(0, -e.r - 2, 3, 0, 6.28); ctx.fill(); }
  }
  ctx.restore();
  // hp bar (small enemies only; boss & elite use the big bar)
  if (e.hp < e.maxHp && !e.boss && !e.elite) {
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2, 4);
    ctx.fillStyle = "#ff5d5d"; ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2 * (e.hp / e.maxHp), 4);
  }
}

// tiny eye helper: white sclera + dark pupil
function eye(ex, ey, er, look) {
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ex, ey, er, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#15151c"; ctx.beginPath(); ctx.arc(ex + (look || 0), ey, er * 0.5, 0, 6.28); ctx.fill();
}

function drawGenericCritter(e, flash) {
  const r = e.r;
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.arc(0, r * 0.3, r * 0.6, 0, 6.28); ctx.fill();
  eye(-r * 0.3, -r * 0.2, r * 0.16); eye(r * 0.3, -r * 0.2, r * 0.16);
}

// ---- World 1 ----
function drawCaterpie(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // tail segments behind
  ctx.fillStyle = dk;
  ctx.beginPath(); ctx.arc(-r * 0.85, r * 0.15, r * 0.5, 0, 6.28); ctx.fill();
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(-r * 0.3, r * 0.1, r * 0.68, 0, 6.28); ctx.fill();
  // yellow ring band
  ctx.fillStyle = flash ? "#fff" : "#f4d35e";
  ctx.beginPath(); ctx.ellipse(r * 0.12, r * 0.28, r * 0.5, r * 0.26, 0, 0, 6.28); ctx.fill();
  // head
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(r * 0.5, -r * 0.18, r * 0.78, 0, 6.28); ctx.fill();
  // red antenna
  ctx.strokeStyle = flash ? "#fff" : "#e0524d"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(r * 0.45, -r * 0.78); ctx.lineTo(r * 0.6, -r * 1.2); ctx.stroke();
  ctx.fillStyle = flash ? "#fff" : "#e0524d"; ctx.beginPath(); ctx.arc(r * 0.63, -r * 1.25, r * 0.16, 0, 6.28); ctx.fill();
  // big eye
  eye(r * 0.78, -r * 0.22, r * 0.3, r * 0.08);
}

function drawRattata(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // tail (long, curly)
  ctx.strokeStyle = dk; ctx.lineWidth = 3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-r * 0.7, r * 0.2); ctx.quadraticCurveTo(-r * 1.6, r * 0.1, -r * 1.3, -r * 0.6); ctx.stroke();
  ctx.lineCap = "butt";
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(-r * 0.1, r * 0.05, r * 0.9, r * 0.75, 0, 0, 6.28); ctx.fill();
  // belly
  ctx.fillStyle = flash ? "#fff" : "#f0eae0"; ctx.beginPath(); ctx.ellipse(0, r * 0.35, r * 0.5, r * 0.4, 0, 0, 6.28); ctx.fill();
  // head
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(r * 0.55, -r * 0.25, r * 0.62, 0, 6.28); ctx.fill();
  // big ears
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.moveTo(r * 0.2, -r * 0.7); ctx.lineTo(r * 0.05, -r * 1.3); ctx.lineTo(r * 0.55, -r * 0.85); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.75, -r * 0.75); ctx.lineTo(r * 0.95, -r * 1.25); ctx.lineTo(r * 1.0, -r * 0.6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : "#d98aa0";
  ctx.beginPath(); ctx.moveTo(r * 0.22, -r * 0.78); ctx.lineTo(r * 0.14, -r * 1.12); ctx.lineTo(r * 0.45, -r * 0.85); ctx.closePath(); ctx.fill();
  // eye + whiskers + buck teeth
  eye(r * 0.72, -r * 0.32, r * 0.2, r * 0.05);
  ctx.strokeStyle = dk; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(r * 1.0, -r * 0.1); ctx.lineTo(r * 1.5, -r * 0.25); ctx.moveTo(r * 1.0, r * 0.0); ctx.lineTo(r * 1.5, r * 0.05); ctx.stroke();
  ctx.fillStyle = "#fff"; ctx.fillRect(r * 0.95, r * 0.08, r * 0.12, r * 0.28);
}

function drawOddish(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, lf = flash ? "#fff" : "#5aa54f", lf2 = flash ? "#fff" : "#3f8a3a";
  // leaves on top (5)
  for (let i = -2; i <= 2; i++) {
    ctx.save(); ctx.translate(0, -r * 0.6); ctx.rotate(i * 0.42);
    ctx.fillStyle = i % 2 === 0 ? lf : lf2;
    ctx.beginPath(); ctx.ellipse(0, -r * 0.7, r * 0.22, r * 0.6, 0, 0, 6.28); ctx.fill();
    ctx.restore();
  }
  // round blue body
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(0, r * 0.1, r * 0.92, 0, 6.28); ctx.fill();
  // feet
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.ellipse(-r * 0.4, r * 0.95, r * 0.28, r * 0.18, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.4, r * 0.95, r * 0.28, r * 0.18, 0, 0, 6.28); ctx.fill();
  // wide face
  eye(-r * 0.32, 0, r * 0.2); eye(r * 0.32, 0, r * 0.2);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, r * 0.3, r * 0.4, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
}

// ---- World 2 ----
function drawGeodude(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // arms with fists (signature)
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(-r * 0.95, r * 0.15, r * 0.34, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.95, r * 0.15, r * 0.34, 0, 6.28); ctx.fill();
  ctx.strokeStyle = body; ctx.lineWidth = r * 0.3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-r * 0.6, 0); ctx.lineTo(-r * 0.9, r * 0.15); ctx.moveTo(r * 0.6, 0); ctx.lineTo(r * 0.9, r * 0.15); ctx.stroke();
  ctx.lineCap = "butt";
  // rocky body (slightly faceted)
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(-r * 0.2, -r); ctx.lineTo(r * 0.55, -r * 0.8); ctx.lineTo(r, -r * 0.05);
  ctx.lineTo(r * 0.7, r * 0.85); ctx.lineTo(-r * 0.55, r * 0.9); ctx.lineTo(-r, r * 0.1); ctx.lineTo(-r * 0.75, -r * 0.6);
  ctx.closePath(); ctx.fill();
  // shading
  ctx.fillStyle = dk; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.moveTo(r, -r * 0.05); ctx.lineTo(r * 0.7, r * 0.85); ctx.lineTo(-r * 0.1, r * 0.5); ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;
  // angry brows + eyes + mouth
  eye(-r * 0.3, -r * 0.1, r * 0.2); eye(r * 0.3, -r * 0.1, r * 0.2);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-r * 0.55, -r * 0.4); ctx.lineTo(-r * 0.12, -r * 0.22); ctx.moveTo(r * 0.55, -r * 0.4); ctx.lineTo(r * 0.12, -r * 0.22); ctx.stroke();
  ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-r * 0.25, r * 0.4); ctx.lineTo(r * 0.25, r * 0.4); ctx.stroke();
}

function drawZubat(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  const flap = Math.sin(Date.now() / 90 + e.bob) * 0.4;
  // wings (large, flapping)
  ctx.fillStyle = flash ? "#fff" : "#7e5fa8";
  for (const s of [-1, 1]) {
    ctx.save(); ctx.scale(s, 1); ctx.rotate(flap);
    ctx.beginPath(); ctx.moveTo(r * 0.3, 0);
    ctx.quadraticCurveTo(r * 1.4, -r * 0.6, r * 1.7, r * 0.1);
    ctx.quadraticCurveTo(r * 1.3, r * 0.1, r * 1.4, r * 0.6);
    ctx.quadraticCurveTo(r * 0.9, r * 0.3, r * 0.3, r * 0.5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(0, 0, r * 0.7, 0, 6.28); ctx.fill();
  // two ears
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.moveTo(-r * 0.35, -r * 0.55); ctx.lineTo(-r * 0.5, -r * 1.1); ctx.lineTo(-r * 0.05, -r * 0.6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.35, -r * 0.55); ctx.lineTo(r * 0.5, -r * 1.1); ctx.lineTo(r * 0.05, -r * 0.6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : "#c44a6a";
  ctx.beginPath(); ctx.moveTo(-r * 0.3, -r * 0.6); ctx.lineTo(-r * 0.42, -r * 0.95); ctx.lineTo(-r * 0.12, -r * 0.62); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.3, -r * 0.6); ctx.lineTo(r * 0.42, -r * 0.95); ctx.lineTo(r * 0.12, -r * 0.62); ctx.closePath(); ctx.fill();
  // open mouth with fangs (Zubat has no eyes)
  ctx.fillStyle = flash ? "#fff" : "#3a2535";
  ctx.beginPath(); ctx.ellipse(0, r * 0.15, r * 0.3, r * 0.22, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(-r * 0.2, r * 0.05); ctx.lineTo(-r * 0.1, r * 0.32); ctx.lineTo(-r * 0.02, r * 0.05); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.2, r * 0.05); ctx.lineTo(r * 0.1, r * 0.32); ctx.lineTo(r * 0.02, r * 0.05); ctx.closePath(); ctx.fill();
}

function drawGastly(e, flash) {
  const r = e.r;
  const t = Date.now() / 200;
  // wispy purple gas cloud
  ctx.fillStyle = flash ? "rgba(255,255,255,0.5)" : "rgba(120,90,170,0.45)";
  for (let i = 0; i < 9; i++) {
    const a = (i / 9) * Math.PI * 2 + t * 0.3;
    const rr = r * (1.1 + Math.sin(t + i) * 0.12);
    ctx.beginPath(); ctx.arc(Math.cos(a) * rr, Math.sin(a) * rr, r * 0.42, 0, 6.28); ctx.fill();
  }
  // dark core
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.85, 0, 6.28); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.arc(0, r * 0.15, r * 0.6, 0, 6.28); ctx.fill();
  // big eyes + wide grin
  eye(-r * 0.34, -r * 0.12, r * 0.26); eye(r * 0.34, -r * 0.12, r * 0.26);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, r * 0.1, r * 0.5, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
  // teeth
  ctx.fillStyle = "#fff";
  for (let i = -2; i <= 2; i++) { ctx.fillRect(i * r * 0.18 - r * 0.05, r * 0.3, r * 0.1, r * 0.16); }
}

// ---- World 3 ----
function drawMankey(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // limbs
  ctx.strokeStyle = body; ctx.lineWidth = r * 0.32; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-r * 0.4, r * 0.3); ctx.lineTo(-r * 0.85, r * 0.55);
  ctx.moveTo(r * 0.4, r * 0.3); ctx.lineTo(r * 0.85, r * 0.1);
  ctx.stroke(); ctx.lineCap = "butt";
  // round body/face
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(0, 0, r * 0.92, 0, 6.28); ctx.fill();
  // pig snout
  ctx.fillStyle = flash ? "#fff" : "#caa07a";
  ctx.beginPath(); ctx.ellipse(0, r * 0.25, r * 0.42, r * 0.3, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#5a4030";
  ctx.beginPath(); ctx.arc(-r * 0.15, r * 0.25, r * 0.08, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.15, r * 0.25, r * 0.08, 0, 6.28); ctx.fill();
  // fur tuft on head
  ctx.fillStyle = dk;
  for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i * r * 0.3, -r * 0.75); ctx.lineTo(i * r * 0.3 - r * 0.1, -r * 1.2); ctx.lineTo(i * r * 0.3 + r * 0.18, -r * 0.8); ctx.closePath(); ctx.fill(); }
  // angry eyes
  ctx.fillStyle = "#15151c";
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.15, r * 0.12, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.3, -r * 0.15, r * 0.12, 0, 6.28); ctx.fill();
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 0.42); ctx.lineTo(-r * 0.12, -r * 0.28); ctx.moveTo(r * 0.5, -r * 0.42); ctx.lineTo(r * 0.12, -r * 0.28); ctx.stroke();
}

function drawMagnemite(e, flash) {
  const r = e.r;
  const t = Date.now() / 150;
  // floating bob handled by caller; draw horseshoe magnets on sides
  for (const s of [-1, 1]) {
    ctx.save(); ctx.scale(s, 1);
    ctx.fillStyle = "#d0d4da"; ctx.beginPath(); ctx.arc(r * 1.0, 0, r * 0.42, 0, 6.28); ctx.fill();
    ctx.fillStyle = e.color2; ctx.beginPath(); ctx.arc(r * 1.0, 0, r * 0.24, 0, 6.28); ctx.fill();
    // tips (red/blue)
    ctx.fillStyle = s < 0 ? "#e04a4a" : "#4a6fe0";
    ctx.fillRect(r * 0.78, -r * 0.5, r * 0.18, r * 0.22);
    ctx.fillStyle = s < 0 ? "#4a6fe0" : "#e04a4a";
    ctx.fillRect(r * 0.78, r * 0.28, r * 0.18, r * 0.22);
    ctx.restore();
  }
  // steel sphere
  const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
  g.addColorStop(0, flash ? "#fff" : "#eef0f4"); g.addColorStop(1, flash ? "#fff" : e.color);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r * 0.82, 0, 6.28); ctx.fill();
  // screws on top
  ctx.fillStyle = "#8a9098";
  ctx.beginPath(); ctx.moveTo(-r * 0.12, -r * 0.78); ctx.lineTo(r * 0.12, -r * 0.78); ctx.lineTo(0, -r * 1.15); ctx.closePath(); ctx.fill();
  // single big eye
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, r * 0.4, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#15151c"; ctx.beginPath(); ctx.arc(0, 0, r * 0.2, 0, 6.28); ctx.fill();
  // spark when charging shot
  if (e.shootCd < 0.4) { ctx.strokeStyle = "rgba(255,235,80,0.8)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, r * (0.9 + Math.sin(t * 4) * 0.1), 0, 6.28); ctx.stroke(); }
}

function drawGraveler(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // four arms (two pairs)
  ctx.fillStyle = body;
  const arms = [[-1.0, -0.1], [1.0, -0.1], [-0.85, 0.55], [0.85, 0.55]];
  for (const a of arms) { ctx.beginPath(); ctx.arc(r * a[0], r * a[1], r * 0.3, 0, 6.28); ctx.fill(); }
  ctx.strokeStyle = body; ctx.lineWidth = r * 0.26; ctx.lineCap = "round";
  ctx.beginPath();
  for (const a of arms) { ctx.moveTo(r * a[0] * 0.55, r * a[1]); ctx.lineTo(r * a[0], r * a[1]); }
  ctx.stroke(); ctx.lineCap = "butt";
  // chunky boulder body
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(-r * 0.3, -r); ctx.lineTo(r * 0.6, -r * 0.75); ctx.lineTo(r, 0);
  ctx.lineTo(r * 0.6, r * 0.9); ctx.lineTo(-r * 0.6, r * 0.9); ctx.lineTo(-r, 0); ctx.closePath(); ctx.fill();
  // rocky bumps / shading
  ctx.fillStyle = dk; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.arc(-r * 0.4, r * 0.3, r * 0.22, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.45, -r * 0.2, r * 0.18, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  // face
  eye(-r * 0.28, -r * 0.05, r * 0.18); eye(r * 0.28, -r * 0.05, r * 0.18);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 0.32); ctx.lineTo(-r * 0.1, -r * 0.18); ctx.moveTo(r * 0.5, -r * 0.32); ctx.lineTo(r * 0.1, -r * 0.18); ctx.stroke();
  ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-r * 0.22, r * 0.35); ctx.lineTo(r * 0.22, r * 0.35); ctx.stroke();
}

const ENEMY_SPRITES = {
  caterpie: drawCaterpie, rattata: drawRattata, oddish: drawOddish,
  geodude: drawGeodude, zubat: drawZubat, gastly: drawGastly,
  mankey: drawMankey, magnemite: drawMagnemite, graveler: drawGraveler,
};

function drawBoss(e, flash) {
  const fn = BOSS_SPRITES[e.type];
  if (fn) fn(e, flash); else drawBossGeneric(e, flash);
  // enrage aura under half HP
  if (e.hp / e.maxHp < 0.5) {
    ctx.strokeStyle = "rgba(255,70,70," + (0.3 + Math.sin(Date.now() / 120) * 0.2) + ")";
    ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, 0, e.r + 14, 0, 6.28); ctx.stroke();
  }
}

function drawBossGeneric(e, flash) {
  const r = e.r;
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.fill();
  eye(-r * 0.35, -r * 0.15, r * 0.18); eye(r * 0.35, -r * 0.15, r * 0.18);
}

function drawButterfree(e, flash) {
  const r = e.r;
  const flap = Math.sin(Date.now() / 160) * 0.35;
  // four wings (blue-edged, light interior)
  for (const s of [-1, 1]) {
    ctx.save(); ctx.scale(s, 1); ctx.rotate(flap * s);
    // upper wing
    ctx.fillStyle = flash ? "#fff" : "#f4f2fb";
    ctx.beginPath(); ctx.ellipse(r * 0.95, -r * 0.35, r * 0.75, r * 0.55, -0.3, 0, 6.28); ctx.fill();
    ctx.strokeStyle = flash ? "#fff" : e.accent; ctx.lineWidth = 4; ctx.stroke();
    // black wing spots

  // head

}

function drawGolbat(e, flash) {
  const r = e.r;
  const flap = Math.sin(Date.now() / 150) * 0.4;
  const chomp = (Math.sin(Date.now() / 300) + 1) / 2; // mouth open amount
  // huge wings
  ctx.fillStyle = flash ? "#fff" : e.color2;
  for (const s of [-1, 1]) {
    ctx.save(); ctx.scale(s, 1); ctx.rotate(flap * s);
    ctx.beginPath(); ctx.moveTo(r * 0.4, -r * 0.2);
    ctx.quadraticCurveTo(r * 1.7, -r * 0.9, r * 2.0, -r * 0.1);
    ctx.quadraticCurveTo(r * 1.5, -r * 0.05, r * 1.7, r * 0.5);
    ctx.quadraticCurveTo(r * 1.3, r * 0.3, r * 1.5, r * 0.9);
    ctx.quadraticCurveTo(r * 0.9, r * 0.5, r * 0.4, r * 0.5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // body (mostly a giant mouth)
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.fill();
  // ears
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath(); ctx.moveTo(-r * 0.4, -r * 0.8); ctx.lineTo(-r * 0.6, -r * 1.4); ctx.lineTo(-r * 0.05, -r * 0.85); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.4, -r * 0.8); ctx.lineTo(r * 0.6, -r * 1.4); ctx.lineTo(r * 0.05, -r * 0.85); ctx.closePath(); ctx.fill();
  // small eyes
  eye(-r * 0.35, -r * 0.35, r * 0.16); eye(r * 0.35, -r * 0.35, r * 0.16);
  // giant open mouth
  ctx.fillStyle = flash ? "#fff" : e.accent;
  ctx.beginPath(); ctx.ellipse(0, r * 0.3, r * 0.6, r * (0.3 + chomp * 0.35), 0, 0, 6.28); ctx.fill();
  // fangs
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(-r * 0.45, r * 0.05); ctx.lineTo(-r * 0.28, r * 0.45); ctx.lineTo(-r * 0.12, r * 0.05); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.45, r * 0.05); ctx.lineTo(r * 0.28, r * 0.45); ctx.lineTo(r * 0.12, r * 0.05); ctx.closePath(); ctx.fill();
}

function drawGolem(e, flash) {
  const r = e.r;
  // stubby legs
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.ellipse(-r * 0.45, r * 0.92, r * 0.3, r * 0.22, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.45, r * 0.92, r * 0.3, r * 0.22, 0, 0, 6.28); ctx.fill();
  // arms with fists
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.arc(-r * 1.0, r * 0.1, r * 0.34, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 1.0, r * 0.1, r * 0.34, 0, 6.28); ctx.fill();
  // big rocky shell made of plates
  ctx.fillStyle = flash ? "#fff" : e.color;

  const plates = [[-0.45, -0.2], [0.1, -0.35], [0.5, -0.05], [-0.2, 0.3], [0.35, 0.4], [-0.6, 0.25]];
  for (const p of plates) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) { const a = (i / 6) * Math.PI * 2 + 0.5; const px = r * p[0] + Math.cos(a) * r * 0.26, py = r * 0.05 + r * p[1] + Math.sin(a) * r * 0.26; i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
    ctx.closePath();
    ctx.fillStyle = flash ? "#fff" : e.accent; ctx.globalAlpha = 0.4; ctx.fill(); ctx.globalAlpha = 1; ctx.stroke();
  }
  // small head poking out top
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.arc(0, -r * 0.85, r * 0.42, 0, 6.28); ctx.fill();
  eye(-r * 0.16, -r * 0.88, r * 0.13); eye(r * 0.16, -r * 0.88, r * 0.13);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2.5;

}

const BOSS_SPRITES = { butterfree: drawButterfree, golbat: drawGolbat, golem: drawGolem };

// ---- Elite sub-boss sprites ----
function drawRaticate(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2, cream = flash ? "#fff" : "#f0eae0";
  // thick tail
  ctx.strokeStyle = dk; ctx.lineWidth = 5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-r * 0.7, r * 0.25); ctx.quadraticCurveTo(-r * 1.7, r * 0.1, -r * 1.4, -r * 0.7); ctx.stroke();
  ctx.lineCap = "butt";
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(-r * 0.05, r * 0.05, r * 0.95, r * 0.8, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = cream; ctx.beginPath(); ctx.ellipse(0, r * 0.35, r * 0.55, r * 0.42, 0, 0, 6.28); ctx.fill();
  // head
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(r * 0.55, -r * 0.28, r * 0.66, 0, 6.28); ctx.fill();
  // cheek fur spikes (Raticate's whisker tufts)
  ctx.fillStyle = cream;
  for (const sy of [-0.1, 0.15, 0.4]) {
    ctx.beginPath(); ctx.moveTo(r * 0.9, -r * 0.3 + r * sy); ctx.lineTo(r * 1.6, -r * 0.45 + r * sy); ctx.lineTo(r * 0.95, -r * 0.15 + r * sy); ctx.closePath(); ctx.fill();
  }
  // ears
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.moveTo(r * 0.2, -r * 0.75); ctx.lineTo(r * 0.05, -r * 1.35); ctx.lineTo(r * 0.55, -r * 0.9); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.8, -r * 0.8); ctx.lineTo(r * 1.0, -r * 1.3); ctx.lineTo(r * 1.05, -r * 0.6); ctx.closePath(); ctx.fill();
  // eye + big buck teeth
  eye(r * 0.7, -r * 0.35, r * 0.18, r * 0.05);
  ctx.fillStyle = "#fff"; ctx.fillRect(r * 0.95, r * 0.12, r * 0.16, r * 0.34);
  ctx.strokeStyle = dk; ctx.lineWidth = 1; ctx.strokeRect(r * 0.95, r * 0.12, r * 0.16, r * 0.34);

function drawHaunter(e, flash) {
  const r = e.r, t = Date.now() / 220;
  // gaseous aura
  ctx.fillStyle = flash ? "rgba(255,255,255,0.5)" : "rgba(150,110,210,0.35)";
  for (let i = 0; i < 10; i++) { const a = (i / 10) * Math.PI * 2 + t * 0.4; const rr = r * (1.05 + Math.sin(t + i) * 0.12); ctx.beginPath(); ctx.arc(Math.cos(a) * rr, Math.sin(a) * rr, r * 0.4, 0, 6.28); ctx.fill(); }
  // detached floating hands
  ctx.fillStyle = flash ? "#fff" : e.color;
  for (const s of [-1, 1]) {
    const hx = s * (r * 1.25 + Math.sin(t * 1.5 + s) * 4), hy = r * 0.2 + Math.cos(t + s) * 5;
    ctx.beginPath(); ctx.arc(hx, hy, r * 0.34, 0, 6.28); ctx.fill();
    // fingers
    ctx.strokeStyle = flash ? "#fff" : e.color; ctx.lineWidth = r * 0.12; ctx.lineCap = "round";
    for (let f = -1; f <= 1; f++) { ctx.beginPath(); ctx.moveTo(hx + f * r * 0.16, hy - r * 0.2); ctx.lineTo(hx + f * r * 0.22, hy - r * 0.5); ctx.stroke(); }
    ctx.lineCap = "butt";
  }
  // spiky body
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath();
  const spikes = 11;
  for (let i = 0; i <= spikes; i++) { const a = (i / spikes) * Math.PI * 2; const rr = i % 2 ? r * 1.06 : r * 0.82; const px = Math.cos(a) * rr, py = Math.sin(a) * rr; i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.arc(0, r * 0.1, r * 0.6, 0, 6.28); ctx.fill();
  // menacing eyes + grin
  ctx.fillStyle = flash ? "#222" : "#fff";
  ctx.beginPath(); ctx.ellipse(-r * 0.32, -r * 0.12, r * 0.2, r * 0.26, 0.3, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.32, -r * 0.12, r * 0.2, r * 0.26, -0.3, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#15151c";
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.08, r * 0.09, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.3, -r * 0.08, r * 0.09, 0, 6.28); ctx.fill();
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, r * 0.12, r * 0.5, 0.08 * Math.PI, 0.92 * Math.PI); ctx.stroke();
  ctx.fillStyle = "#fff";
  for (let i = -2; i <= 2; i++) ctx.fillRect(i * r * 0.18 - r * 0.05, r * 0.32, r * 0.1, r * 0.18);
}

function drawOnix(e, flash) {
  const r = e.r, t = Date.now() / 600;
  // segmented rock-snake body trailing behind/around
  const segs = 6;
  for (let i = segs; i >= 1; i--) {
    const a = -0.6 + i * 0.5 + Math.sin(t + i * 0.5) * 0.18;
    const dist0 = r * 0.55 * i;
    const sx = -Math.cos(a) * dist0 * 0.5, sy = -Math.abs(Math.sin(a)) * dist0 * 0.35 - i * 2;
    const sr = r * (0.85 - i * 0.1);
    ctx.fillStyle = flash ? "#fff" : (i % 2 ? e.color : e.color2);
    // boulder segment (hexish)
    ctx.beginPath();
    for (let k = 0; k < 6; k++) { const ka = (k / 6) * Math.PI * 2 + 0.4; const px = sx + Math.cos(ka) * sr, py = sy + Math.sin(ka) * sr; k ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
    ctx.closePath(); ctx.fill();
  }
  // head (largest boulder)
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath();
  for (let k = 0; k < 7; k++) { const ka = (k / 7) * Math.PI * 2 + 0.2; const rr = k % 2 ? r * 1.05 : r * 0.85; const px = Math.cos(ka) * rr, py = Math.sin(ka) * rr; k ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
  ctx.closePath(); ctx.fill();
  // horn on top (Onix's signature)
  ctx.fillStyle = flash ? "#fff" : e.accent;
  ctx.beginPath(); ctx.moveTo(-r * 0.18, -r * 0.7); ctx.lineTo(0, -r * 1.4); ctx.lineTo(r * 0.18, -r * 0.7); ctx.closePath(); ctx.fill();
  // shading + eyes
  ctx.fillStyle = flash ? "#ddd" : shade(e.color, 0.7); ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.arc(r * 0.35, r * 0.3, r * 0.3, 0, 6.28); ctx.fill(); ctx.globalAlpha = 1;
  eye(-r * 0.28, -r * 0.05, r * 0.17); eye(r * 0.28, -r * 0.05, r * 0.17);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 0.3); ctx.lineTo(-r * 0.1, -r * 0.16); ctx.moveTo(r * 0.5, -r * 0.3); ctx.lineTo(r * 0.1, -r * 0.16); ctx.stroke();
  ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-r * 0.22, r * 0.4); ctx.lineTo(r * 0.22, r * 0.4); ctx.stroke();
}

const ELITE_SPRITES = { raticate: drawRaticate, haunter: drawHaunter, onix: drawOnix };

function drawProjectile(pr) {
  ctx.save();
  if (pr.leaf) {
    ctx.translate(pr.x, pr.y); ctx.rotate(Math.atan2(pr.vy, pr.vx));
    ctx.fillStyle = pr.color; ctx.beginPath(); ctx.ellipse(0, 0, pr.r * 1.3, pr.r * 0.6, 0, 0, 6.28); ctx.fill();
  } else {
    const g = ctx.createRadialGradient(pr.x, pr.y, 0, pr.x, pr.y, pr.r);
    g.addColorStop(0, "#fff"); g.addColorStop(0.4, pr.color); g.addColorStop(1, shade(pr.color, 0.6));
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.r, 0, 6.28); ctx.fill();
  }
  ctx.restore();
}

function drawPickup(pk) {
  const fl = Math.sin(Date.now() / 150 + pk.x) * 2;
  ctx.save(); ctx.translate(pk.x, pk.y + fl);
  ctx.fillStyle = "#ffd95e"; ctx.shadowColor = "#ffd95e"; ctx.shadowBlur = 8;
  // 4-point star
  ctx.beginPath();
  for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2; const rr = i % 2 === 0 ? pk.r : pk.r * 0.45; ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr); }
  ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0; ctx.restore();
}

function drawParticle(pt) {
  ctx.globalAlpha = clamp(pt.t * 2, 0, 1);
  ctx.fillStyle = pt.color;
  ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawGate(g) {
  const pulse = (Math.sin(g.glow * 4) + 1) / 2;
  ctx.save();
  const isElite = g.elite;
  const baseCol = isElite ? "#ffd95e" : g.boon.color;
  ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(g.x - 2, g.y - g.h / 2, g.w + 4, g.h);
  // portal glow
  const grad = ctx.createLinearGradient(g.x, 0, g.x + g.w, 0);
  grad.addColorStop(0, shade(baseCol, 0.5)); grad.addColorStop(1, baseCol);
  ctx.fillStyle = grad; ctx.fillRect(g.x, g.y - g.h / 2, g.w, g.h);
  ctx.strokeStyle = isElite ? "#ffe9a8" : "#fff"; ctx.lineWidth = (isElite ? 3 : 2) + pulse * 2; ctx.globalAlpha = 0.6 + pulse * 0.4;
  ctx.strokeRect(g.x, g.y - g.h / 2, g.w, g.h);
  if (isElite) {
    // outer gold halo
    ctx.strokeStyle = "rgba(255,217,94," + (0.3 + pulse * 0.4) + ")"; ctx.lineWidth = 6;
    ctx.strokeRect(g.x - 4, g.y - g.h / 2 - 4, g.w + 8, g.h + 8);
  }
  ctx.globalAlpha = 1;
  // icon
  ctx.fillStyle = "#fff"; ctx.font = "22px " + FONT; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(isElite ? "☠" : g.boon.icon, g.x + g.w / 2, g.y - (isElite ? 26 : 18));
  if (isElite) { ctx.fillStyle = "#1a1206"; ctx.font = "12px " + FONT; ctx.fillText(g.boon.icon, g.x + g.w / 2, g.y + 4); }
  // label box pointing left
  ctx.font = "16px " + FONT; ctx.textAlign = "right";
  const title = isElite ? ("Greater " + g.boon.name) : g.boon.name;
  const tw = Math.max(ctx.measureText(title).width, isElite ? 92 : 0);
  ctx.fillStyle = "rgba(10,10,18,0.85)"; ctx.fillRect(g.x - tw - 16, g.y - (isElite ? 30 : 14), tw + 12, isElite ? 62 : 44);
  if (isElite) { ctx.fillStyle = "#ffd95e"; ctx.font = "13px " + FONT; ctx.fillText("★ ELITE — Sub-Boss", g.x - 8, g.y - 14); }
  ctx.fillStyle = baseCol; ctx.font = "16px " + FONT; ctx.fillText(title, g.x - 8, g.y + (isElite ? 4 : 0));
  ctx.fillStyle = "#cfd6e0"; ctx.font = "13px " + FONT;
  ctx.textAlign = "right"; ctx.fillText(g.boon.desc + (isElite ? " (×1.6)" : ""), g.x - 8, g.y + (isElite ? 22 : 16));
  ctx.restore();
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}
function wrapTextRight(text, x, y, maxw) { ctx.textAlign = "right"; ctx.fillText(text, x, y); }

function drawFloater(f) {
  ctx.globalAlpha = clamp(f.t * 1.6, 0, 1);
