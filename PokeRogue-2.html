<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c1320">
<title>PokéRogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #070b12;
    font-family: 'VT323', monospace;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 30% 20%, #16243a 0%, #0a0f1a 55%, #06090f 100%);
  }
  #game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #0c1320;
    box-shadow: 0 0 0 2px #1d2c44, 0 20px 60px rgba(0,0,0,0.6);
    border-radius: 6px;
    touch-action: none;
  }
  /* Landscape prompt for mobile portrait */
  #rotate {
    position: fixed; inset: 0; z-index: 50;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0f1a; color: #cfe0ff; text-align: center; padding: 24px;
  }
  #rotate .ph { font-size: 64px; margin-bottom: 18px; animation: rot 2s ease-in-out infinite; }
  #rotate h2 { font-family: 'Press Start 2P', monospace; font-size: 16px; color: #ffd23f; margin-bottom: 14px; line-height: 1.6; }
  #rotate p { font-size: 22px; color: #9fb3c8; }
  @keyframes rot { 0%,100% { transform: rotate(0deg);} 50% { transform: rotate(90deg);} }
  #hint {
    position: fixed; bottom: 6px; left: 0; right: 0; text-align: center;
    color: #3f4d60; font-size: 15px; pointer-events: none; z-index: 5;
  }
  @media (pointer: coarse) { #hint { display: none; } }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="540"></canvas>
  </div>
  <div id="rotate">
    <div class="ph">📱</div>
    <h2>Rotate your device</h2>
    <p>PokéRogue plays best in landscape mode.</p>
  </div>
  <div id="hint">WASD move &nbsp;·&nbsp; J attack &nbsp;·&nbsp; K special &nbsp;·&nbsp; SPACE dash &nbsp;·&nbsp; ESC pause &nbsp;·&nbsp; M mute</div>
<script>
/* =========================================================================
   PokéRogue — a Hades-style roguelike with elemental starters
   Vanilla JS + Canvas. Desktop (WASD + J/K/Space) and mobile (touch) support.
   ========================================================================= */
(() => {
"use strict";

// ----------------------------------------------------------------------------
// Canvas setup
// ----------------------------------------------------------------------------
const VW = 960, VH = 540;            // internal stage resolution (the 16:9 world)
// Diagnostic readout (frame counters + per-half ms). Off by default; enable with ?diag=1.
const DIAG = (typeof location !== "undefined") && /[?&]diag=1/.test(location.search);
let CW = 960, CH = 540;              // actual canvas pixel size (wider on touch)
let stageX = 0, stageY = 0;          // top-left of the centered stage within the canvas
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = CW; canvas.height = CH;

let scale = 1, offX = 0, offY = 0;   // for mapping screen->virtual coords
function resize() {
  const wrap = document.getElementById("wrap");
  const w = wrap.clientWidth, h = wrap.clientHeight;
  if (isTouch && w > h) {
    // Touch landscape: canvas fills the WHOLE screen so the empty side margins
    // become usable space for the on-screen controls. The 16:9 stage stays
    // centered; controls live in the side gutters.
    CH = VH;
    CW = Math.max(VW, Math.round(VH * (w / h)));
    stageX = Math.round((CW - VW) / 2);
    stageY = 0;
    canvas.width = CW; canvas.height = CH;
    const s = h / CH;
    canvas.style.width = (CW * s) + "px";
    canvas.style.height = (CH * s) + "px";
  } else {
    // Desktop / portrait: classic centered 16:9 letterbox.
    CW = VW; CH = VH;
    stageX = 0; stageY = 0;
    canvas.width = CW; canvas.height = CH;
    const s = Math.min(w / CW, h / CH);
    canvas.style.width = (CW * s) + "px";
    canvas.style.height = (CH * s) + "px";
  }
  const rect = canvas.getBoundingClientRect();
  scale = rect.width / CW;
  offX = rect.left; offY = rect.top;
  checkOrientation();
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));

const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
function checkOrientation() {
  const rot = document.getElementById("rotate");
  if (isTouch && window.innerHeight > window.innerWidth) rot.style.display = "flex";
  else rot.style.display = "none";
}

// ----------------------------------------------------------------------------
// Persistence — window.storage (Claude artifacts) with localStorage fallback
// ----------------------------------------------------------------------------
const Persist = {
  async load(key, def) {
    try {
      if (window.storage && window.storage.get) {
        const r = await window.storage.get(key);
        return r && r.value ? JSON.parse(r.value) : def;
      }
    } catch (e) {}
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
    catch (e) {}
    return def;
  },
  async save(key, val) {
    const s = JSON.stringify(val);
    try { if (window.storage && window.storage.set) { await window.storage.set(key, s); return; } }
    catch (e) {}
    try { localStorage.setItem(key, s); } catch (e) {}
  }
};

// Wipe all permanent progress (stardust + upgrades + records) back to a new save.
function resetProgress() {
  meta = {
    stardust: 0,
    upgrades: { tough: 0, power: 0, focus: 0, agility: 0, fortune: 0, resolve: 0, headstart: 0 },
    bestWorld: 0, runs: 0, wins: 0,
  };
  Persist.save("pokerogue_meta", meta);
  Audio2.boon();
}

// ----------------------------------------------------------------------------
// Tiny WebAudio SFX
// ----------------------------------------------------------------------------
const Audio2 = (() => {
  let ac = null, muted = false;
  function ensure() { if (!ac) { try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return ac; }
  function blip(freq, dur, type, vol) {
    if (muted) return; const a = ensure(); if (!a) return;
    try {
      const o = a.createOscillator(), g = a.createGain();
      o.type = type || "square"; o.frequency.value = freq;
      g.gain.value = (vol || 0.08);
      o.connect(g); g.connect(a.destination);
      const t = a.currentTime;
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur);
    } catch (e) {}
  }
  return {
    resume() { const a = ensure(); if (a && a.state === "suspended") a.resume(); },
    toggleMute() { muted = !muted; return muted; },
    isMuted() { return muted; },
    attack() { blip(420, 0.07, "square", 0.05); },
    special() { blip(620, 0.18, "sawtooth", 0.06); },
    dash() { blip(220, 0.1, "sine", 0.05); },
    hit() { blip(180, 0.06, "triangle", 0.05); },
    hurt() { blip(120, 0.18, "sawtooth", 0.09); },
    pickup() { blip(880, 0.08, "square", 0.05); },
    boon() { blip(660, 0.12, "triangle", 0.08); blip(990, 0.12, "triangle", 0.06); },
    die() { blip(160, 0.5, "sawtooth", 0.1); },
    boss() { blip(90, 0.6, "sawtooth", 0.1); },
    ui() { blip(520, 0.05, "square", 0.04); }
  };
})();

// ----------------------------------------------------------------------------
// Input
// ----------------------------------------------------------------------------
const keys = {};
const justPressed = {};
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (!keys[k]) justPressed[k] = true;
  keys[k] = true;
  if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(k)) e.preventDefault();
  Audio2.resume();
});
window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

// touch input state
const touch = {
  move: { active: false, id: null, ox: 0, oy: 0, dx: 0, dy: 0 },
  buttons: { attack: false, special: false, dash: false }
};
// edge-trigger helpers for touch buttons
const touchEdge = { attack: false, special: false, dash: false };

function vcoords(clientX, clientY) {
  return { x: (clientX - offX) / scale, y: (clientY - offY) / scale };
}

// ----------------------------------------------------------------------------
// Utility
// ----------------------------------------------------------------------------
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const dist = (ax, ay, bx, by) => Math.sqrt(dist2(ax, ay, bx, by));
function angDiff(a, b) {
  let d = (a - b) % (Math.PI * 2);          // single-step wrap, can't loop forever
  if (!Number.isFinite(d)) return 0;
  if (d > Math.PI) d -= Math.PI * 2;
  else if (d < -Math.PI) d += Math.PI * 2;
  return d;
}

// Arena bounds (play field inside the frame)
const ARENA = { x: 70, y: 70, w: VW - 140, h: VH - 140 };
ARENA.r = ARENA.x + ARENA.w; ARENA.b = ARENA.y + ARENA.h;
ARENA.cx = ARENA.x + ARENA.w / 2; ARENA.cy = ARENA.y + ARENA.h / 2;

// How each boon contributes, mirroring the engine's own math in BOONS.apply so

// Replay one boon's stacks exactly as the engine applied them.
function boonEffectValue(meta, ks) {
  if (meta.kind === "mult") {
    // increase boons multiply by (1 + base*k); reduction boons by (1 - base*k)
    let m = 1;
    for (const k of ks) m *= (1 + meta.sign * meta.base * k);
    // report the magnitude of the change as a positive percent
    return Math.abs(m - 1) * 100;
  }
  // additive
  let s = 0;
  for (const k of ks) s += meta.base * (meta.round ? Math.round(k) : k);
  return s;
}

// Collapse the player's boon list into unique entries with exact combined totals.
function summarizeBoons() {
  const order = [];
  const map = {};
  for (const b of (player ? player.boons : [])) {
    if (!map[b.id]) { map[b.id] = { id: b.id, icon: b.icon, color: b.color, name: b.name, count: 0, ks: [], hasGreater: false }; order.push(b.id); }
    const e = map[b.id];
    e.count++; e.ks.push(b.k || 1);
    if (b.rare) e.hasGreater = true;
  }
  return order.map(id => {
    const e = map[id];
    const meta = BOON_SUMMARY[id];
    let value;
    if (!meta) value = e.name;
    else if (meta.flag) value = meta.label + (e.count > 1 ? " (×" + e.count + ")" : "");
    else value = meta.fmt(boonEffectValue(meta, e.ks));
    return { icon: e.icon, color: e.color, name: e.name, count: e.count, value, hasGreater: e.hasGreater };
  });
}

function makePlayer(starterKey) {
  const s = STARTERS[starterKey];
  const u = meta.upgrades;
  const p = {
    key: starterKey, s,
    evoStage: 0,         // 0 base, 1 mid, 2 final — advances after each world boss
    evoAnim: 0,          // evolution flash animation timer
    x: ARENA.cx, y: ARENA.cy, r: 16,
    facing: 0,
    hp: 0, // set below
    invuln: 0,           // i-frame timer
    atkTimer: 0, spTimer: 0, dashTimer: 0, dashCdTimer: 0,
    dashing: false, dashVx: 0, dashVy: 0,
    swing: 0,            // melee swing animation timer
    swingDir: 1,
    bob: 0,
    hurtFlash: 0,
    revives: u.resolve,
    // base stats with meta upgrades baked in
    base: {
      maxHp: s.base.maxHp + u.tough * 22,
      speed: s.base.speed,
      atkDmg: s.base.atkDmg + u.power * 3,
      atkCd: s.base.atkCd,
      atkRange: s.base.atkRange,
      atkArc: s.base.atkArc,
      spDmg: s.base.spDmg * (1 + u.focus * 0.12),
      spCd: s.base.spCd,
      dashCd: 0.7 - u.agility * 0.06,
      dashIframe: 0.2,
    },
    // multiplicative / additive in-run modifiers from boons
    mods: {
      maxHp: 0, speed: 1, atkDmg: 1, atkCd: 1, spDmg: 1,
      crit: 0, lifesteal: 0, multishot: 0, dmgTaken: 1, greed: meta.upgrades.fortune * 0.15,
      statusOnHit: false, dashTrail: false, explode: false, pierce: false,
      dashCd: 1, dashIframe: 0, roomHeal: 0,
      // tiered boon levels (0 = not taken; higher = upgraded)
      statusTier: 0, trailTier: 0, blastBonus: 0, pierceCount: 1,
      range: 1, arc: 1, // basic-attack reach & spread multipliers (boons)
      deathBurst: false, // enemies explode on death (Volatile Remains boon)
      bubbleMax: 0, retaliate: 0, // Aegis Bubble shields / Retaliation nova
      // synergy boons
      ailmentDmg: 0,     // +dmg multiplier vs burning/frozen/poisoned enemies
      thorns: 0,         // fraction of contact damage reflected
      overcharge: 0,     // every Nth basic attack fires a free special (0 = off)
      ricochet: 0,       // special projectiles bounce to N extra targets
      adrenaline: 0,     // attack-speed bonus that scales as HP drops
      magnet: false,     // auto-collect stardust
      lastStand: 0,      // survive a lethal hit at 1 HP, N times per room
    },
    overchargeCount: 0,  // running tally of basic attacks for Overcharge
    lastStandUsed: 0,    // last-stand procs used this room
    bubble: 0,           // active shield bubbles this room (Aegis Bubble)
    boons: [],
  };
  p.heal = function (n) { this.hp = clamp(this.hp + n, 0, this.maxHp()); };
  // Evolution scaling: each stage strengthens the starter. [stage0, stage1, stage2]
  p.EVO_HP = [1, 1.20, 1.42];
  p.EVO_DMG = [1, 1.18, 1.40];
  p.evoHpMul = function () { return this.EVO_HP[this.evoStage] || 1; };
  p.evoDmgMul = function () { return this.EVO_DMG[this.evoStage] || 1; };
  p.maxHp = function () { return Math.round((this.base.maxHp + this.mods.maxHp) * this.evoHpMul()); };
  p.spd = function () { return this.base.speed * this.mods.speed; };
  p.atkDamage = function () { return this.base.atkDmg * this.mods.atkDmg * this.evoDmgMul(); };
  p.atkCooldown = function () {
    let cd = this.base.atkCd * this.mods.atkCd;
    if (this.mods.adrenaline > 0) {
      const missing = 1 - this.hp / this.maxHp();      // 0 at full HP, 1 near death
      cd *= (1 - this.mods.adrenaline * missing);       // up to -adrenaline at low HP
    }
    return cd;
  };
  p.spDamage = function () { return this.base.spDmg * this.mods.spDmg * this.evoDmgMul(); };
  p.dashCooldown = function () { return this.base.dashCd * this.mods.dashCd; };
  p.dashIframes = function () { return this.base.dashIframe + this.mods.dashIframe; };
  p.hp = p.maxHp();
  return p;
}

// Diminishing additive stack: each repeat of a boon adds a bit less than the last
// (base, then base - step, then base - 2*step…), floored so it never goes negative.
function dimStack(base, lvl, parts) {
  const step = base / (parts || 6); // ~1/6 of base lost per repeat by default
  return Math.max(base * 0.4, base - step * lvl);
}

function applyBoon(boon, rare) {
  const k = rare ? 1.6 : 1;
  // how many of this boon the player already has (0 = first copy). Tiered boons
  // use this to grow a real effect on each repeat instead of a hidden patch.
  const lvl = player.boons.filter(b => b.id === boon.id).length;
  boon.apply(player, k, lvl);
  player.boons.push({ id: boon.id, icon: boon.icon, color: boon.color, name: boon.name, desc: boon.desc, rare: !!rare, k });
  Audio2.boon();
}

function startRun() {
  player = makePlayer(selectedStarter);
  run = { world: 0, room: 0, roomsInWorld: randi(5, 7), stardust: 0, kills: 0, cleared: false, eliteRoom: false, pendingEliteBoon: null, eliteBudget: randi(1, 2), elitesTaken: 0, helperUsedThisWorld: false, pendingHelper: null };
  helper = null;
  enemies = []; projectiles = []; particles = []; pickups = []; floaters = []; gates = []; obstacles = [];
  meta.runs++;
  // head-start boons
  for (let i = 0; i < meta.upgrades.headstart; i++) applyBoon(pick(BOONS));
  state = STATE.PLAY;
  enterRoom();
  flash("WORLD 1 — " + WORLDS[0].short, WORLDS[0].accent);
}

function enterRoom() {
  enemies = []; projectiles = []; pickups = []; gates = []; telegraphs = []; waves = []; hazards = [];
  particles = []; floaters = []; bursts = [];
  player.x = ARENA.x + 60; player.y = ARENA.cy;
  player.invuln = 1.0;
  player.lastStandUsed = 0;
  player.bubble = player.mods.bubbleMax; // refill shield bubbles each room
  run.cleared = false;
  if (player.mods.roomHeal > 0) player.heal(player.mods.roomHeal);
  // A friend only helps for the single stage it joined. Once we enter a later
  // room than the one it was summoned into, it parts ways.
  if (helper && helper.room !== run.room) {
    floater(player.x, player.y - 30, helper.name + " headed home", helper.color);
    helper = null;
  }
  if (helper) { helper.x = player.x - 30; helper.y = player.y; helper.singUsedThisRoom = false; helper.singCd = 1.2; }

  const w = WORLDS[run.world];
  if (run.gauntlet) {
    genObstacles(w, true); // sparse, boss-style layout throughout
    if (run.room === 0) {
      // Antechamber: no enemies. Offer a choice of powerful prep boons via gates.
      run.cleared = true;
      openGauntletBoonGate();
      flash("CERULEAN CAVE — choose your power", w.accent);
    } else if (run.room >= run.roomsInWorld) {
      spawnGauntletBoss("mewtwo");
      Audio2.boss(); flash("⚠ FINAL BOSS: MewTwo", "#e96fd0");
    } else {
      // sub-boss rooms 1..4 — one boss from the pre-rolled list, no minions
      const key = run.gauntletBosses[run.room - 1] || pick(w.gauntletPool);
      spawnGauntletBoss(key);
      Audio2.boss(); flash("★ ELITE FOUR: " + BOSS_DEFS[key].name, "#d66ff0");
    }
    return;
  }
  const isBoss = run.room >= run.roomsInWorld;
  genObstacles(w, isBoss || run.eliteRoom);
  if (isBoss) { spawnBoss(w); Audio2.boss(); flash("⚠ BOSS: " + BOSS_DEFS[w.boss].name, "#ff6a6a"); }
  else if (run.eliteRoom) { spawnElite(w); Audio2.boss(); flash("★ ELITE: " + ELITE_DEFS[w.elite].name, "#ffd95e"); }
  else spawnRoomEnemies(w);
}

function spawnElite(w) {
  // pick one of the world's sub-bosses at random (each world has two)
  const key = (w.elites && w.elites.length) ? pick(w.elites) : w.elite;
  const d = ELITE_DEFS[key];
  const diff = difficulty();
  const hpScale = 0.85 + run.world * 0.12;
  enemies.push({
    type: key, name: d.name, elite: true,
    x: ARENA.cx, y: ARENA.y + 110, r: d.r,
    hp: Math.round(d.hp * hpScale), maxHp: Math.round(d.hp * hpScale),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: d.kind,
    color: d.color, color2: d.color2, accent: d.accent, sd: d.sd,
    touchCd: 0, touchCdMax: d.touchCd, shootCd: rand(0.4, d.shootCd || 1.5),
    shootCdMax: d.shootCd || 1.5, projSpeed: d.projSpeed || 3.5,
    burn: 0, hurtFlash: 0, bob: rand(0, 6), kb: { x: 0, y: 0 },
    chargeT: 0, charging: false, boss: false,
    rockCd: rand(1.5, 2.5), rockWind: 0,
  });
  // a couple of minions to support the sub-boss
  const minions = 2 + run.world;
  for (let i = 0; i < minions; i++) spawnEnemy(pick(w.enemies), diff);
}

// ---- Obstacles -------------------------------------------------------------
function genObstacles(w, isBoss) {
  obstacles = [];
  const count = isBoss ? 2 : randi(3, 5);
  const startZone = { x: ARENA.x + 60, y: ARENA.cy }; // keep player spawn clear
  let tries = 0;
  while (obstacles.length < count && tries < 200) {
    tries++;
    const ow = rand(50, 92), oh = rand(46, 84);
    const ox = rand(ARENA.x + 40, ARENA.r - 110 - ow); // leave the right gate column clear
    const oy = rand(ARENA.y + 40, ARENA.b - 40 - oh);
    const cx = ox + ow / 2, cy = oy + oh / 2;
    // keep spawn area and arena center lanes navigable
    if (dist(cx, cy, startZone.x, startZone.y) < 150) continue;
    if (isBoss && dist(cx, cy, ARENA.cx, ARENA.cy) < 170) continue;
    let overlap = false;
    // keep gaps wider than the player's diameter (r=16 → 32) so they can't be
    // squeezed into an impassable pocket between two obstacles
    const margin = 44;
    for (const o of obstacles) {
      if (ox < o.x + o.w + margin && ox + ow + margin > o.x && oy < o.y + o.h + margin && oy + oh + margin > o.y) { overlap = true; break; }
    }
    if (overlap) continue;
    obstacles.push({ x: ox, y: oy, w: ow, h: oh, seed: rand(0, 1000) });
  }
}

// Push a circular entity {x,y,r} out of any obstacle it overlaps.
function resolveObstacles(ent) {
  // Iterate a few times: ejecting from one obstacle can push into another,
  // so repeat until stable (prevents tunneling through tight corners).
  for (let pass = 0; pass < 3; pass++) {
    let moved = false;
    for (const o of obstacles) {
      const nx = clamp(ent.x, o.x, o.x + o.w);
      const ny = clamp(ent.y, o.y, o.y + o.h);
      let dx = ent.x - nx, dy = ent.y - ny;
      let d2 = dx * dx + dy * dy;
      if (d2 < ent.r * ent.r) {
        moved = true;
        if (d2 > 0.0001) {
          const d = Math.sqrt(d2);
          ent.x = nx + (dx / d) * ent.r;
          ent.y = ny + (dy / d) * ent.r;
        } else {
          // center inside the rect: eject along the shallowest axis
          const left = ent.x - o.x, right = o.x + o.w - ent.x;
          const top = ent.y - o.y, bottom = o.y + o.h - ent.y;
          const m = Math.min(left, right, top, bottom);
          if (m === left) ent.x = o.x - ent.r;
          else if (m === right) ent.x = o.x + o.w + ent.r;
          else if (m === top) ent.y = o.y - ent.r;
          else ent.y = o.y + o.h + ent.r;
        }
      }
    }
    // keep inside the arena after ejection
    ent.x = clamp(ent.x, ARENA.x + ent.r, ARENA.r - ent.r);
    ent.y = clamp(ent.y, ARENA.y + ent.r, ARENA.b - ent.r);
    if (!moved) break;
  }
}

function hitsObstacle(x, y, r) {
  for (const o of obstacles) {
    const nx = clamp(x, o.x, o.x + o.w), ny = clamp(y, o.y, o.y + o.h);
    const dx = x - nx, dy = y - ny;
    if (dx * dx + dy * dy < r * r) return true;
  }
  return false;
}

function difficulty() {
  // global difficulty grows slowly across rooms and worlds
  const w = WORLDS[run.world];
  const roomScale = 1 + run.room * 0.06;
  return { hp: w.hpMul * roomScale, dmg: w.dmgMul * (1 + run.room * 0.03) };
}

function spawnRoomEnemies(w) {
  const diff = difficulty();
  const count = clamp(3 + run.room + run.world, 3, 9);
  for (let i = 0; i < count; i++) {
    const type = pick(w.enemies);
    spawnEnemy(type, diff);
  }
}

function spawnEnemy(type, diff) {
  const d = ENEMY_DEFS[type];
  let x, y, tries = 0;
  do {
    x = rand(ARENA.x + 30, ARENA.r - 30);
    y = rand(ARENA.y + 30, ARENA.b - 30);
    tries++;
  } while ((dist(x, y, player.x, player.y) < 180 || hitsObstacle(x, y, d.r + 6)) && tries < 40);
  enemies.push({
    type, name: d.name, x, y, r: d.r,
    hp: Math.round(d.hp * diff.hp), maxHp: Math.round(d.hp * diff.hp),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: d.kind,
    color: d.color, color2: d.color2, sd: d.sd,
    touchCd: 0, touchCdMax: d.touchCd, shootCd: rand(0.5, d.shootCd || 2),
    shootCdMax: d.shootCd || 2, projSpeed: d.projSpeed || 3,
    burn: 0, hurtFlash: 0, bob: rand(0, 6), kb: { x: 0, y: 0 },
    chargeT: 0, charging: false, boss: false,
  });
}

function spawnGauntletBoss(key) {
  const d = BOSS_DEFS[key];
  const diff = difficulty();
  // sub-bosses a touch easier than the final boss; MewTwo full strength
  const hpMul = key === "mewtwo" ? 1.0 : 0.62;
  enemies.push({
    type: key, name: d.name, boss: true, subBoss: !!d.subBoss, finalBoss: key === "mewtwo",
    x: ARENA.cx, y: ARENA.y + 120, r: d.r,
    hp: Math.round(d.hp * hpMul), maxHp: Math.round(d.hp * hpMul),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: "boss",
    color: d.color, color2: d.color2, accent: d.accent, sd: d.sd, element: d.element || "wind",
    touchCd: 0, touchCdMax: 0.8, burn: 0, hurtFlash: 0, bob: 0, kb: { x: 0, y: 0 },
    phase: 0, atkTimer: 1.5, atkIndex: 0, moveTimer: 0, tx: ARENA.cx, ty: ARENA.cy,
  });
}

function spawnBoss(w) {
  const d = BOSS_DEFS[w.boss];
  const diff = difficulty();
  enemies.push({
    type: w.boss, name: d.name, boss: true,
    x: ARENA.cx, y: ARENA.y + 120, r: d.r,
    hp: Math.round(d.hp * (0.8 + run.world * 0.1)), maxHp: Math.round(d.hp * (0.8 + run.world * 0.1)),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: "boss",
    color: d.color, color2: d.color2, accent: d.accent, sd: d.sd, element: d.element || "wind",
    touchCd: 0, touchCdMax: 0.8, burn: 0, hurtFlash: 0, bob: 0, kb: { x: 0, y: 0 },
    phase: 0, atkTimer: 1.5, atkIndex: 0, moveTimer: 0, tx: ARENA.cx, ty: ARENA.cy,
  });
}

function onRoomCleared() {
  run.cleared = true;
  let eliteJustCleared = false;
  // elite sub-boss reward: greater boon + a small health pickup (+25)
  if (run.eliteRoom) {
    run.eliteRoom = false;
    eliteJustCleared = true;
    if (run.pendingEliteBoon) { applyBoon(run.pendingEliteBoon, true); run.pendingEliteBoon = null; }
    // spawn a +25 health orb near the player to grab
    pickups.push({ x: clamp(player.x + 40, ARENA.x + 20, ARENA.r - 20), y: player.y, r: 8, vy: 0, t: 0, value: 25, type: "health" });
    spawnParticles(player.x, player.y, "#ffd95e", 26);
    Audio2.boon();
  }
  if (run.room >= run.roomsInWorld) {
    // boss cleared -> next world or win
    bossCleared();
    return;
  }
  openGates();
  flash(eliteJustCleared ? "★ GREATER BOON + ♥ HEALTH!" : "ROOM CLEAR", eliteJustCleared ? "#ffd95e" : WORLDS[run.world].accent);
}

// Antechamber: present a choice of 3 powerful prep boons as gates. Walking through
// one grants it and advances to the first sub-boss.
function openGauntletBoonGate() {
  const pool = GAUNTLET_BOONS.slice();
  for (let i = pool.length - 1; i > 0; i--) { const j = randi(0, i); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  const chosen = pool.slice(0, 3);
  gates = [];
  const gapY = ARENA.h / 4;
  for (let i = 0; i < 3; i++) {
    gates.push({ x: ARENA.r - 6, y: ARENA.y + gapY * (i + 1), w: 46, h: 92, boon: chosen[i], glow: 0, elite: false, helper: null, gauntletPrep: true });
  }
}

function openGates() {
  const n = randi(2, 3);
  // only offer boons unlocked for the current world, and not already maxed-out
  const owns = (id) => player.boons.filter(b => b.id === id).length;
  // Piercing Shot and Volatile Special are contradictory (pass-through vs blow-up on
  // first hit). Once the player has committed to one, stop offering the other.
  const hasPierce = owns("pierce") > 0, hasExplode = owns("explo") > 0;
  const pool = BOONS.filter(b => {
    if ((b.minWorld || 0) > run.world) return false;
    if (b.maxStacks && owns(b.id) >= b.maxStacks) return false;
    if (b.id === "pierce" && hasExplode) return false;
    if (b.id === "explo" && hasPierce) return false;
    return true;
  });
  // shuffle
  for (let i = pool.length - 1; i > 0; i--) { const j = randi(0, i); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  // When the player is hurt, gently float a healing boon (Vitality / Second Wind) toward
  // the front so survival options actually show up when they matter, instead of being
  // lost in the now-large boon pool.
  if (player.hp / player.maxHp() < 0.6 && Math.random() < 0.6) {
    const healIdx = pool.findIndex(b => b.id === "vital" || b.id === "wind");
    if (healIdx > 0) { const h = pool.splice(healIdx, 1)[0]; pool.unshift(h); }
  }
  const chosen = pool.slice(0, n);
  gates = [];
  // Offer an ELITE gate at most once per cleared room, only while the world's
  // sub-boss budget (1–2 per world) remains, and never as the room before the boss.
  const roomsLeft = run.roomsInWorld - (run.room + 1); // normal rooms remaining after this choice
  const budgetLeft = run.eliteBudget - run.elitesTaken;
  const canElite = !run.gauntlet && budgetLeft > 0 && roomsLeft >= 1;
  // ~35% per eligible room; rises if the remaining rooms are just enough to spend the budget
  let eliteChance = 0.35;
  if (canElite && budgetLeft >= roomsLeft) eliteChance = 0.85;
  const eliteIdx = (canElite && Math.random() < eliteChance) ? randi(0, n - 1) : -1;
  // Offer a HELPER (friend) gate at most once per world, and only occasionally —
  // a friend should feel like a treat, not a near-guaranteed appearance.
  let helperIdx = -1;
  const canHelper = !run.gauntlet && !run.helperUsedThisWorld && !helper;
  if (canHelper && Math.random() < 0.3) {
    const choices = [];
    for (let i = 0; i < n; i++) if (i !== eliteIdx) choices.push(i);
    if (choices.length) helperIdx = pick(choices);
  }
  const helperKey = pick(Object.keys(HELPER_DEFS));
  const gapY = ARENA.h / (n + 1);
  for (let i = 0; i < n; i++) {
    gates.push({
      x: ARENA.r - 6, y: ARENA.y + gapY * (i + 1),
      w: 46, h: (i === eliteIdx || i === helperIdx) ? 92 : 76, boon: chosen[i], glow: 0,
      elite: i === eliteIdx,
      helper: i === helperIdx ? helperKey : null,
    });
  }
}

function takeGate(gate) {
  gates = [];
  run.room++;
  if (gate.helper) {
    // summon the friend for the rest of this world, then proceed normally
    summonHelper(gate.helper);
    run.helperUsedThisWorld = true;
    applyBoon(gate.boon); // still grant the room's boon
    enterRoom();
  } else if (gate.elite) {
    // Don't grant the boon yet — it's earned by clearing the sub-boss room.
    run.eliteRoom = true;
    run.pendingEliteBoon = gate.boon;
    run.elitesTaken++;
    enterRoom();
  } else {
    applyBoon(gate.boon);
    enterRoom();
  }
}

function summonHelper(key) {
  const d = HELPER_DEFS[key];
  helper = {
    key, name: d.name, color: d.color, color2: d.color2,
    room: run.room,        // the single stage this friend helps with
    x: player.x - 30, y: player.y, r: 13, bob: rand(0, 6),
    hp: 150, maxHp: 150,   // friends can be defeated
    hurtFlash: 0, invuln: 0,
    zapCd: 1.0,            // pikachu attack timer
    singCd: 0,             // jigglypuff: ready to sing immediately in a room
    singUsedThisRoom: false,
    flashT: 0.8,           // arrival sparkle
  };
  flash("✦ " + d.name + " joined for this stage!", d.color);
  spawnParticles(player.x, player.y, d.color, 24);
  Audio2.boon();
}

// Damage the helper; it can be defeated and will leave.
function hurtHelper(amount) {
  if (!helper || helper.invuln > 0) return;
  helper.hp -= amount;
  helper.hurtFlash = 0.25;
  helper.invuln = 0.4; // brief grace so it isn't melted in one frame
  floater(helper.x, helper.y - helper.r - 8, "-" + Math.round(amount), "#ff8a8a");
  if (helper.hp <= 0) {
    floater(helper.x, helper.y - helper.r - 10, helper.name + " fainted!", helper.color);
    spawnParticles(helper.x, helper.y, helper.color, 24);
    flash(helper.name + " fainted!", "#ff8a8a");
    Audio2.hurt();
    helper = null;
  }
}

function bossCleared() {
  meta.bestWorld = Math.max(meta.bestWorld, run.world + 1);
  if (run.world >= WORLDS.length - 1) {
    // WIN
    endRun(true);
  } else {
    // Begin the evolution cutscene. The world advance happens when it finishes
    // (see finishEvolution), so the moment gets its own spotlight.
    startEvolution();
  }
}

function startEvolution() {
  const evo = player.s.evo;
  if (!evo || player.evoStage >= evo.length - 1) {
    // Already fully evolved (e.g. Charizard finishing world 3+): no evolution to show,
    // but still give a short "stage cleared" transition like the evolution worlds do.
    enemies = []; projectiles = []; pickups = []; gates = []; floaters = []; telegraphs = []; waves = []; hazards = []; bursts = [];
    player.x = ARENA.cx; player.y = ARENA.cy; player.facing = 0;
    player.invuln = 999;
    evoSequence = { t: 0, dur: 2.0, banner: true, key: player.key, color: evo ? evo[player.evoStage].color : "#fff", fromStage: player.evoStage, toStage: player.evoStage, applied: true, ringT: 0 };
    Audio2.boss();
    return;
  }
  const fromStage = player.evoStage;
  const toStage = player.evoStage + 1;
  enemies = []; projectiles = []; pickups = []; gates = []; floaters = []; telegraphs = []; waves = []; hazards = [];
  player.x = ARENA.cx; player.y = ARENA.cy; player.facing = 0;
  player.invuln = 999;
  evoSequence = {
    t: 0, dur: 3.4,
    key: player.key, fromStage, toStage,
    fromName: evo[fromStage].name, toName: evo[toStage].name,
    color: evo[toStage].color, applied: false, ringT: 0,
  };
  Audio2.boss();
}

// advance the player's actual stage at the climax of the cutscene
function applyEvolutionStage() {
  if (evoSequence && !evoSequence.applied) {
    const prevMax = player.maxHp();
    player.evoStage = evoSequence.toStage;
    // grant the HP gained from the stat bump so the bar grows, not shrinks
    const gained = player.maxHp() - prevMax;
    if (gained > 0) player.hp += gained;
    player.hp = clamp(player.hp, 0, player.maxHp());
    player.evoAnim = 1.6;
    evoSequence.applied = true;
    spawnParticles(player.x, player.y, "#ffffff", 60);
    spawnParticles(player.x, player.y, evoSequence.color, 40);
    Audio2.boon(); Audio2.boss();
  }
}

function finishEvolution() {
  evoSequence = null;
  player.invuln = 1.0;
  run.world++;
  run.room = 0;
  run.eliteBudget = randi(1, 2);
  run.elitesTaken = 0;
  run.helperUsedThisWorld = false;
  run.pendingHelper = null;
  helper = null; // friends part ways at the end of their world
  const w = WORLDS[run.world];
  if (w.gauntlet) {
    // Boss gauntlet: room 0 = boon antechamber, rooms 1..4 = random sub-bosses,
    // room 5 = MewTwo. roomsInWorld points at the final-boss room index.
    run.gauntlet = true;
    run.roomsInWorld = 5;
    // pick 4 distinct sub-bosses from the pool, in random order
    const poolc = w.gauntletPool.slice();
    for (let i = poolc.length - 1; i > 0; i--) { const j = randi(0, i); [poolc[i], poolc[j]] = [poolc[j], poolc[i]]; }
    run.gauntletBosses = poolc.slice(0, 4);
  } else {
    run.gauntlet = false;
    run.roomsInWorld = randi(5, 7);
  }
  enterRoom();
  flash("WORLD " + (run.world + 1) + " — " + WORLDS[run.world].short, WORLDS[run.world].accent);
}

// kept for compatibility / head-start usage: instant evolve with no cutscene
function evolvePlayer() {
  const evo = player.s.evo;
  if (!evo || player.evoStage >= evo.length - 1) return;
  player.evoStage++;
  player.evoAnim = 1.6;
  player.invuln = Math.max(player.invuln, 1.0);
  const name = evo[player.evoStage].name;
  flash("✦ EVOLVED INTO " + name.toUpperCase() + "!", "#ffe14d");
  spawnParticles(player.x, player.y, "#ffffff", 40);
  spawnParticles(player.x, player.y, evo[player.evoStage].color, 30);
  Audio2.boon(); Audio2.boss();
}

function endRun(won) {
  const earned = Math.round(run.stardust * (1 + meta.upgrades.fortune * 0.15));
  run.earned = earned;
  meta.stardust += earned;
  if (won) meta.wins++;
  shake = 0; timeScale = 1;
  state = won ? STATE.WIN : STATE.DEAD;
  if (won) Audio2.boss(); else Audio2.die();
  Persist.save("pokerogue_meta", meta); // fire-and-forget; state already updated
}

// ----------------------------------------------------------------------------
// Combat helpers
// ----------------------------------------------------------------------------
function flash(text, color) { flashMsg = { text, t: 1.8, color: color || "#fff" }; }

function floater(x, y, text, color, big) {
  floaters.push({ x, y, vy: -28, t: 0.9, text, color: color || "#fff", big: !!big });
}

function damageEnemy(e, amount, opts) {
  opts = opts || {};
  let dmg = amount;
  let crit = false;
  if (!opts.noCrit && Math.random() < player.mods.crit) { dmg *= 2; crit = true; }
  // Frostbite synergy: extra damage to enemies already suffering a status
  if (player.mods.ailmentDmg > 0 && (e.burn > 0 || e.frozen > 0 || e.poison > 0)) dmg *= (1 + player.mods.ailmentDmg);
  dmg = Math.round(dmg);
  e.hp -= dmg;
  e.hurtFlash = 0.12;
  floater(e.x, e.y - e.r - 6, dmg + (crit ? "!" : ""), crit ? "#ffe14d" : "#ffffff", crit || e.boss);
  if (player.mods.lifesteal > 0 && opts.melee) player.heal(dmg * player.mods.lifesteal);
  Audio2.hit();
  spawnParticles(e.x, e.y, e.color, crit ? 10 : 5);
  if (opts.knockback) { const a = Math.atan2(e.y - player.y, e.x - player.x); e.kb.x += Math.cos(a) * opts.knockback; e.kb.y += Math.sin(a) * opts.knockback; }
  if (opts.melee && player.mods.statusOnHit) applyStarterStatus(e);
  if (e.hp <= 0) killEnemy(e);
}

// "Elemental Touch" boon: Charmander burns, Squirtle freezes, Bulbasaur poisons.
// Tier (statusTier) lengthens the effect; tier 3 spreads it on enemy death.
function applyStarterStatus(e) {
  const boss = e.boss;
  const tier = player.mods.statusTier || 1;
  const mul = 1 + (tier - 1) * 0.5; // tier1 1×, tier2 1.5×, tier3 2×
  if (player.key === "charmander") { e.burn = Math.max(e.burn || 0, (boss ? 1.4 : 2.2) * mul); }
  else if (player.key === "squirtle") { e.frozen = Math.max(e.frozen || 0, (boss ? 0.8 : 2.0) * mul); }
  else if (player.key === "bulbasaur") { e.poison = Math.max(e.poison || 0, (boss ? 1.2 : 3.0) * mul); }
}

// At tier 3+, a dying ailing enemy spreads its status to the nearest other enemy.
function spreadStatusOnDeath(e) {
  if ((player.mods.statusTier || 0) < 3) return;
  const ail = e.burn > 0 ? "burn" : e.frozen > 0 ? "frozen" : e.poison > 0 ? "poison" : null;
  if (!ail) return;
  let best = null, bd = 1e9;
  for (const o of enemies) { if (o === e || o.dead || o.burrow) continue; const d = dist2(e.x, e.y, o.x, o.y); if (d < bd) { bd = d; best = o; } }
  if (best && bd < 220 * 220) {
    if (ail === "burn") best.burn = Math.max(best.burn || 0, 2.0);
    else if (ail === "frozen") best.frozen = Math.max(best.frozen || 0, 1.6);
    else best.poison = Math.max(best.poison || 0, 2.4);
    spawnParticles(best.x, best.y, ail === "burn" ? "#ff8c4d" : ail === "frozen" ? "#9fe6ff" : "#8fcf5a", 6);
  }
}

// transient expanding shockwave ring (purely visual)
function hazardlessBurstFx(x, y, r, tier) {
  bursts.push({ x, y, r, t: 0.32, max: 0.32, color: tier >= 3 ? "#ff5a2c" : "#ff8c4d" });
}

function killEnemy(e) {
  // Voltorb: instead of dying, it arms and self-destructs after a short warning.
  if (e.type === "voltorb" && e.fuse == null && !e._burst) {
    e.fuse = 0.7; e.hp = 1; // freeze at 1 HP while the fuse burns
    spawnTelegraph({ x: e.x, y: e.y, r: 80, delay: 0.95, dmg: e.dmg * 1.6, color: "#ffe14d", bolt: true });
    Audio2.boss();
    return;
  }
  e.dead = true;
  spreadStatusOnDeath(e);
  // Volatile Remains boon: a fiery splash that damages nearby enemies on death.
  // Scales with how many copies were taken (bigger radius + harder hit each tier).
  if (player.mods.deathBurst && !e.boss) {
    const tier = Math.min(player.mods.burstTier || 1, 3);
    const br = 56 + (tier - 1) * 18;
    const bd = Math.max(8, Math.round((e.maxHp || 20) * (0.16 + tier * 0.06)));
    let hitAny = false;
    for (const o of enemies) {
      if (o === e || o.dead || o.burrow || o.blink) continue;
      if (dist(e.x, e.y, o.x, o.y) < br + o.r) { damageEnemy(o, bd, { noCrit: true }); hitAny = true; }
    }
    // visible blast: shockwave ring + embers, scaled by tier
    hazardlessBurstFx(e.x, e.y, br, tier);
    if (hitAny) spawnParticles(e.x, e.y, "#ffce6a", 8 + tier * 4);
  }
  spawnParticles(e.x, e.y, e.color, e.boss ? 40 : e.elite ? 28 : 12);
  run.kills++;
  const sd = Math.max(1, Math.round(e.sd * 0.55 * (1 + player.mods.greed)));
  if (e.elite) {
    // sub-boss drops several stardust motes
    for (let i = 0; i < 4; i++) pickups.push({ x: e.x + rand(-20, 20), y: e.y + rand(-20, 20), r: 7, vy: 0, t: 0, value: Math.round(sd / 4), type: "stardust" });
  } else {
    pickups.push({ x: e.x, y: e.y, r: 7, vy: 0, t: 0, value: sd, type: "stardust" });
  }
  if (e.boss || e.elite) shake = e.boss ? 0.5 : 0.35;
}

const MAX_PARTICLES = 150; // hard cap: keeps per-frame draw cost bounded during chaos
function spawnParticles(x, y, color, n) {
  // scale the burst down if we're already near the cap, so big simultaneous
  // bursts (explosions + trail + hazards) can't balloon the particle list
  const room = MAX_PARTICLES - particles.length;
  if (room <= 0) return;
  if (n > room) n = room;
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), sp = rand(0.5, 4);
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: rand(1.5, 4), t: rand(0.3, 0.7), color });
  }
}
// guarded push for the ad-hoc particle spawns scattered through the code
function pushParticle(p) { if (particles.length < MAX_PARTICLES) particles.push(p); }

const MAX_PROJECTILES = 110; // hard cap so dense fire + pierce/ricochet can't freeze the game
function spawnProjectile(o) {
  if (projectiles.length >= MAX_PROJECTILES) return;
  projectiles.push(Object.assign({ r: 7, life: 2.5, pierce: false, hits: [], owner: "player", explode: false, burn: false }, o));
}

// Retaliation boon: a burst of the player's element around them when struck,
// damaging and status-applying nearby foes. Scales with how many copies taken.
function retaliationNova() {
  const tier = player.mods.retaliate;
  const r = 90 + tier * 25;
  const dmg = Math.round(player.atkDamage() * (0.6 + tier * 0.35));
  const col = player.key === "squirtle" ? "#9fe6ff" : player.key === "bulbasaur" ? "#8fcf5a" : "#ff8c4d";
  for (const e of enemies) {
    if (e.dead || e.burrow || e.blink) continue;
    if (dist(player.x, player.y, e.x, e.y) <= r + e.r) {
      damageEnemy(e, dmg, { noCrit: true });
      if (player.key === "charmander") e.burn = Math.max(e.burn || 0, 1.8);
      else if (player.key === "squirtle") e.frozen = Math.max(e.frozen || 0, 1.2);
      else e.poison = Math.max(e.poison || 0, 2.0);
    }
  }
  spawnParticles(player.x, player.y, col, 22);
  player.novaFx = { t: 0.35, r };
}

function hurtPlayer(amount) {
  if (player.invuln > 0 || player.dashing) return;
  // Aegis Bubble: consume a shield to fully negate the hit (brief i-frames after)
  if (player.bubble > 0) {
    player.bubble--;
    player.invuln = 0.7;
    spawnParticles(player.x, player.y, "#8fd0ff", 18);
    flash("SHIELD!", "#8fd0ff");
    if (player.mods.retaliate > 0) retaliationNova();
    return;
  }
  let dmg = Math.round(amount * player.mods.dmgTaken);
  player.hp -= dmg;
  player.invuln = 0.6;
  player.hurtFlash = 0.3;
  shake = Math.max(shake, 0.35);
  Audio2.hurt();
  floater(player.x, player.y - player.r - 8, "-" + dmg, "#ff6a6a");
  // Retaliation: when actually hurt, blast your element in a ring around you
  if (player.mods.retaliate > 0) retaliationNova();
  if (player.hp <= 0) {
    // Last Stand: cling to 1 HP a limited number of times per room
    if (player.mods.lastStand > 0 && player.lastStandUsed < player.mods.lastStand) {
      player.lastStandUsed++; player.hp = 1; player.invuln = 1.0;
      flash("LAST STAND!", "#7df0a0"); spawnParticles(player.x, player.y, "#7df0a0", 20);
      return;
    }
    if (player.revives > 0) { player.revives--; player.hp = Math.round(player.maxHp() * 0.5); player.invuln = 1.5; flash("REVIVED!", "#7df0a0"); spawnParticles(player.x, player.y, "#7df0a0", 30); }
    else { endRun(false); }
  }
}

// ----------------------------------------------------------------------------
// Player actions
// ----------------------------------------------------------------------------
function doAttack() {
  if (player.atkTimer > 0) return;
  player.atkTimer = player.atkCooldown();
  player.swing = 0.18;
  player.swingDir *= -1;
  player.atkFx = { t: 0.22, dur: 0.22, dir: player.facing };
  Audio2.attack();
  const range = player.base.atkRange * player.mods.range, arc = player.base.atkArc * player.mods.arc;
  const dmg = player.atkDamage();
  for (const e of enemies) {
    if (e.burrow || e.blink) continue; // underground — can't be struck
    const d = dist(player.x, player.y, e.x, e.y);
    if (d <= range + e.r) {
      const a = Math.atan2(e.y - player.y, e.x - player.x);
      if (Math.abs(angDiff(a, player.facing)) <= arc / 1.4) {
        damageEnemy(e, dmg, { melee: true, knockback: player.key === "squirtle" ? 8 : 3 });
      }
    }
  }
  // Overcharge: every Nth basic attack unleashes a free Special (ignores its cooldown)
  if (player.mods.overcharge > 0) {
    player.overchargeCount++;
    if (player.overchargeCount >= player.mods.overcharge) {
      player.overchargeCount = 0;
      const savedCd = player.spTimer; player.spTimer = 0;
      doSpecial();
      player.spTimer = savedCd; // don't consume the manual special's cooldown
      flash("OVERCHARGE!", "#ffe14d");
    }
  }
}

function doSpecial() {
  if (player.spTimer > 0) return;
  player.spTimer = player.base.spCd;
  Audio2.special();
  const dmg = player.spDamage();
  const type = player.s.special;
  const base = player.facing;
  const explode = player.mods.explode, pierce = player.mods.pierce;
  const st = player.evoStage; // 0,1,2 — evolution-driven ability upgrades
  const projStart = projectiles.length; // tag projectiles spawned by this special
  if (type === "fireball") {
    // Charmander line: +1 fireball at stage 1.
    // CHARIZARD (stage 2) signature: hurls a single huge slow METEOR that pierces,
    // leaves a burning hazard trail, and detonates in a massive blast.
    if (st >= 2) {
      const a = base;
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 4.2, vy: Math.sin(a) * 4.2, r: 20, dmg: dmg * 1.5, life: 2.2, color: "#ff6a1c", trail: "#ffce6a", explode: true, burn: true, pierce: true, big: true, blast: 130, meteor: true });
      // a couple of small embers alongside for flavor + coverage
      for (const off of [-0.28, 0.28]) spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a + off) * 6, vy: Math.sin(a + off) * 6, r: 9, dmg: dmg * 0.6, life: 1.4, color: "#ff7a2c", trail: "#ffd27a", explode: true, burn: true, blast: 60 });
    } else {
      const n = 1 + player.mods.multishot + (st >= 1 ? 1 : 0);
      const radius = 11;
      for (let i = 0; i < n; i++) {
        const a = base + (i - (n - 1) / 2) * 0.14;
        spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 6, vy: Math.sin(a) * 6, r: radius, dmg, life: 1.6, color: "#ff7a2c", trail: "#ffd27a", explode: true, burn: true, pierce, big: true, blast: 60 });
      }
    }
  } else if (type === "aqua") {
    // Squirtle line: +1 jet at stage 1 (stronger knockback).
    // BLASTOISE (stage 2): the central jet becomes a heavy HYDRO PUMP beam, and ALL
    // the other jets still fire alongside it (so multishot keeps scaling the volley).
    const n = 3 + player.mods.multishot + (st >= 1 ? 1 : 0);
    const kb = 4 + st * 2;
    if (st >= 2) {
      // central beam (counts as the middle jet) + the remaining n-1 jets fanned around it
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(base) * 9, vy: Math.sin(base) * 9, r: 17, dmg: dmg * 1.7, life: 1.7, color: "#3f9fe0", trail: "#cfeefb", explode, pierce: true, knockback: 18, big: true, hydro: true });
      const rest = n - 1;
      for (let i = 0; i < rest; i++) {
        // fan the side jets symmetrically around the beam, skipping dead-center
        const off = (i - (rest - 1) / 2) * 0.26;
        const a = base + (Math.abs(off) < 0.01 ? 0.13 : off);
        spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 7, vy: Math.sin(a) * 7, r: 8, dmg, life: 1.3, color: "#56b0e0", trail: "#cfeefb", explode, pierce, knockback: kb });
      }
    } else {
      for (let i = 0; i < n; i++) {
        const a = base + (i - (n - 1) / 2) * 0.22;
        spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 7, vy: Math.sin(a) * 7, r: 8, dmg, life: 1.3, color: "#56b0e0", trail: "#cfeefb", explode, pierce, knockback: kb });
      }
    }
  } else if (type === "leaf") {
    // Bulbasaur line: +1 leaf at stage 1; at stage 2 a wider fan + leaves seek slightly
    const n = 5 + player.mods.multishot + (st >= 1 ? 1 : 0);
    const spread = st >= 2 ? 0.20 : 0.16;
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * spread;
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 7.5, vy: Math.sin(a) * 7.5, r: 7, dmg, life: 1.4, color: "#6fc28b", trail: "#d8f2c8", explode, pierce: true, leaf: true, seek: st >= 2 ? 0.04 : 0 });
    }
  }
  // apply boon modifiers to every projectile this special just spawned
  for (let i = projStart; i < projectiles.length; i++) {
    const pr = projectiles[i];
    if (pr.pierce) pr.maxPierce = (pr.maxPierce || 1) + (player.mods.pierceCount - 1);
    if (pr.explode && player.mods.blastBonus) pr.blast = (pr.blast || 60) + player.mods.blastBonus;
    if (player.mods.ricochet) pr.bounceLeft = player.mods.ricochet;
  }
}

function doDash() {
  if (player.dashCdTimer > 0 || player.dashing) return;
  let dx = 0, dy = 0;
  if (keys["a"] || keys["arrowleft"]) dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;
  if (keys["w"] || keys["arrowup"]) dy -= 1;
  if (keys["s"] || keys["arrowdown"]) dy += 1;
  if (touch.move.active) { dx = touch.move.dx; dy = touch.move.dy; }
  if (dx === 0 && dy === 0) { dx = Math.cos(player.facing); dy = Math.sin(player.facing); }
  const m = Math.hypot(dx, dy) || 1;
  player.dashVx = dx / m; player.dashVy = dy / m;
  player.dashing = true;
  player.dashTimer = 0.16;
  player.dashCdTimer = player.dashCooldown();
  player.invuln = Math.max(player.invuln, player.dashIframes());
  Audio2.dash();
  spawnParticles(player.x, player.y, player.s.color2, 8);
}

// ----------------------------------------------------------------------------
// Update
// ----------------------------------------------------------------------------
function updateEvolution(dt) {
  const seq = evoSequence;
  seq.t += dt;
  frameScale = clamp(dt * 60, 0.1, 3);
  player.bob += dt * 8;
  if (player.evoAnim > 0) player.evoAnim -= dt;
  // Banner-only transition (already fully evolved): just hold the "stage cleared" card.
  if (seq.banner) {
    for (const pt of particles) { pt.x += pt.vx * frameScale; pt.y += pt.vy * frameScale; pt.t -= dt; }
    particles = particles.filter(pt => pt.t > 0);
    clearEdges();
    if (seq.t >= seq.dur) finishEvolution();
    return;
  }
  const f = seq.t / seq.dur;
  // swirling energy particles converging on the player during build-up
  if (f < 0.55 && Math.random() < 0.7 && particles.length < MAX_PARTICLES) {
    const a = rand(0, Math.PI * 2), d = rand(70, 150);
    particles.push({ x: player.x + Math.cos(a) * d, y: player.y + Math.sin(a) * d,
      vx: -Math.cos(a) * rand(2, 4), vy: -Math.sin(a) * rand(2, 4),
      r: rand(2, 4), t: rand(0.3, 0.6), color: Math.random() < 0.5 ? "#ffffff" : seq.color });
  }
  // climax: apply the actual stage change + shockwave
  if (f >= 0.55) { applyEvolutionStage(); seq.ringT += dt; shake = Math.max(shake, 0.12); }
  // burst of celebratory particles right at the reveal
  if (seq.applied && !seq._burst) { seq._burst = true; for (let i = 0; i < 30 && particles.length < MAX_PARTICLES; i++) { const a = rand(0, 6.28), sp = rand(3, 7); particles.push({ x: player.x, y: player.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: rand(2, 5), t: rand(0.5, 0.9), color: i % 2 ? "#fff" : seq.color }); } }
  // advance particles so they animate during the freeze
  for (const pt of particles) { pt.x += pt.vx * frameScale; pt.y += pt.vy * frameScale; pt.vx *= Math.pow(0.92, frameScale); pt.vy *= Math.pow(0.92, frameScale); pt.t -= dt; }
  particles = particles.filter(pt => pt.t > 0);
  clearEdges();
  if (seq.t >= seq.dur) finishEvolution();
}

function update(dt) {
  if (state !== STATE.PLAY) return;

  // Evolution cutscene takes over the update loop while active.
  if (evoSequence) {
    updateEvolution(dt);
    return;
  }

  // timers
  if (shake > 0) shake = Math.max(0, shake - dt);
  if (flashMsg) { flashMsg.t -= dt; if (flashMsg.t <= 0) flashMsg = null; }

  const p = player;
  // motion factor: 1.0 at 60fps, 0.5 at 120fps, etc. (dt already clamped to 0.05 in loop)
  frameScale = clamp(dt * 60, 0.1, 3);
  p.bob += dt * 8;
  if (p.atkTimer > 0) p.atkTimer -= dt;
  if (p.spTimer > 0) p.spTimer -= dt;
  if (p.dashCdTimer > 0) p.dashCdTimer -= dt;
  if (p.invuln > 0) p.invuln -= dt;
  if (p.swing > 0) p.swing -= dt;
  if (p.atkFx && p.atkFx.t > 0) p.atkFx.t -= dt;
  if (p.evoAnim > 0) p.evoAnim -= dt;
  if (p.hurtFlash > 0) p.hurtFlash -= dt;

  // input -> movement
  let dx = 0, dy = 0;
  if (keys["a"] || keys["arrowleft"]) dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;
  if (keys["w"] || keys["arrowup"]) dy -= 1;
  if (keys["s"] || keys["arrowdown"]) dy += 1;
  if (touch.move.active) { dx = touch.move.dx; dy = touch.move.dy; }

  if (p.dashing) {
    p.dashTimer -= dt;
    const sp = 9.5 * frameScale * MOVE_SCALE;
    p.x += p.dashVx * sp;
    p.y += p.dashVy * sp;
    if (p.mods.dashTrail) {
      // trail themed to the starter: Squirtle = freezing ice, Bulbasaur = poison mud,
      // Charmander = searing flame. Higher tier = wider, longer-lived, harder-hitting.
      let col = "#ff8c4d", status = "burn";
      if (p.key === "squirtle") { col = "#9fe6ff"; status = "freeze"; }
      else if (p.key === "bulbasaur") { col = "#8fcf5a"; status = "poison"; }
      const tier = p.mods.trailTier || 1;
      const r = 12 + (tier - 1) * 5;
      const life = 0.6 + (tier - 1) * 0.25;
      const dmg = p.atkDamage() * (0.4 + (tier - 1) * 0.25);
      particles.length < MAX_PARTICLES && particles.push({ x: p.x, y: p.y, vx: 0, vy: 0, r, t: life, color: col, trail: true, status, dmg });
    }
    if (p.dashTimer <= 0) p.dashing = false;
  } else {
    const m = Math.hypot(dx, dy);
    if (m > 0) {
      const sp = p.spd() * frameScale * MOVE_SCALE;
      p.x += (dx / m) * sp;
      p.y += (dy / m) * sp;
      p.facing = Math.atan2(dy, dx);
    }
  }
  p.x = clamp(p.x, ARENA.x + p.r, ARENA.r - p.r);
  p.y = clamp(p.y, ARENA.y + p.r, ARENA.b - p.r);
  resolveObstacles(p);

  // actions (keyboard edge + touch edge)
  if (justPressed["j"] || touchEdge.attack) doAttack();
  if (justPressed["k"] || touchEdge.special) doSpecial();
  if (justPressed[" "] || touchEdge.dash) doDash();
  // dash trail damage + status. A per-enemy cooldown caps how often the trail can
  // hit the same target, so a dense dash trail can't instantly melt a boss/elite.
  for (const pt of particles) {
    if (pt.trail && (pt.dmg || pt.status)) {
      for (const e of enemies) {
        if (e.dead || e.burrow || e.blink || dist(pt.x, pt.y, e.x, e.y) >= e.r + pt.r) continue;
        if ((e.trailHitCd || 0) > 0) continue; // still cooling down from a recent trail tick
        e.trailHitCd = 0.25; // ~4 ticks/sec max from the trail
        if (pt.dmg) {
          // tougher foes take a reduced cut so the trail chips rather than deletes them
          const mul = e.boss ? 0.35 : e.elite ? 0.6 : 1;
          damageEnemy(e, pt.dmg * mul, { noCrit: true });
        }
        if (pt.status === "burn") e.burn = Math.max(e.burn || 0, e.boss ? 1.4 : 2.2);
        else if (pt.status === "freeze") e.frozen = Math.max(e.frozen || 0, e.boss ? 0.8 : 2.0);
        else if (pt.status === "poison") e.poison = Math.max(e.poison || 0, e.boss ? 1.2 : 3.0);
      }
    }
  }

  clearEdges();

  // update enemies
  for (const e of enemies) {
    if (e.dead) continue;
    updateEnemy(e, dt);
  }
  enemies = enemies.filter(e => !e.dead);

  // helper friend
  if (helper) updateHelper(dt);

  // projectiles
  updateProjectiles(dt);

  // spot-based telegraphed attacks
  updateTelegraphs(dt);
  updateWaves(dt);
  updateHazards(dt);

  // particles
  for (const pt of particles) { pt.x += pt.vx * frameScale; pt.y += pt.vy * frameScale; pt.vx *= Math.pow(0.92, frameScale); pt.vy *= Math.pow(0.92, frameScale); pt.t -= dt; }
  particles = particles.filter(pt => pt.t > 0);

  // pickups
  for (const pk of pickups) {
    pk.t += dt;
    const d = dist(pk.x, pk.y, p.x, p.y);
    const magRange = player.mods.magnet ? 9999 : 120;
    if (d < magRange) { const a = Math.atan2(p.y - pk.y, p.x - pk.x); const spd = player.mods.magnet ? 5.0 : 3.2; pk.x += Math.cos(a) * spd * frameScale; pk.y += Math.sin(a) * spd * frameScale; }
    if (d < p.r + pk.r) { collectPickup(pk); pk.dead = true; }
  }
  pickups = pickups.filter(pk => !pk.dead);

  // floaters
  for (const f of floaters) { f.y += f.vy * dt; f.vy *= 0.94; f.t -= dt; }
  floaters = floaters.filter(f => f.t > 0);
  for (const bz of bursts) bz.t -= dt;
  bursts = bursts.filter(bz => bz.t > 0);

  // room clear check — clearing all enemies opens the gates immediately.
  // Any uncollected stardust stays on the ground to grab on the way out (optional).
  if (!run.cleared && enemies.length === 0) {
    onRoomCleared();
  }

  // gates
  for (const g of gates) {
    g.glow += dt;
    if (p.x + p.r > g.x && Math.abs(p.y - (g.y)) < g.h / 2 + 4) {
      takeGate(g);
      break;
    }
  }
}

function collectPickup(pk) {
  if (pk.type === "stardust") { run.stardust += pk.value; Audio2.pickup(); floater(pk.x, pk.y - 8, "+" + pk.value + "✦", "#ffd95e"); }
  else if (pk.type === "health") { player.heal(pk.value); Audio2.boon(); floater(pk.x, pk.y - 8, "+" + pk.value + "♥", "#ff6a8a"); spawnParticles(player.x, player.y, "#ff6a8a", 12); }
}

function updateEnemy(e, dt) {
  // Voltorb fuse: armed and counting down to self-destruct
  if (e.fuse != null) {
    e.hp = Math.max(e.hp, 1);
    e.fuse -= dt;
    if (e.fuse <= 0) { e._burst = true; spawnParticles(e.x, e.y, "#ffe14d", 24); killEnemy(e); return; }
  }
  if (e.burn > 0) { e.burn -= dt; e._burnTick = (e._burnTick || 0) - dt; if (e._burnTick <= 0) { e._burnTick = 0.4; e.hp -= 3; floater(e.x, e.y - e.r, "3", "#ff8c4d"); spawnParticles(e.x, e.y, "#ff8c4d", 2); if (e.hp <= 0) { killEnemy(e); return; } } }
  if (e.frozen > 0) e.frozen -= dt;
  if (e.trailHitCd > 0) e.trailHitCd -= dt;
  if (e.poison > 0) {
    e.poison -= dt; e._poisonTick = (e._poisonTick || 0) - dt;
    if (e._poisonTick <= 0) { e._poisonTick = 0.5; e.hp -= 4; floater(e.x, e.y - e.r, "4", "#9be07a"); spawnParticles(e.x, e.y, "#7ec84a", 2); if (e.hp <= 0) { killEnemy(e); return; } }
  }
  if (e.hurtFlash > 0) e.hurtFlash -= dt;
  if (e.touchCd > 0) e.touchCd -= dt;
  e.bob += dt * 6;
  // knockback always applies (even asleep)
  e.x += e.kb.x * frameScale; e.y += e.kb.y * frameScale;
  e.kb.x *= Math.pow(0.8, frameScale); e.kb.y *= Math.pow(0.8, frameScale);
  // asleep: skip all movement, attacks, and contact damage
  if (e.sleep > 0) {
    e.sleep -= dt;
    e.x = clamp(e.x, ARENA.x + e.r, ARENA.r - e.r);
    e.y = clamp(e.y, ARENA.y + e.r, ARENA.b - e.r);
    resolveObstacles(e);
    return;
  }

  if (e.kind === "boss") { updateBoss(e, dt); }
  else {
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    const d = dist(e.x, e.y, player.x, player.y);
    // status slows: frozen chills movement hard, poison mud slows mildly (they stack)
    let slowMul = 1;
    if (e.frozen > 0) slowMul *= 0.35;
    if (e.poison > 0) slowMul *= 0.6;
    const es = e.speed * frameScale * MOVE_SCALE * slowMul;

    // --- spot-based telegraphed attacks (occasional, dodgeable with a dash) ---
    if (e.spotCd == null) e.spotCd = rand(2.5, 5.0);
    e.spotCd -= dt;
    if (e.spotCd <= 0 && d < 460) {
      if (e.type === "diglett") {
        // DIG: burrow underground from its current spot to a marked dig-up point
        e.spotCd = rand(3.8, 6.0);
        const tx = clamp(player.x, ARENA.x + 30, ARENA.r - 30);
        const ty = clamp(player.y, ARENA.y + 30, ARENA.b - 30);
        e.burrow = { sx: e.x, sy: e.y, tx, ty, t: 0, dur: 0.8 };
        spawnTelegraph({ x: tx, y: ty, r: 46, delay: 0.8, dmg: e.dmg, color: "#c98a5a" });
        // dust puff as it dives under
        spawnParticles(e.x, e.y, "#8a5a36", 12);
      } else if (e.type === "magnemite") {
        // electric strike from above onto the player's position. Cap the number of
        // bolts telegraphed at once (across all Magnemites) to 4, so the screen
        // isn't blanketed with electric warnings when several are present.
        const activeBolts = telegraphs.reduce((n, t) => n + (t.bolt && !t.struck ? 1 : 0), 0);
        if (activeBolts < 4) {
          e.spotCd = rand(3.0, 4.5);
          spawnTelegraph({ x: player.x, y: player.y, r: 50, delay: 0.75, dmg: e.dmg, color: "#ffe14d", bolt: true });
        } else {
          e.spotCd = rand(1.0, 1.8); // try again soon
        }
      } else if (e.type === "haunter") {
        // BLINK BITE: Haunter fades out, then reappears beside the player with a
        // red warning ring and lunges to bite when it lands.
        e.spotCd = rand(3.5, 5.5);
        const ba = rand(0, 6.28), bd = 70;
        const tx = clamp(player.x + Math.cos(ba) * bd, ARENA.x + 30, ARENA.r - 30);
        const ty = clamp(player.y + Math.sin(ba) * bd, ARENA.y + 30, ARENA.b - 30);
        e.blink = { tx, ty, t: 0, dur: 0.75, phase: "out" };
        spawnTelegraph({ x: tx, y: ty, r: 44, delay: 0.75, dmg: e.dmg * 1.2, color: "#c06ad0" });
        spawnParticles(e.x, e.y, "#9a6fd0", 14);
      } else if (e.type === "starmie") {
        // Starmie POISON SLUDGE: telegraphs a purple target spot, then drops a toxic
        // sludge splash that leaves a lingering poison patch on the ground.
        e.spotCd = rand(3.0, 4.5);
        const tx = clamp(player.x, ARENA.x + 40, ARENA.r - 40);
        const ty = clamp(player.y, ARENA.y + 40, ARENA.b - 40);
        spawnTelegraph({ x: tx, y: ty, r: 52, delay: 0.85, dmg: e.dmg * 1.2, color: "#b15ad0", hazard: { kind: "poison", life: 2.4, dmg: 4 } });
      } else if (e.type === "psyduck") {
        // Psyduck alternates a HEADBUTT CHARGE (telegraphed dash) with a WATER GUN blob
        e.spotCd = rand(3.2, 4.8);
        e.psyFlip = !e.psyFlip;
        const ca = Math.atan2(player.y - e.y, player.x - e.x);
        if (e.psyFlip) {
          // water gun: a quick aimed blob projectile
          spawnBlob(e, ca, 5.0, "#56b0e0", "#aee4ff");
        } else {
          // headbutt charge: telegraphed straight-line dash at the player
          spawnTelegraph({ x: e.x, y: e.y, r: 30, delay: 0.7, dmg: 0, color: "#f4d97a", shape: "line", a: ca, len: 260 });
          e.charge = { a: ca, t: 0, delay: 0.7, dur: 0.35, dmg: e.dmg * 1.3, done: false };
        }
      } else if (e.type === "graveler") {
        // Graveler heats a patch of ground — leaves fire briefly
        e.spotCd = rand(5.0, 8.0);
        const tx = clamp(player.x, ARENA.x + 40, ARENA.r - 40);
        const ty = clamp(player.y, ARENA.y + 40, ARENA.b - 40);
        spawnTelegraph({ x: tx, y: ty, r: 52, delay: 0.85, dmg: e.dmg, color: "#ff8c4d", hazard: { kind: "fire", life: 3.0, dmg: 5 } });
      } else if (e.type === "lapras") {
        // Lapras: 3-SPOT ICE MORTAR — three telegraphed impacts; the last leaves a chilling pool
        e.spotCd = rand(3.8, 5.5);
        for (let i = 0; i < 3; i++) {
          const tx = i === 0 ? player.x : clamp(player.x + rand(-150, 150), ARENA.x + 40, ARENA.r - 40);
          const ty = i === 0 ? player.y : clamp(player.y + rand(-150, 150), ARENA.y + 40, ARENA.b - 40);
          const haz = i === 2 ? { kind: "poison", life: 2.5, dmg: 4 } : null;
          spawnTelegraph({ x: tx, y: ty, r: 50, delay: 0.85 + i * 0.15, dmg: e.dmg * 1.1, color: "#7fe0ff", hazard: haz });
        }
      } else {
        e.spotCd = rand(4.0, 7.0); // others rarely; keeps pressure low
      }
    }

    // Onix sub-boss: telegraphed multi-rock barrage (several red spots to dash out of)
    if (e.type === "onix") {
      e.rockCd -= dt;
      if (e.rockCd <= 0) {
        e.rockCd = rand(3.4, 5.0);
        const spots = 2; // fewer, clearer rock impacts
        for (let i = 0; i < spots; i++) {
          // one spot on the player, the rest scattered nearby — all dodgeable
          const tx = i === 0 ? player.x : clamp(player.x + rand(-160, 160), ARENA.x + 30, ARENA.r - 30);
          const ty = i === 0 ? player.y : clamp(player.y + rand(-160, 160), ARENA.y + 30, ARENA.b - 30);
          spawnTelegraph({ boss: true, x: tx, y: ty, r: 52, delay: 0.95 + i * 0.16, dmg: e.dmg * 1.2, color: "#b8b0bc", kind: "rockdrop" });
        }
      }
    }
    // While burrowing, the Diglett travels underground to its dig-up point and
    // does not chase or take contact — it surfaces when the telegraph strikes.
    // Haunter blink: fades out, teleports to the marked spot, fades back in to bite.
    // Untargetable and harmless while phased out (like the Diglett underground).
    if (e.charge) {
      e.charge.t += dt;
      if (e.charge.t >= e.charge.delay) {
        // dash phase: rush in the locked direction, dealing contact damage
        const ct = e.charge.t - e.charge.delay;
        const sp = 9 * frameScale;
        e.x += Math.cos(e.charge.a) * sp; e.y += Math.sin(e.charge.a) * sp;
        if (!e.charge.done && dist(e.x, e.y, player.x, player.y) < e.r + player.r + 6) { hurtPlayer(e.charge.dmg); e.charge.done = true; }
        if (ct >= e.charge.dur) e.charge = null;
        e.x = clamp(e.x, ARENA.x + e.r, ARENA.r - e.r); e.y = clamp(e.y, ARENA.y + e.r, ARENA.b - e.r);
        return; // committed to the charge
      }
      return; // winding up (telegraph showing)
    }
    if (e.blink) {
      e.blink.t += dt;
      const p2 = clamp(e.blink.t / e.blink.dur, 0, 1);
      if (p2 >= 0.5 && e.blink.phase === "out") { e.blink.phase = "in"; e.x = e.blink.tx; e.y = e.blink.ty; spawnParticles(e.x, e.y, "#c06ad0", 12); }
      if (p2 >= 1) { e.blink = null; }
      return; // skip normal movement/attacks while blinking
    }
    if (e.burrow) {
      e.burrow.t += dt;
      const p2 = clamp(e.burrow.t / e.burrow.dur, 0, 1);
      e.x = lerp(e.burrow.sx, e.burrow.tx, p2);
      e.y = lerp(e.burrow.sy, e.burrow.ty, p2);
      // small dirt trail along the dig path
      if (Math.random() < 0.5) spawnParticles(e.x, e.y, "#6e5038", 2);
      if (p2 >= 1) { e.burrow = null; spawnParticles(e.x, e.y, "#8a5a36", 14); } // erupt
      return; // skip normal movement/attacks while underground
    }
    if (e.kind === "rusher" || e.kind === "tank") {
      e.x += Math.cos(a) * es; e.y += Math.sin(a) * es;
    } else if (e.kind === "charger") {
      // wind up then dash (slightly slower & telegraphed a touch longer)
      if (!e.charging && d < 280) { e.charging = true; e.chargeT = 0.6; e.chargeA = a; }
      if (e.charging) {
        e.chargeT -= dt;
        if (e.chargeT > 0.25) { /* windup, slow */ e.x += Math.cos(a) * es * 0.18; e.y += Math.sin(a) * es * 0.18; }
        else { e.x += Math.cos(e.chargeA) * es * 1.45; e.y += Math.sin(e.chargeA) * es * 1.45; }
        if (e.chargeT <= -0.25) e.charging = false;
      } else { e.x += Math.cos(a) * es * 0.5; e.y += Math.sin(a) * es * 0.5; }
    } else if (e.kind === "shooter") {
      // wander: pick a new roam target periodically and drift toward it, keeping
      // a loose mid-range from the player rather than always fleeing directly away
      e.roamT = (e.roamT || 0) - dt;
      if (e.roamT <= 0 || e.roamTx == null) {
        e.roamT = rand(1.0, 2.2);
        e.roamTx = clamp(player.x + rand(-260, 260), ARENA.x + 40, ARENA.r - 40);
        e.roamTy = clamp(player.y + rand(-200, 200), ARENA.y + 40, ARENA.b - 40);
      }
      // too close: back off; otherwise drift toward the roam point
      if (d < 150) { e.x -= Math.cos(a) * es; e.y -= Math.sin(a) * es; }
      else {
        const ra = Math.atan2(e.roamTy - e.y, e.roamTx - e.x);
        e.x += Math.cos(ra) * es * 0.7; e.y += Math.sin(ra) * es * 0.7;
      }
      e.shootCd -= dt;
      if (e.shootCd <= 0) {
        e.shootCd = e.shootCdMax;
        if (projectiles.length < MAX_PROJECTILES) projectiles.push({ x: e.x, y: e.y, vx: Math.cos(a) * e.projSpeed, vy: Math.sin(a) * e.projSpeed, r: 8, dmg: e.dmg, life: 3, color: e.color2, owner: "enemy", trail: e.color });
      }
    }
  }
  // bounds
  e.x = clamp(e.x, ARENA.x + e.r, ARENA.r - e.r);
  e.y = clamp(e.y, ARENA.y + e.r, ARENA.b - e.r);
  resolveObstacles(e);

  // contact damage
  if (e.touchCd <= 0 && dist(e.x, e.y, player.x, player.y) < e.r + player.r) {
    const willHit = player.invuln <= 0 && !player.dashing;
    hurtPlayer(e.dmg); e.touchCd = e.touchCdMax;
    if (willHit && player.mods.thorns > 0) reflectThorns(e);
  }
}

// Bramble Guard: reflect a fraction of an attacker's contact damage back at it.
function reflectThorns(e) {
  if (e.burrow) return;
  const dmg = Math.max(1, Math.round(e.dmg * player.mods.thorns));
  damageEnemy(e, dmg, { noCrit: true });
  spawnParticles(e.x, e.y, "#7ec84a", 4);
}

function updateHelper(dt) {
  const h = helper;
  h.bob += dt * 7;
  if (h.flashT > 0) h.flashT -= dt;
  if (h.hurtFlash > 0) h.hurtFlash -= dt;
  if (h.invuln > 0) h.invuln -= dt;
  // follow the player, trailing behind at a comfortable distance
  const fd = dist(h.x, h.y, player.x, player.y);
  if (fd > 46) {
    const a = Math.atan2(player.y - h.y, player.x - h.x);
    const sp = clamp((fd - 40) * 0.12, 0, 5.5) * frameScale * MOVE_SCALE;
    h.x += Math.cos(a) * sp; h.y += Math.sin(a) * sp;
  }
  h.x = clamp(h.x, ARENA.x + h.r, ARENA.r - h.r);
  h.y = clamp(h.y, ARENA.y + h.r, ARENA.b - h.r);

  // enemies hurt the helper on contact (awake, non-sleeping enemies)
  for (const e of enemies) {
    if (e.dead || (e.sleep || 0) > 0) continue;
    if (dist(e.x, e.y, h.x, h.y) < e.r + h.r) { hurtHelper(e.dmg); break; }
  }
  if (!helper) return; // may have fainted

  const liveEnemies = enemies.filter(e => !e.dead && !e.burrow && !e.blink);
  if (h.key === "pikachu") {
    // zap the nearest enemy on a cooldown
    h.zapCd -= dt;
    if (h.zapCd <= 0 && liveEnemies.length) {
      let best = null, bd = 1e9;
      for (const e of liveEnemies) { const d = dist2(h.x, h.y, e.x, e.y); if (d < bd) { bd = d; best = e; } }
      if (best && bd < 360 * 360) {
        h.zapCd = 0.85;
        const dmg = 14 + run.world * 6;
        damageEnemy(best, dmg, { noCrit: true });
        // Build a jagged multi-segment lightning bolt with offset vertices so the
        // renderer can draw a bold zig-zag (bright core + glow), not faint dots.
        const segs = 9;
        const pts = [];
        const ang = Math.atan2(best.y - h.y, best.x - h.x);
        const nx = -Math.sin(ang), ny = Math.cos(ang); // perpendicular
        for (let i = 0; i <= segs; i++) {
          const tt = i / segs;
          const jitter = (i === 0 || i === segs) ? 0 : rand(-16, 16);
          pts.push({ x: lerp(h.x, best.x, tt) + nx * jitter, y: lerp(h.y, best.y, tt) + ny * jitter });
        }
        h.bolt = { pts, t: 0.22, max: 0.22 };
        // impact flash + sparks at the target
        spawnParticles(best.x, best.y, "#fff3a0", 10);
        for (let i = 0; i < 8; i++) { const a2 = rand(0, 6.28), sp = rand(3, 6); particles.push({ x: best.x, y: best.y, vx: Math.cos(a2) * sp, vy: Math.sin(a2) * sp, r: rand(2, 4), t: rand(0.25, 0.45), color: i % 2 ? "#fff" : "#ffe14d" }); }
        h.zapFlash = 0.12; // brief glow around pikachu
        h.zapTarget = { x: best.x, y: best.y, t: 0.22 };
        Audio2.special();
      }
    }
    if (h.bolt) { h.bolt.t -= dt; if (h.bolt.t <= 0) h.bolt = null; }
    if (h.zapFlash > 0) h.zapFlash -= dt;
    if (h.zapTarget) { h.zapTarget.t -= dt; if (h.zapTarget.t <= 0) h.zapTarget = null; }
  } else if (h.key === "jigglypuff") {
    // sing once per room: when enemies are present and not already asleep, put them to sleep 5s
    if (h.singCd > 0) h.singCd -= dt;
    const awake = liveEnemies.filter(e => !e.boss && (e.sleep || 0) <= 0);
    if (!h.singUsedThisRoom && h.singCd <= 0 && awake.length >= 1) {
      h.singUsedThisRoom = true;
      h.singFx = 1.2;
      for (const e of liveEnemies) {
        // bosses resist full sleep but are briefly slowed; others sleep 5s
        if (e.boss) { e.sleep = Math.max(e.sleep || 0, 1.2); }
        else e.sleep = 5.0;
        spawnParticles(e.x, e.y - e.r, "#ffb6d5", 6);
      }
      flash("♪ Jigglypuff's Song — enemies sleep!", "#ffb6d5");
      Audio2.boon();
    }
    if (h.singFx > 0) h.singFx -= dt;
  }
}

function updateBoss(e, dt) {
  // Signature melee: charge dash (Machamp/Arcanine) and leap slam (Snorlax) take over
  // movement while active.
  if (e.charge) {
    e.charge.t += dt;
    if (e.charge.t >= e.charge.delay) {
      const ct = e.charge.t - e.charge.delay;
      const sp = 11 * frameScale;
      e.x = clamp(e.x + Math.cos(e.charge.a) * sp, ARENA.x + e.r, ARENA.r - e.r);
      e.y = clamp(e.y + Math.sin(e.charge.a) * sp, ARENA.y + e.r, ARENA.b - e.r);
      if (e.charge.fireTrail) spawnHazard({ x: e.x, y: e.y, r: 32, kind: "fire", life: 1.2, dmg: 4 });
      if (!e.charge.done && dist(e.x, e.y, player.x, player.y) < e.r + player.r + 8) { hurtPlayer(e.charge.dmg); e.charge.done = true; }
      if (ct >= e.charge.dur) {
        if (e.charge.onEnd === "cross") { const a0 = Math.atan2(player.y - e.y, player.x - e.x); for (const off of [0, 1.57, 3.14, 4.71]) bossProj(e, a0 + off, 4.6); }
        e.charge = null;
        e.atkTimer = Math.max(e.atkTimer, rand(1.2, 1.8)); // recovery pause after a charge
      }
    }
    // don't tick atkTimer mid-charge (cooldown runs from the end of the charge)
    return;
  }
  if (e.leap) {
    e.leap.t += dt;
    e.leap.frames = (e.leap.frames || 0) + 1;
    // complete on time OR after a hard frame cap (never get stuck mid-leap)
    if (e.leap.t >= e.leap.delay || e.leap.frames > 120) {
      // land: snap to target, deal a shockwave hit if player is close
      e.x = e.leap.tx; e.y = e.leap.ty;
      shake = Math.max(shake, 0.4);
      if (dist(e.x, e.y, player.x, player.y) < 90 + player.r) hurtPlayer(e.leap.dmg || e.dmg);
      spawnParticles(e.x, e.y, "#c8d0a0", 24);
      e.leap = null;
    } else {
      // arc toward the target during wind-up
      e.x += (e.leap.tx - e.x) * 0.12; e.y += (e.leap.ty - e.y) * 0.12;
    }
    return;
  }
  e.atkTimer -= dt;
  e.moveTimer -= dt;
  const a = Math.atan2(player.y - e.y, player.x - e.x);
  // hover-move toward a target point, keeping mid distance
  if (e.moveTimer <= 0) { e.moveTimer = rand(1.2, 2.2); e.tx = rand(ARENA.x + 120, ARENA.r - 120); e.ty = rand(ARENA.y + 100, ARENA.cy + 40); }
  const ta = Math.atan2(e.ty - e.y, e.tx - e.x);
  if (dist(e.x, e.y, e.tx, e.ty) > 10) { const bs = e.speed * frameScale * MOVE_SCALE; e.x += Math.cos(ta) * bs; e.y += Math.sin(ta) * bs; }
  e.x = clamp(e.x, ARENA.x + e.r, ARENA.r - e.r);
  e.y = clamp(e.y, ARENA.y + e.r, ARENA.b - e.r);

  const hpFrac = e.hp / e.maxHp;
  const enraged = hpFrac < 0.5;
  // occasional telegraphed wide-line sweep across the player (dodgeable)
  if (e.lineCd == null) e.lineCd = rand(5, 8);
  e.lineCd -= dt;
  if (e.lineCd <= 0) {
    e.lineCd = enraged ? rand(5, 7) : rand(6, 9);
    const la = Math.atan2(player.y - e.y, player.x - e.x);
    const el = ELEMENTS[e.element] || ELEMENTS.wind;
    spawnTelegraph({ boss: true, x: e.x, y: e.y, shape: "line", a: la, len: 900, r: 34, delay: 0.85, dmg: e.dmg * 1.3, color: el.color, element: e.element });
  }
  // Gauntlet bosses (sub-bosses + MewTwo) also throw a telegraphed cluster of
  // ground strikes around the player — a triangle/spread of warning circles.
  if (e.subBoss || e.finalBoss) {
    if (e.areaCd == null) e.areaCd = rand(4.5, 7.0);
    e.areaCd -= dt;
    if (e.areaCd <= 0) {
      e.areaCd = enraged ? rand(3.5, 5.0) : rand(5.5, 8.0);
      const el = ELEMENTS[e.element] || ELEMENTS.wind;
      const spots = e.finalBoss ? (enraged ? 6 : 4) : (enraged ? 4 : 3);
      const leaveHaz = e.element === "fire" || e.element === "psychic";
      for (let i = 0; i < spots; i++) {
        const tx = i === 0 ? player.x : clamp(player.x + rand(-150, 150), ARENA.x + 40, ARENA.r - 40);
        const ty = i === 0 ? player.y : clamp(player.y + rand(-150, 150), ARENA.y + 40, ARENA.b - 40);
        const haz = (leaveHaz && i === spots - 1) ? { kind: e.element === "fire" ? "fire" : "poison", life: 2.2, dmg: 4 } : null;
