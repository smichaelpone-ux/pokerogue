    ctx.strokeStyle = "rgba(255,70,70,0.9)"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(tg.x, tg.y, tg.r, 0, 6.28); ctx.stroke();
    ctx.strokeStyle = "rgba(255,200,120,0.9)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(tg.x, tg.y, tg.r * (1 - prog * 0.85), 0, 6.28); ctx.stroke();
  }
  ctx.restore();
}

function drawProjectile(pr) {
  ctx.save();
  if (pr.rock) {
    // big jagged spinning boulder
    ctx.translate(pr.x, pr.y);
    ctx.rotate((Date.now() / 300) % 6.28);
    ctx.fillStyle = "#7a7079";
    ctx.beginPath();
    for (let i = 0; i < 7; i++) { const ang = (i / 7) * Math.PI * 2; const rr = pr.r * (i % 2 ? 0.82 : 1.0); const px = Math.cos(ang) * rr, py = Math.sin(ang) * rr; i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#5f5660"; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.arc(pr.r * 0.25, pr.r * 0.2, pr.r * 0.35, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (pr.leaf) {
    ctx.translate(pr.x, pr.y); ctx.rotate(Math.atan2(pr.vy, pr.vx));
    ctx.fillStyle = pr.color; ctx.beginPath(); ctx.ellipse(0, 0, pr.r * 1.3, pr.r * 0.6, 0, 0, 6.28); ctx.fill();
  } else {
    // Cheap fill — 2 arcs max (was 3). With up to 160 projectiles this is the single
    // biggest per-frame draw cost, so keep it minimal.
    ctx.fillStyle = shade(pr.color, 0.7);
    ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.r, 0, 6.28); ctx.fill();
    ctx.fillStyle = pr.color;
    ctx.beginPath(); ctx.arc(pr.x - pr.r * 0.18, pr.y - pr.r * 0.18, pr.r * 0.66, 0, 6.28); ctx.fill();
  }
  ctx.restore();
}

function drawPickup(pk) {
  const fl = Math.sin(Date.now() / 150 + pk.x) * 2;
  ctx.save(); ctx.translate(pk.x, pk.y + fl);
  if (pk.type === "health") {
    const r = pk.r * 1.25;
    // soft halo (cheap) instead of shadowBlur
    ctx.globalAlpha = 0.3; ctx.fillStyle = "#ff8aa0"; ctx.beginPath(); ctx.arc(0, -r * 0.25, r * 1.3, 0, 6.28); ctx.fill(); ctx.globalAlpha = 1;
    ctx.fillStyle = "#ff5d7a";
    // heart shape
    ctx.beginPath();
    ctx.moveTo(0, r * 0.35);
    ctx.bezierCurveTo(r * 0.9, -r * 0.5, r * 0.5, -r * 1.05, 0, -r * 0.45);
    ctx.bezierCurveTo(-r * 0.5, -r * 1.05, -r * 0.9, -r * 0.5, 0, r * 0.35);
    ctx.closePath(); ctx.fill();
    // glint
    ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.beginPath(); ctx.ellipse(-r * 0.3, -r * 0.4, r * 0.16, r * 0.24, -0.5, 0, 6.28); ctx.fill();
  } else {
    ctx.globalAlpha = 0.28; ctx.fillStyle = "#ffd95e"; ctx.beginPath(); ctx.arc(0, 0, pk.r * 1.6, 0, 6.28); ctx.fill(); ctx.globalAlpha = 1;
    ctx.fillStyle = "#ffd95e";
    // 4-point star
    ctx.beginPath();
    for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2; const rr = i % 2 === 0 ? pk.r : pk.r * 0.45; ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr); }
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawParticle(pt) {
  ctx.globalAlpha = clamp(pt.t * 2, 0, 1);
  ctx.fillStyle = pt.color;
  ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawGate(g) {
  const pulse = (Math.sin(g.glow * 4) + 1) / 2;
  ctx.save();
  const isElite = g.elite;
  const isHelper = !!g.helper;
  const hdef = isHelper ? HELPER_DEFS[g.helper] : null;
  const baseCol = isElite ? "#ffd95e" : isHelper ? hdef.color : g.boon.color;
  ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(g.x - 2, g.y - g.h / 2, g.w + 4, g.h);
  // portal glow
  const grad = ctx.createLinearGradient(g.x, 0, g.x + g.w, 0);
  grad.addColorStop(0, shade(baseCol, 0.5)); grad.addColorStop(1, baseCol);
  ctx.fillStyle = grad; ctx.fillRect(g.x, g.y - g.h / 2, g.w, g.h);
  ctx.strokeStyle = (isElite || isHelper) ? "#fff" : "#fff"; ctx.lineWidth = ((isElite || isHelper) ? 3 : 2) + pulse * 2; ctx.globalAlpha = 0.6 + pulse * 0.4;
  ctx.strokeRect(g.x, g.y - g.h / 2, g.w, g.h);
  if (isElite || isHelper) {
    // outer halo (gold for elite, friend's colour for helper)
    ctx.strokeStyle = isElite ? "rgba(255,217,94," + (0.3 + pulse * 0.4) + ")" : hexToRgba(hdef.color, 0.3 + pulse * 0.4);
    ctx.lineWidth = 6;
    ctx.strokeRect(g.x - 4, g.y - g.h / 2 - 4, g.w + 8, g.h + 8);
  }
  ctx.globalAlpha = 1;
  // icon
  ctx.fillStyle = "#fff"; ctx.font = "22px " + FONT; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const topIcon = isElite ? "☠" : isHelper ? hdef.icon : g.boon.icon;
  ctx.fillText(topIcon, g.x + g.w / 2, g.y - ((isElite || isHelper) ? 26 : 18));
  if (isElite) { ctx.fillStyle = "#1a1206"; ctx.font = "12px " + FONT; ctx.fillText(g.boon.icon, g.x + g.w / 2, g.y + 4); }
  if (isHelper) { ctx.fillStyle = "#1a1206"; ctx.font = "12px " + FONT; ctx.fillText(g.boon.icon, g.x + g.w / 2, g.y + 4); }
  // label box pointing left
  ctx.font = "20px " + FONT; ctx.textAlign = "right";
  const title = isElite ? ("Greater " + g.boon.name) : isHelper ? (hdef.name + " joins") : g.boon.name;
  // helper gate also grants a boon — surface that boon so the player sees what they get
  const sub = isHelper ? ("+ " + g.boon.name + ": " + g.boon.desc) : (g.boon.desc + (isElite ? " (×1.6)" : ""));
  // if the player already owns this boon and it has an "addon" note, show what a
  // repeat pick adds on top — so stacking is clear before you choose.
  const owned = !isHelper && player.boons.some(b => b.id === g.boon.id);
  const addon = (owned && g.boon.addon) ? ("↑ stacks: " + g.boon.addon) : null;
  // size the box to fit the widest line at its font
  ctx.font = "20px " + FONT; const titleW = ctx.measureText(title).width;
  ctx.font = "15px " + FONT; const subW = ctx.measureText(sub).width;
  ctx.font = "13px " + FONT; const addW = addon ? ctx.measureText(addon).width : 0;
  const tw = Math.max(titleW, subW, addW, 140);
  let boxH = (isElite || isHelper) ? 76 : 60;
  if (addon) boxH += 20;
  ctx.fillStyle = "rgba(10,10,18,0.9)"; ctx.fillRect(g.x - tw - 22, g.y - boxH / 2, tw + 18, boxH);
  ctx.strokeStyle = hexToRgba(baseCol, 0.5); ctx.lineWidth = 1.5; ctx.strokeRect(g.x - tw - 22, g.y - boxH / 2, tw + 18, boxH);
  let ty = g.y - boxH / 2 + 8;

function roundRect(x, y, w, h, r) {
  ctx.beginPath();

// ---- Touch controls ----
function drawTouchControls() {
  // subtle gutter panels so the side margins read as a control zone
  if (stageX >= 120) {
    const lg = ctx.createLinearGradient(0, 0, stageX, 0);
    lg.addColorStop(0, "rgba(30,40,60,0.55)"); lg.addColorStop(1, "rgba(20,28,44,0.15)");
    ctx.fillStyle = lg; ctx.fillRect(0, 0, stageX, CH);
    const rgX = stageX + VW;
    const rg = ctx.createLinearGradient(rgX, 0, CW, 0);
    rg.addColorStop(0, "rgba(20,28,44,0.15)"); rg.addColorStop(1, "rgba(30,40,60,0.55)");
    ctx.fillStyle = rg; ctx.fillRect(rgX, 0, CW - rgX, CH);
  }
  // joystick base
  const jb = touchJoyBase();
  ctx.globalAlpha = 0.25; ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(jb.x, jb.y, jb.r, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 0.5;
  let kx = jb.x, ky = jb.y;
  if (touch.move.active) { kx = jb.x + touch.move.dx * jb.r * 0.6; ky = jb.y + touch.move.dy * jb.r * 0.6; }
  ctx.beginPath(); ctx.arc(kx, ky, jb.r * 0.45, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  // buttons
  const bs = touchBtns();
  drawTouchBtn(bs.dash, "⤢", "#b69cff", player && player.dashCdTimer <= 0, "DASH");
  drawTouchBtn(bs.attack, "J", "#ffd27a", player && player.atkTimer <= 0, "ATK");
  drawTouchBtn(bs.special, "K", player ? player.s.accent : "#fff", player && player.spTimer <= 0, "SP");
}
function touchJoyBase() {
  // Center the joystick in the left gutter if one exists; else bottom-left inside stage.
  const gut = stageX; // left gutter width
  if (gut >= 120) return { x: gut / 2, y: VH - 150, r: Math.min(80, gut / 2 - 12) };
  return { x: 110, y: VH - 110, r: 70 };
}
function touchBtns() {
  const rightGutStart = stageX + VW;
  const gut = CW - rightGutStart; // right gutter width
  if (gut >= 120) {
    // Cluster the three actions low in the gutter, within a natural right-thumb arc,
    // instead of a tall centered column (the top button used to be a long reach).
    const cx = rightGutStart + gut / 2;
    const rByWidth = gut / 2 - 8;
    const r = Math.max(44, Math.min(68, rByWidth, VH / 6));
    // Attack is the primary action → biggest reach priority, lowest/closest.
    // Place attack at the bottom, special and dash fanned just above it.
    const baseY = VH - r - 16;                 // anchored near the bottom
    const step = r * 2.0;                       // center spacing (keeps padded zones distinct)
    return {
      attack:  { x: cx,            y: baseY,            r: r },          // primary, bottom
      dash:    { x: cx - r * 0.05, y: baseY - step,     r: r * 0.9 },    // above
      special: { x: cx,            y: baseY - step * 2, r: r * 0.9 },    // top of cluster
    };
  }
  // fallback: inside the stage (narrow screens / desktop testing) — bottom-right cluster,
  // same top→bottom order: special, dash, attack
  return {
    special: { x: VW - 96, y: VH - 230, r: 40 },
    dash:    { x: VW - 96, y: VH - 140, r: 42 },
    attack:  { x: VW - 96, y: VH - 50,  r: 46 },
  };
}
// How much larger the *touchable* area is than the drawn button (forgives thumb aim).
const TOUCH_PAD = 1.5;
function drawTouchBtn(b, label, color, ready, sub) {
  ctx.globalAlpha = ready ? 0.55 : 0.25; ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1; ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.28); ctx.stroke();
  ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = (b.r * 0.62) + "px " + FONT;
  ctx.fillText(label, b.x, b.y - (sub ? b.r * 0.18 : -2));
  if (sub) { ctx.font = (b.r * 0.34) + "px " + FONT; ctx.globalAlpha = 0.9; ctx.fillText(sub, b.x, b.y + b.r * 0.4); ctx.globalAlpha = 1; }
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

function wrapText(text, x, y, maxw, lh) {
  const words = text.split(" "); let line = "", yy = y;

// ----------------------------------------------------------------------------
// Pointer (mouse + touch) handling
// ----------------------------------------------------------------------------
function pointerDown(clientX, clientY, id) {
  Audio2.resume();
  const v = vcoords(clientX, clientY);          // full-canvas virtual coords
  const sv = { x: v.x - stageX, y: v.y - stageY }; // stage-local coords
  // menu states use buttons (laid out in stage coords)
  if (state === STATE.TITLE || state === STATE.HUB || state === STATE.DEAD || state === STATE.WIN || state === STATE.PAUSE || state === STATE.STATS) {
    hitButtons(sv.x, sv.y);
    return;
  }
  if (state === STATE.PLAY) {
    // HUD stats button (stage-local coords) — works for mouse & touch
    if (statsBtn && sv.x >= statsBtn.x && sv.x <= statsBtn.x + statsBtn.w && sv.y >= statsBtn.y && sv.y <= statsBtn.y + statsBtn.h) {
      resetTouchMove(); prevState = state; state = STATE.STATS; return;
    }
    if (isTouch) {
      // Action buttons (full-canvas coords, in the right gutter). Use generous hit
      // zones (TOUCH_PAD × the drawn radius) and pick the NEAREST button center so
      // overlapping padded zones can't fire the wrong action.
      const bs = touchBtns();
      let bestKey = null, bestD = Infinity;
      for (const k of ["attack", "dash", "special"]) {
        const b = bs[k];
        const reach = b.r * TOUCH_PAD;
        const d = dist(v.x, v.y, b.x, b.y);
        if (d < reach && d < bestD) { bestD = d; bestKey = k; }
      }
      if (bestKey) {
        if (bestKey === "dash") { touchEdge.dash = true; return; }
        if (bestKey === "attack") { touchEdge.attack = true; touch._atkId = id; return; }
        if (bestKey === "special") { touchEdge.special = true; return; }
      }
      // joystick zone: anywhere on the left portion of the screen
      if (v.x < stageX + VW / 2) {
        touch.move.active = true; touch.move.id = id;
        updateJoy(v.x, v.y);
        return;
      }
      // pause via top-right corner tap (stage coords)
      if (sv.x > VW - 60 && sv.y < 60) { resetTouchMove(); prevState = state; state = STATE.PAUSE; }
    }
  }
}
function updateJoy(vx, vy) {
  const jb = touchJoyBase();   // full-canvas coords
  let dx = vx - jb.x, dy = vy - jb.y;
  const m = Math.hypot(dx, dy);
  const dead = 8;
  if (m < dead) { touch.move.dx = 0; touch.move.dy = 0; }
  else { touch.move.dx = dx / m; touch.move.dy = dy / m; }
}
function pointerMove(clientX, clientY, id) {
  if (state === STATE.PLAY && touch.move.active && (touch.move.id === id || id === undefined)) {
    const v = vcoords(clientX, clientY);
    updateJoy(v.x, v.y);
  }
}
function pointerUp(id) {
  if (touch.move.id === id) { touch.move.active = false; touch.move.dx = 0; touch.move.dy = 0; touch.move.id = null; }
}
// Fully clear virtual-joystick state so the player can't keep drifting after a
// menu/stats/pause transition consumes the touch that would have ended it.
function resetTouchMove() {
  touch.move.active = false; touch.move.dx = 0; touch.move.dy = 0; touch.move.id = null;
  touchEdge.attack = touchEdge.special = touchEdge.dash = false;
}

// mouse
canvas.addEventListener("mousedown", (e) => { pointerDown(e.clientX, e.clientY, "mouse"); });
canvas.addEventListener("mousemove", (e) => { pointerMove(e.clientX, e.clientY, "mouse"); });
window.addEventListener("mouseup", () => { pointerUp("mouse"); });
// touch
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerDown(t.clientX, t.clientY, t.identifier); }, { passive: false });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerMove(t.clientX, t.clientY, t.identifier); }, { passive: false });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerUp(t.identifier); }, { passive: false });
canvas.addEventListener("touchcancel", (e) => { for (const t of e.changedTouches) pointerUp(t.identifier); });

// mute toggle (M)
window.addEventListener("keydown", (e) => { if (e.key.toLowerCase() === "m") Audio2.toggleMute(); });

// pause toggle (Esc / P)
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "escape" || k === "p") {
    if (state === STATE.PLAY) { resetTouchMove(); prevState = state; state = STATE.PAUSE; }
    else if (state === STATE.PAUSE) { resetTouchMove(); state = STATE.PLAY; }
    else if (state === STATE.STATS) { resetTouchMove(); state = STATE.PLAY; }
  }
});

// character stats panel (C) — pauses the game and shows stats + boons
window.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() !== "c") return;
  if (state === STATE.PLAY) { resetTouchMove(); prevState = state; state = STATE.STATS; }
  else if (state === STATE.STATS) { resetTouchMove(); state = STATE.PLAY; }
});

// ----------------------------------------------------------------------------
// Main loop
// ----------------------------------------------------------------------------
let last = performance.now();
let loopErrCount = 0;
let lastFrameError = null; // captured for on-screen diagnosis
let lastFrameStamp = performance.now(); // updated every painted frame; watchdog checks it
let updTicks = 0, rndTicks = 0, lastUpdMs = 0, lastRndMs = 0; // diagnostics
function loop(now) {
  // CRITICAL: requestAnimationFrame is scheduled in a finally block so that an
  // exception in update() or render() can NEVER permanently freeze the canvas.
  try {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05; // clamp big frame gaps
    const t0 = performance.now();
    update(dt * timeScale);
    updTicks++;
    const t1 = performance.now(); lastUpdMs = t1 - t0;
    ctx.clearRect(0, 0, VW, VH);
    render();
    rndTicks++;
    lastRndMs = performance.now() - t1;
    // Log any genuinely slow frame so the console captures the culprit half.
    if (DIAG && (lastUpdMs + lastRndMs) > 40 && typeof console !== "undefined") {
      console.warn("SLOW FRAME " + (lastUpdMs + lastRndMs).toFixed(1) + "ms  (update " + lastUpdMs.toFixed(1) + " / render " + lastRndMs.toFixed(1) + ")  proj=" + projectiles.length + " part=" + particles.length + " haz=" + hazards.length + " enem=" + enemies.length + " tele=" + telegraphs.length);
    }
    // tiny diagnostic readout (top-left): update#/render# and ms each. If the screen
    // freezes, whichever counter STOPS tells us which half hung; the ms shows slowness.
    if (DIAG) {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(2, 2, 250, 20);
      ctx.fillStyle = "#7dff9a"; ctx.font = "12px monospace"; ctx.textAlign = "left";
      ctx.fillText("u" + updTicks + " r" + rndTicks + " | upd " + lastUpdMs.toFixed(1) + "ms rnd " + lastRndMs.toFixed(1) + "ms", 6, 16);
      ctx.restore();
    }
    if (state !== STATE.PLAY) { for (const k in justPressed) justPressed[k] = false; touchEdge.attack = touchEdge.special = touchEdge.dash = false; }
  } catch (err) {
    loopErrCount++;
    if (!lastFrameError) lastFrameError = err;
    if (loopErrCount <= 5 && typeof console !== "undefined") console.error("frame error:", err);
    if (loopErrCount <= 240) {
      try {
        ctx.fillStyle = "rgba(120,0,0,0.85)"; ctx.fillRect(0, VH - 60, VW, 60);
        ctx.fillStyle = "#fff"; ctx.font = "12px monospace"; ctx.textAlign = "left";
        const msg = (lastFrameError && (lastFrameError.message || String(lastFrameError))) || "unknown";
        ctx.fillText(("render error: " + msg).slice(0, 110), 12, VH - 36);
        ctx.fillText("(game keeps running — please screenshot this)", 12, VH - 18);
      } catch (e2) { /* ignore */ }
    }
  } finally {
    lastFrameStamp = performance.now();
    requestAnimationFrame(loop);
  }
}

// Watchdog: an independent timer (not tied to requestAnimationFrame) that fires
// even if a frame is pathologically heavy. If no frame has completed for a while
// during play, it clears all transient per-frame entities (projectiles, particles,
// hazards, telegraphs, waves, bursts) — the only things that can make a single
// frame expensive — so the game unsticks itself instead of freezing forever.
function watchdog() {
  try {
    if (state === STATE.PLAY && performance.now() - lastFrameStamp > 1500) {
      projectiles = []; particles = []; hazards = []; telegraphs = []; waves = []; bursts = []; floaters = [];
      lastFrameStamp = performance.now();
      if (typeof console !== "undefined") console.warn("watchdog cleared transient state after a stalled frame");
    }
  } catch (e) { /* never let the watchdog itself throw */ }
}
if (typeof setInterval !== "undefined") { const _wd = setInterval(watchdog, 500); if (_wd && typeof _wd.unref === "function") _wd.unref(); }

    runInfo: () => run ? { world: run.world, room: run.room, roomsInWorld: run.roomsInWorld, gauntlet: !!run.gauntlet, gauntletBosses: run.gauntletBosses ? run.gauntletBosses.slice() : null } : null,
    enterWorld: (i) => { run.world = i; run.room = 0; const w = WORLDS[i]; if (w.gauntlet) { run.gauntlet = true; run.roomsInWorld = 5; const p = w.gauntletPool.slice(); run.gauntletBosses = p.slice(0, 4); } else { run.gauntlet = false; run.roomsInWorld = 5; } enterRoom(); return run.room; },
    bossSpriteCount: () => Object.keys(BOSS_SPRITES).length,
    gatesDebug: () => gates.map(g => ({ elite: !!g.elite, helper: g.helper || null })),
    stats: () => player ? { maxHp: player.maxHp(), atk: player.atkDamage(), sp: player.spDamage(), stage: player.evoStage } : null,
    setStage: (n) => { if (player) player.evoStage = n; return player ? player.evoStage : -1; },
    fireSpecial: () => { if (!player) return 0; player.spTimer = 0; const before = projectiles.length; doSpecial(); return projectiles.length - before; },
    projInfo: () => projectiles.map(p => ({ r: p.r, pierce: !!p.pierce, seek: p.seek || 0, blast: p.blast || 0, knockback: p.knockback || 0, owner: p.owner, blob: !!p.blob, hydro: !!p.hydro, meteor: !!p.meteor })),
    clearProjectiles: () => { projectiles.length = 0; },
    hurtSelf: (n) => hurtPlayer(n),
    // test helpers
    enemyTypes: () => Object.keys(ENEMY_DEFS),
    eliteTypes: () => Object.keys(ELITE_DEFS),
    bossTypes: () => Object.keys(BOSS_DEFS),
    forceGauntletBoss: (key) => { enemies = []; obstacles = []; run.world = WORLDS.length - 1; run.gauntlet = true; spawnGauntletBoss(key); return enemies.length; },
    spawnAllEnemies: () => { enemies = []; obstacles = []; const diff = { hp: 1, dmg: 1 }; for (const t of Object.keys(ENEMY_DEFS)) spawnEnemy(t, diff); return enemies.length; },
    spawnAllElites: () => { enemies = []; obstacles = []; const out = []; for (const w of WORLDS) { if (!w.elite) continue; run.world = WORLDS.indexOf(w); enemies = []; run.eliteRoom = true; spawnElite(w); out.push(enemies.length); } run.eliteRoom = false; return out; },
    forceOpenGatesWithElite: () => { run.cleared = true; run.helperUsedThisWorld = true; openGates(); for (const g of gates) g.helper = null; if (!gates.some(g => g.elite)) { gates[0].elite = true; gates[0].h = 92; } return gates.map(g => !!g.elite); },
    forceBoss: (key) => { enemies = []; obstacles = []; const w = WORLDS.find(x => x.boss === key) || WORLDS[0]; const prevBoss = w.boss; w.boss = key; spawnBoss(w); w.boss = prevBoss; return enemies.length; },
    // --- helper / sleep / onix test helpers ---
    get helper() { return helper; },
    helperTypes: () => Object.keys(HELPER_DEFS),
    summonHelper: (k) => { summonHelper(k); return helper ? helper.key : null; },
    helperHp: () => helper ? helper.hp : -1,
    hurtHelper: (n) => hurtHelper(n),
    helperUsed: () => run ? run.helperUsedThisWorld : null,
    forceHelperGate: (k) => { run.cleared = true; openGates(); gates[0].helper = k; gates[0].elite = false; gates[0].h = 92; return !!gates[0].helper; },
    worldEnemies: (i) => WORLDS[i].enemies.slice(),
    spawnEnemyType: (t) => { const before = enemies.length; spawnEnemy(t, { hp: 1, dmg: 1 }); return enemies.length - before; },
    enemySleep: (i) => enemies[i] ? (enemies[i].sleep || 0) : -1,
    enemyStatus: (i) => enemies[i] ? { burn: enemies[i].burn || 0, frozen: enemies[i].frozen || 0, poison: enemies[i].poison || 0 } : null,
    meleeHit: (i, amt) => { if (enemies[i]) damageEnemy(enemies[i], amt || 1, { melee: true, noCrit: true }); },
    hasStatusBoon: () => !!(player && player.mods.statusOnHit),
    metaInfo: () => ({ stardust: meta.stardust, upgrades: { ...meta.upgrades }, bestWorld: meta.bestWorld, runs: meta.runs, wins: meta.wins }),
    setMeta: (sd, ups) => { meta.stardust = sd; if (ups) Object.assign(meta.upgrades, ups); },
    doReset: () => { resetProgress(); return { stardust: meta.stardust, tough: meta.upgrades.tough }; },
    spawnStardustPickup: (v) => { pickups.push({ x: player.x + 80, y: player.y, r: 7, vy: 0, t: 0, value: v || 10, type: "stardust" }); return pickups.length; },
    pickupCount: () => pickups.length,
    roomCleared: () => run ? !!run.cleared : false,
    gateCount: () => gates.length,
    enemyBurrow: (i) => enemies[i] && enemies[i].burrow ? { tx: enemies[i].burrow.tx, ty: enemies[i].burrow.ty, t: enemies[i].burrow.t } : null,
    enemyAt: (i) => enemies[i] ? { x: enemies[i].x, y: enemies[i].y, type: enemies[i].type, burrowing: !!enemies[i].burrow } : null,
    enemyFuse: (i) => enemies[i] ? (enemies[i].fuse != null ? enemies[i].fuse : -1) : -2,
    enemyCount: () => enemies.length,
    particleCount: () => particles.length,
    drawCallEstimate: () => enemies.length + projectiles.length + particles.length + pickups.length + telegraphs.length + waves.length + hazards.length + obstacles.length,
    primeBossSummon: () => { const b = enemies.find(e => e.boss); if (b) b.summonCd = 0.05; },
    primeSpot: (i) => { if (enemies[i]) enemies[i].spotCd = 0.05; },
    enemyTether: (i) => enemies[i] && enemies[i].tether ? true : false,
    enemyPull: (i) => enemies[i] && enemies[i].pull ? true : false,
    forceElite: (key) => { enemies = []; obstacles = []; const w = WORLDS.find(x => (x.elites && x.elites.includes(key)) || x.elite === key) || WORLDS[0]; const prev = w.elites; w.elites = [key]; spawnElite(w); w.elites = prev; return enemies.length; },
    // --- stats panel ---
    applyBoonById: (id, rare) => { const b = BOONS.find(x => x.id === id); if (b) applyBoon(b, !!rare); return b ? player.boons.length : -1; },
    modsInfo: () => ({ statusTier: player.mods.statusTier, trailTier: player.mods.trailTier, blastBonus: player.mods.blastBonus, pierceCount: player.mods.pierceCount, ailmentDmg: player.mods.ailmentDmg, thorns: player.mods.thorns, overcharge: player.mods.overcharge, ricochet: player.mods.ricochet, adrenaline: player.mods.adrenaline, magnet: player.mods.magnet, lastStand: player.mods.lastStand, dmgTaken: player.mods.dmgTaken, atkDmg: player.mods.atkDmg, spDmg: player.mods.spDmg, range: player.mods.range, arc: player.mods.arc, deathBurst: player.mods.deathBurst }),
    setPlayerHp: (n) => { player.hp = n; },
    playerHp: () => player.hp,
    playerAtkCd: () => player.atkCooldown(),
    boonCount: () => BOONS.length,
    boonIds: () => BOONS.map(b => b.id),
    enemyHp: (i) => enemies[i] ? enemies[i].hp : -1,
    boonSummary: () => summarizeBoons(),
    openStats: () => { if (state === STATE.PLAY) { resetTouchMove(); prevState = state; state = STATE.STATS; } return state; },
    closeStats: () => { if (state === STATE.STATS) { resetTouchMove(); state = STATE.PLAY; } return state; },
    statsBtnRect: () => statsBtn ? { ...statsBtn } : null,
    // --- telegraphed spot attacks ---
    telegraphs: () => telegraphs.map(t => ({ x: t.x, y: t.y, r: t.r, shape: t.shape, delay: t.delay, t: t.t, struck: t.struck, dmg: t.dmg, hazard: t.hazard, color: t.color, boss: t.boss, kind: t.kind, bolt: t.bolt, element: t.element })),
    waves: () => waves.map(w => ({ x: w.x, y: w.y, a: w.a, pos: w.pos, dmg: w.dmg, element: w.element, style: w.style, color: w.color })),
    telegraphCount: () => telegraphs.length,
    clearTelegraphs: () => { telegraphs.length = 0; },
    hazardCount: () => hazards.length,
    hazards: () => hazards.map(h => ({ x: h.x, y: h.y, r: h.r, life: h.life, maxLife: h.maxLife, kind: h.kind, dmg: h.dmg })),
    clearHazards: () => { hazards.length = 0; },
    spawnTestHazard: (kind) => { spawnHazard({ x: player.x, y: player.y, r: 56, kind: kind || "fire", life: 3, dmg: 5 }); return hazards.length; },
    spawnPickups: (n) => { for (let i = 0; i < n; i++) pickups.push({ x: rand(ARENA.x + 20, ARENA.r - 20), y: rand(ARENA.y + 20, ARENA.b - 20), r: 7, vy: 0, t: 0, value: 1, type: "stardust" }); return pickups.length; },
    enemyBlink: (i) => enemies[i] && enemies[i].blink ? { tx: enemies[i].blink.tx, ty: enemies[i].blink.ty, phase: enemies[i].blink.phase } : null,
    setInvuln: (v) => { player.invuln = v; },
    forceDash: () => { player.dashCdTimer = 0; player.dashing = false; doDash(); },
    setDashing: (v) => { player.dashing = v; },
    touchMoveActive: () => touch.move.active,
    setTouchMove: (dx, dy) => { touch.move.active = true; touch.move.dx = dx; touch.move.dy = dy; touch.move.id = "test"; },
    upgradeCost: (id, lvl) => { const u = UPGRADES.find(x => x.id === id); return u ? u.cost(lvl) : -1; },
    enemyBaseSd: (t) => (ENEMY_DEFS[t] ? ENEMY_DEFS[t].sd : -1),
  };
}

})();

</script>
