}

// ---- HUD ----
function drawHUD() {
  const p = player;
  // top-left HP
  ctx.font = "20px " + FONT; ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  const hpW = 240, hpH = 22, hx = 24, hy = 22;
  ctx.fillStyle = "rgba(0,0,0,0.55)"; roundRect(hx - 4, hy - 4, hpW + 8, hpH + 8, 6); ctx.fill();
  ctx.fillStyle = "#3a1820"; roundRect(hx, hy, hpW, hpH, 4); ctx.fill();
  const frac = clamp(p.hp / p.maxHp(), 0, 1);
  const hg = ctx.createLinearGradient(hx, 0, hx + hpW, 0);
  hg.addColorStop(0, "#ff5d7a"); hg.addColorStop(1, "#ff9aae");
  ctx.fillStyle = hg; roundRect(hx, hy, hpW * frac, hpH, 4); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = "18px " + FONT; ctx.textAlign = "center";
  ctx.fillText("HP " + Math.max(0, Math.ceil(p.hp)) + " / " + p.maxHp(), hx + hpW / 2, hy + 16);
  ctx.textAlign = "left";

  // revives
  if (p.revives > 0) { ctx.fillStyle = "#7df0a0"; ctx.font = "18px " + FONT; ctx.fillText("✚".repeat(p.revives), hx + hpW + 16, hy + 16); }

  // current form name (evolution)
  const formName = (p.s.evo && p.s.evo[p.evoStage]) ? p.s.evo[p.evoStage].name : p.s.name;
  ctx.fillStyle = p.s.accent; ctx.font = "16px " + FONT; ctx.textAlign = "left";
  ctx.fillText(formName + (p.evoStage > 0 ? " ✦".repeat(p.evoStage) : ""), hx + 2, hy + 42);
  ctx.textAlign = "left";
  // cooldown pips (special & dash) bottom-left, desktop only show keys
  const cy = VH - 40;
  drawCdPip(24, cy, "K", "SPECIAL", 1 - clamp(p.spTimer / p.base.spCd, 0, 1), p.s.accent);
  drawCdPip(150, cy, "SPACE", "DASH", 1 - clamp(p.dashCdTimer / p.dashCooldown(), 0, 1), "#b69cff");
  drawCdPip(300, cy, "J", "ATTACK", 1, "#ffd27a");

  // top-right: world / room / stardust
  ctx.textAlign = "right"; ctx.font = "20px " + FONT; ctx.fillStyle = "#fff";
  const w = WORLDS[run.world];
  const roomLabel = run.room >= run.roomsInWorld ? "BOSS" : ("Room " + (run.room + 1) + "/" + run.roomsInWorld);
  ctx.fillStyle = "rgba(0,0,0,0.5)"; roundRect(VW - 250, 18, 226, 54, 6); ctx.fill();
  ctx.fillStyle = w.accent; ctx.font = "16px " + FONT; ctx.fillText("WORLD " + (run.world + 1) + " · " + w.short, VW - 34, 40);
  ctx.fillStyle = "#fff"; ctx.fillText(roomLabel, VW - 34, 60);
  ctx.fillStyle = "#ffd95e"; ctx.fillText("✦ " + run.stardust, VW - 150, 60);
  ctx.textAlign = "left";

  // boons strip (top center)
  let bx = VW / 2 - (p.boons.length * 16);
  for (const b of p.boons) {
    ctx.textAlign = "center";
    if (b.rare) { ctx.fillStyle = "#ffd95e"; ctx.font = "11px " + FONT; ctx.fillText("★", bx, 18); }
    ctx.fillStyle = b.color; ctx.font = "18px " + FONT;
    ctx.fillText(b.icon, bx, 36); bx += 32;
  }
  ctx.textAlign = "left";

  // boss / elite hp bar
  const boss = enemies.find(e => e.boss);
  const elite = boss ? null : enemies.find(e => e.elite);
  const big = boss || elite;
  if (big) {
    const bw = 560, bh = 20, bxx = VW / 2 - bw / 2, byy = VH - 30;

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

function wrapText(text, x, y, maxw, lh) {
  const words = text.split(" "); let line = "", yy = y;
  for (const w of words) {
    const test = line + w + " ";
    if (ctx.measureText(test).width > maxw && line) { ctx.fillText(line, x, yy); line = w + " "; yy += lh; }
    else line = test;
  }
  ctx.fillText(line, x, yy);
}

// ----------------------------------------------------------------------------
// Pointer (mouse + touch) handling
// ----------------------------------------------------------------------------
function pointerDown(clientX, clientY, id) {
  Audio2.resume();
  const v = vcoords(clientX, clientY);
  // menu states use buttons
  if (state === STATE.TITLE || state === STATE.HUB || state === STATE.DEAD || state === STATE.WIN || state === STATE.PAUSE) {
    hitButtons(v.x, v.y);
    return;
  }
  if (state === STATE.PLAY) {
    if (isTouch) {
      const jb = touchJoyBase();
      // joystick zone: left half
      if (v.x < VW / 2) {
        touch.move.active = true; touch.move.id = id; touch.move.ox = jb.x; touch.move.oy = jb.y;
        updateJoy(v.x, v.y);
        return;
      }
      // buttons
      const bs = touchBtns();
      if (dist(v.x, v.y, bs.attack.x, bs.attack.y) < bs.attack.r) { touchEdge.attack = true; touch._atkId = id; return; }
      if (dist(v.x, v.y, bs.special.x, bs.special.y) < bs.special.r) { touchEdge.special = true; return; }
      if (dist(v.x, v.y, bs.dash.x, bs.dash.y) < bs.dash.r) { touchEdge.dash = true; return; }
      // pause via top-right corner tap
      if (v.x > VW - 60 && v.y < 60) { prevState = state; state = STATE.PAUSE; }
    } else {
      // desktop pause button area (top-right small) — clicking does nothing else
    }
  }
}
function updateJoy(vx, vy) {
  const jb = touchJoyBase();
  let dx = vx - jb.x, dy = vy - jb.y;
  const m = Math.hypot(dx, dy);
  const dead = 8;
  if (m < dead) { touch.move.dx = 0; touch.move.dy = 0; }
  else { touch.move.dx = dx / m; touch.move.dy = dy / m; }
}
function pointerMove(clientX, clientY, id) {
  if (state === STATE.PLAY && touch.move.active && (touch.move.id === id || id === undefined)) {
    const v = vcoords(clientX, clientY);
    updateJoy(v.x, v.y);
  }
}
function pointerUp(id) {
  if (touch.move.id === id) { touch.move.active = false; touch.move.dx = 0; touch.move.dy = 0; touch.move.id = null; }
}

// mouse
canvas.addEventListener("mousedown", (e) => { pointerDown(e.clientX, e.clientY, "mouse"); });
canvas.addEventListener("mousemove", (e) => { pointerMove(e.clientX, e.clientY, "mouse"); });
window.addEventListener("mouseup", () => { pointerUp("mouse"); });
// touch
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerDown(t.clientX, t.clientY, t.identifier); }, { passive: false });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerMove(t.clientX, t.clientY, t.identifier); }, { passive: false });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerUp(t.identifier); }, { passive: false });
canvas.addEventListener("touchcancel", (e) => { for (const t of e.changedTouches) pointerUp(t.identifier); });

// mute toggle (M)
window.addEventListener("keydown", (e) => { if (e.key.toLowerCase() === "m") Audio2.toggleMute(); });

// pause toggle (Esc / P)
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "escape" || k === "p") {
    if (state === STATE.PLAY) { prevState = state; state = STATE.PAUSE; }
    else if (state === STATE.PAUSE) { state = STATE.PLAY; }
  }
});

// ----------------------------------------------------------------------------
// Main loop
// ----------------------------------------------------------------------------
let last = performance.now();
function loop(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.05) dt = 0.05; // clamp big frame gaps
  update(dt * timeScale);
  ctx.clearRect(0, 0, VW, VH);
  render();
  // clear keyboard edges if not consumed by play update
  if (state !== STATE.PLAY) { for (const k in justPressed) justPressed[k] = false; touchEdge.attack = touchEdge.special = touchEdge.dash = false; }
  requestAnimationFrame(loop);
}

// ----------------------------------------------------------------------------
// Boot
// ----------------------------------------------------------------------------
async function boot() {
  const saved = await Persist.load("pokerogue_meta", null);
  if (saved) meta = Object.assign(meta, saved);
  const defUp = { tough: 0, power: 0, focus: 0, agility: 0, fortune: 0, resolve: 0, headstart: 0 };
  meta.upgrades = Object.assign(defUp, (saved && saved.upgrades) || {});
  resize();
  requestAnimationFrame(loop);
}
window.addEventListener("load", () => { resize(); });
boot();

// Lightweight debug handle (harmless; used for automated smoke tests)
if (typeof window !== "undefined") {
  window.__pr = {
    get state() { return state; },
    get run() { return run; },
    get player() { return player; },
    get enemies() { return enemies; },
    get obstacles() { return obstacles; },
    get meta() { return meta; },
    startRun: () => startRun(),
    killAll: () => { for (const e of enemies.slice()) killEnemy(e); pickups = []; },
    takeFirstGate: () => { if (gates[0]) takeGate(gates[0]); },
    takeEliteGate: () => { const g = gates.find(x => x.elite) || gates[0]; if (g) takeGate(g); return g ? !!g.elite : false; },
    evoStage: () => player ? player.evoStage : -1,
    forceEvolve: () => { evolvePlayer(); return player.evoStage; },
    evoNames: (k) => STARTERS[k].evo.map(e => e.name),
    setStarter: (k) => { if (STARTERS[k]) selectedStarter = k; return selectedStarter; },
    hurtSelf: (n) => hurtPlayer(n),
    // test helpers
    enemyTypes: () => Object.keys(ENEMY_DEFS),
    eliteTypes: () => Object.keys(ELITE_DEFS),
    bossTypes: () => Object.keys(BOSS_DEFS),
    spawnAllEnemies: () => { enemies = []; obstacles = []; const diff = { hp: 1, dmg: 1 }; for (const t of Object.keys(ENEMY_DEFS)) spawnEnemy(t, diff); return enemies.length; },
    spawnAllElites: () => { enemies = []; obstacles = []; const out = []; for (const w of WORLDS) { run.world = WORLDS.indexOf(w); enemies = []; run.eliteRoom = true; spawnElite(w); out.push(enemies.length); } run.eliteRoom = false; return out; },
    forceOpenGatesWithElite: () => { run.cleared = true; openGates(); if (!gates.some(g => g.elite)) { gates[0].elite = true; gates[0].h = 92; } return gates.map(g => !!g.elite); },
    forceBoss: (key) => { enemies = []; obstacles = []; const w = WORLDS.find(x => x.boss === key) || WORLDS[0]; const prevBoss = w.boss; w.boss = key; spawnBoss(w); w.boss = prevBoss; return enemies.length; },
  };
}

})();
