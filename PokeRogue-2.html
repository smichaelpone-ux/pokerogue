  if (tg.shape === "line") {
    // distance from player to the infinite line through (x,y) at angle a
    const dx = player.x - tg.x, dy = player.y - tg.y;
    const perp = Math.abs(-Math.sin(tg.a) * dx + Math.cos(tg.a) * dy);
    const along = Math.cos(tg.a) * dx + Math.sin(tg.a) * dy;
    return perp < tg.r + player.r && along > -player.r && along < tg.len + player.r;
  }
  return dist(tg.x, tg.y, player.x, player.y) < tg.r + player.r;
}

function updateTelegraphs(dt) {
  for (const tg of telegraphs) {
    tg.t += dt;
    if (!tg.struck && tg.t >= tg.delay) {
      tg.struck = true;
      shake = Math.max(shake, tg.bolt ? 0.08 : 0.2);
      Audio2.boss();
      if (tg.shape === "line") {
        // The red line was only a WARNING — now launch the actual attack: a wave
        // that sweeps along the telegraphed line, which the player can still dodge.
        spawnWave(tg);
      } else {
        // circle (ground burst / strike) deals its damage on the spot
        if (telegraphHit(tg)) hurtPlayer(tg.dmg);
        if (tg.hazard) spawnHazard({ x: tg.x, y: tg.y, r: tg.hazard.r || tg.r, kind: tg.hazard.kind, life: tg.hazard.life, dmg: tg.hazard.dmg });
        if (tg.bolt) {
          // dramatic lightning strike visual (no extra screen shake)
          spawnParticles(tg.x, tg.y, "#ffe14d", 22);
          spawnParticles(tg.x, tg.y, "#fff", 10);
          tg.flash = 1; // drives the bolt-flash render during the hold window
        } else {
          spawnParticles(tg.x, tg.y, tg.color, 16);
        }
      }
    }
  }
  telegraphs = telegraphs.filter(tg => tg.t < tg.delay + tg.hold);
}

// An elemental sweep that travels along a telegraphed line. It's a moving hitbox
// styled to the boss's element (sound, psychic, rock, fire, water, lightning…).
function spawnWave(tg) {
  const el = ELEMENTS[tg.element] || ELEMENTS.wind;
  // a touch of per-element feel: heavy rock is slower & wider, sound is fast
  const speed = tg.element === "rock" ? 7.5 : tg.element === "sound" ? 12 : 9.5;
  const half = (tg.r + 6) * (tg.element === "rock" ? 1.25 : 1);
  waves.push({
    x: tg.x, y: tg.y, a: tg.a, half, len: tg.len,
    dmg: tg.dmg, color: el.color, glow: el.glow, style: el.style, element: tg.element,
    pos: 0, speed, reach: tg.len, hit: false, age: 0,
  });
}

function updateWaves(dt) {
  for (const wv of waves) {
    wv.age += dt;
    const adv = wv.speed * frameScale;
    wv.pos += adv;
    const fx = wv.x + Math.cos(wv.a) * wv.pos;
    const fy = wv.y + Math.sin(wv.a) * wv.pos;
    if (!wv.hit) {
      const dx = player.x - fx, dy = player.y - fy;
      const perp = Math.abs(-Math.sin(wv.a) * dx + Math.cos(wv.a) * dy);
      const along = Math.cos(wv.a) * dx + Math.sin(wv.a) * dy;
      if (perp < wv.half + player.r && along < player.r && along > -34) {
        hurtPlayer(wv.dmg); wv.hit = true;
      }
    }
    // element-tinted trailing particles
    for (let s = -1; s <= 1; s++) {
      const ox = -Math.sin(wv.a) * s * wv.half * 0.8, oy = Math.cos(wv.a) * s * wv.half * 0.8;
      if (Math.random() < 0.6) pushParticle({ x: fx + ox, y: fy + oy, vx: Math.cos(wv.a) * 2, vy: Math.sin(wv.a) * 2, r: rand(2, 5), t: 0.3, color: Math.random() < 0.5 ? wv.color : wv.glow });
    }
    if (wv.pos >= wv.reach) wv.dead = true;
  }
  waves = waves.filter(wv => !wv.dead);
}

function clearEdges() { for (const k in justPressed) justPressed[k] = false; touchEdge.attack = touchEdge.special = touchEdge.dash = false; }

// ----------------------------------------------------------------------------
// Rendering
// ----------------------------------------------------------------------------
const FONT = "'VT323', monospace";
const FONTH = "'Press Start 2P', monospace";

function setFont(size, head) { ctx.font = (head ? "" : "") + size + "px " + (head ? FONTH : FONT); }

function render() {
  // paint the full canvas (incl. side gutters on touch) a dark base first
  ctx.fillStyle = "#06090f";
  ctx.fillRect(0, 0, CW, CH);

  ctx.save();
  // shift the whole game world into the centered 16:9 stage
  ctx.translate(stageX, stageY);
  // screen shake — only while actively playing (never on win/dead/menus)
  if (shake > 0 && (state === STATE.PLAY || state === STATE.PAUSE)) {
    ctx.translate(rand(-shake, shake) * 8, rand(-shake, shake) * 8);
  }

  if (state === STATE.TITLE) renderTitle();
  else if (state === STATE.HUB) renderHub();
  else if (state === STATE.PLAY || state === STATE.PAUSE || state === STATE.STATS) { renderPlay(); if (state === STATE.PAUSE) renderPause(); else if (state === STATE.STATS) renderStats(); }
  else if (state === STATE.DEAD) { renderPlay(); renderDead(); }
  else if (state === STATE.WIN) renderWin();

  ctx.restore();

  // Touch controls draw in FULL canvas space (so they sit out in the gutters).
  if (isTouch && (state === STATE.PLAY)) drawTouchControls();
}

// ---- Backgrounds ----
function bgGradient(top, bottom) {
  const g = ctx.createLinearGradient(0, 0, 0, VH);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  ctx.fillStyle = g; ctx.fillRect(0, 0, VW, VH);
}

function renderPlay() {
  const w = WORLDS[run.world];
  // sky/backdrop
  bgGradient(shade(w.sky, 1.1), w.sky);
  // arena floor
  drawArena(w);
  // spot-based attack warnings (on the ground, under everything)
  for (const hz of hazards) drawHazard(hz);
  for (const tg of telegraphs) drawTelegraph(tg);
  for (const wv of waves) drawWave(wv);
  // entities sorted by y
  const ents = [];
  for (const pk of pickups) ents.push({ y: pk.y, draw: () => drawPickup(pk) });
  for (const o of obstacles) ents.push({ y: o.y + o.h, draw: () => drawObstacle(o, w) });
  for (const e of enemies) ents.push({ y: e.y, draw: () => drawEnemy(e) });
  ents.push({ y: player.y, draw: () => drawPlayer() });
  if (helper) ents.push({ y: helper.y, draw: () => drawHelper() });
  ents.sort((a, b) => a.y - b.y);
  // ground particles below
  for (const pt of particles) drawParticle(pt);
  for (const e of ents) e.draw();
  for (const pr of projectiles) drawProjectile(pr);
  // gates
  for (const g of gates) drawGate(g);
  // floaters
  for (const bz of bursts) {
    const prog = 1 - (bz.t / bz.max);
    ctx.save();
    ctx.globalAlpha = clamp(1 - prog, 0, 1) * 0.85;
    ctx.strokeStyle = bz.color; ctx.lineWidth = 4 - prog * 2;
    ctx.beginPath(); ctx.arc(bz.x, bz.y, bz.r * prog, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = 1; ctx.restore();
  }
  for (const f of floaters) drawFloater(f);

  // fog overlay
  if (w.fog && w.fog !== "rgba(40,90,55,0.0)") { ctx.fillStyle = w.fog; ctx.fillRect(0, 0, VW, VH); }

  if (evoSequence) { drawEvolutionOverlay(); return; }

  drawHUD();
  if (flashMsg) drawFlash();
}

function drawEvolutionOverlay() {
  const seq = evoSequence;
  const f = clamp(seq.t / seq.dur, 0, 1);
  // Banner-only transition (already fully evolved): a clean "stage cleared" card.
  if (seq.banner) {
    ctx.fillStyle = "rgba(6,8,16," + (0.5 + 0.3 * Math.min(1, f * 3)) + ")";
    ctx.fillRect(0, 0, VW, VH);
    const sg = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 200);
    sg.addColorStop(0, "rgba(255,240,180,0.30)"); sg.addColorStop(1, "rgba(255,240,180,0)");
    ctx.fillStyle = sg; ctx.fillRect(0, 0, VW, VH);
    drawPlayer();
    const pop = clamp(f / 0.25, 0, 1);
    ctx.textAlign = "center";
    ctx.save();
    ctx.translate(VW / 2, 150); ctx.scale(0.7 + pop * 0.3, 0.7 + pop * 0.3);
    ctx.font = "34px " + FONTH;
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText("WORLD CLEARED!", 3, 3);
    ctx.fillStyle = "#ffe14d"; ctx.fillText("WORLD CLEARED!", 0, 0);
    ctx.restore();
    ctx.font = "16px " + FONT; ctx.fillStyle = "#9be0a0";
    ctx.fillText("✦ advancing to the next world ✦", VW / 2, 196);
    ctx.textAlign = "left";
    return;
  }
  // darken the scene to spotlight the player
  ctx.fillStyle = "rgba(6,8,16," + (0.45 + 0.35 * Math.min(1, f * 2)) + ")";
  ctx.fillRect(0, 0, VW, VH);
  // radial spotlight behind player
  const sg = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, 220);
  sg.addColorStop(0, "rgba(255,240,180,0.35)"); sg.addColorStop(1, "rgba(255,240,180,0)");
  ctx.fillStyle = sg; ctx.fillRect(0, 0, VW, VH);

  // re-draw particles + player on top of the dim layer so they pop
  for (const pt of particles) drawParticle(pt);
  drawPlayer();

  // pre-climax white flash pulse around the reveal point
  if (f >= 0.5 && f < 0.62) { ctx.fillStyle = "rgba(255,255,255," + (1 - Math.abs(f - 0.56) / 0.06) * 0.7 + ")"; ctx.fillRect(0, 0, VW, VH); }

  // expanding shockwave rings after the reveal
  if (seq.applied) {
    for (let i = 0; i < 2; i++) {
      const rr = (seq.ringT * 260) + i * 50;
      ctx.globalAlpha = clamp(1 - seq.ringT / 1.2, 0, 1) * 0.8;
      ctx.strokeStyle = i ? "#fff" : seq.color; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(player.x, player.y, rr, 0, 6.28); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // text banners
  ctx.textAlign = "center";
  if (f < 0.56) {
    ctx.font = "20px " + FONT; ctx.fillStyle = "#cfe0ff";
    ctx.fillText("What?  " + seq.fromName + " is evolving!", VW / 2, 90);
  } else {
    const pop = clamp((f - 0.56) / 0.1, 0, 1);
    ctx.save();
    ctx.translate(VW / 2, 96); ctx.scale(0.7 + pop * 0.3, 0.7 + pop * 0.3);
    ctx.font = "26px " + FONTH;
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText("EVOLVED INTO", 2, 2);
    ctx.fillStyle = "#ffe14d"; ctx.fillText("EVOLVED INTO", 0, 0);
    ctx.restore();
    ctx.save();
    ctx.translate(VW / 2, 150); ctx.scale(0.7 + pop * 0.4, 0.7 + pop * 0.4);
    const grad = ctx.createLinearGradient(-140, 0, 140, 0);
    grad.addColorStop(0, "#ff7a45"); grad.addColorStop(0.5, "#ffd23f"); grad.addColorStop(1, seq.color);
    ctx.font = "40px " + FONTH;
    ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText(seq.toName.toUpperCase() + "!", 3, 3);
    ctx.fillStyle = grad; ctx.fillText(seq.toName.toUpperCase() + "!", 0, 0);
    ctx.restore();
    // "advancing" banner so it clearly reads as clearing a world and moving on
    ctx.font = "16px " + FONT; ctx.fillStyle = "#9be0a0";
    ctx.fillText("✦ STAGE CLEARED — advancing to the next world ✦", VW / 2, 196);
  }
  ctx.textAlign = "left";
}

function drawArena(w) {
  // checker floor
  const tile = 60;
  for (let y = ARENA.y; y < ARENA.b; y += tile) {
    for (let x = ARENA.x; x < ARENA.r; x += tile) {
      const odd = ((Math.floor((x - ARENA.x) / tile) + Math.floor((y - ARENA.y) / tile)) % 2) === 0;
      ctx.fillStyle = odd ? w.ground : w.ground2;
      ctx.fillRect(x, y, Math.min(tile, ARENA.r - x), Math.min(tile, ARENA.b - y));
    }
  }
  // decorations
  drawDeco(w);
  // border frame
  ctx.lineWidth = 6; ctx.strokeStyle = shade(w.ground, 0.6);
  ctx.strokeRect(ARENA.x, ARENA.y, ARENA.w, ARENA.h);
  ctx.lineWidth = 2; ctx.strokeStyle = shade(w.accent, 0.8);
  ctx.strokeRect(ARENA.x + 3, ARENA.y + 3, ARENA.w - 6, ARENA.h - 6);
  // vignette
  const vg = ctx.createRadialGradient(VW / 2, VH / 2, VH * 0.3, VW / 2, VH / 2, VH * 0.8);
  vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(0,0,0,0.35)");
  ctx.fillStyle = vg; ctx.fillRect(0, 0, VW, VH);
}

let decoCache = null, decoWorld = -1, decoRoom = -1;
function drawDeco(w) {
  if (decoWorld !== run.world || decoRoom !== run.room) {
    decoWorld = run.world; decoRoom = run.room; decoCache = [];
    for (let i = 0; i < 22; i++) decoCache.push({ x: rand(ARENA.x + 20, ARENA.r - 20), y: rand(ARENA.y + 20, ARENA.b - 20), s: rand(0.7, 1.4), rot: rand(0, 6.28) });
  }
  for (const d of decoCache) {
    ctx.save(); ctx.translate(d.x, d.y); ctx.scale(d.s, d.s);
    if (w.deco === "grass") {
      ctx.strokeStyle = shade(w.ground, 1.4); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, 4); ctx.quadraticCurveTo(-3, -4, -5, -8); ctx.moveTo(0, 4); ctx.quadraticCurveTo(0, -5, 0, -10); ctx.moveTo(0, 4); ctx.quadraticCurveTo(3, -4, 5, -8); ctx.stroke();
    } else if (w.deco === "rock") {
      // glowing mineral crystal cluster
      ctx.fillStyle = shade(w.ground, 0.65); ctx.beginPath(); ctx.moveTo(-7, 5); ctx.lineTo(-3, -5); ctx.lineTo(5, -4); ctx.lineTo(7, 5); ctx.closePath(); ctx.fill();
      const tw = 0.6 + 0.4 * Math.sin(Date.now() / 600 + d.x);
      const crystals = [["#c89cff", -2, 0, 3, 7], ["#7fe0ff", 2, -2, 2.4, 6], ["#ff9ad0", 0, 1, 2, 5]];
      for (const c of crystals) {
        ctx.fillStyle = c[0]; ctx.globalAlpha = 0.85 * tw;
        ctx.beginPath(); ctx.moveTo(c[1], c[2] - c[4]); ctx.lineTo(c[1] - c[3], c[2]); ctx.lineTo(c[1], c[2] + c[4] * 0.4); ctx.lineTo(c[1] + c[3], c[2]); ctx.closePath(); ctx.fill();
      }
      // glow highlight
      ctx.globalAlpha = 0.5 * tw; ctx.fillStyle = "#ffffff";
      ctx.beginPath(); ctx.arc(0, -2, 1.5, 0, 6.28); ctx.fill();
      ctx.globalAlpha = 1;
    } else if (w.deco === "snow") {
      ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, 6.28); ctx.fill();
      ctx.fillStyle = shade(w.ground, 0.8); ctx.beginPath(); ctx.moveTo(-5, 5); ctx.lineTo(0, -6); ctx.lineTo(5, 5); ctx.closePath(); ctx.fill();
    } else if (w.deco === "water") {
      // little seashell / starfish dots and foam ripples on the sand
      const tw = (Math.sin(Date.now() / 700 + d.x) + 1) / 2;
      ctx.strokeStyle = "rgba(220,245,255," + (0.25 + tw * 0.3) + ")"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, 5, 0.2, Math.PI - 0.2); ctx.stroke();
      ctx.fillStyle = "#f0a0b0"; ctx.beginPath();
      for (let i = 0; i < 5; i++) { const a = (i / 5) * 6.28 - 1.57; const rr = i % 2 ? 1.2 : 3; ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr + 4); }
      ctx.closePath(); ctx.fill();
    } else if (w.deco === "moon") {
      // pale craters: a ring with a darker bowl, dusty grey
      ctx.fillStyle = shade(w.ground, 0.82); ctx.beginPath(); ctx.arc(0, 0, 7, 0, 6.28); ctx.fill();
      ctx.fillStyle = shade(w.ground, 0.7); ctx.beginPath(); ctx.arc(0, 0, 4.5, 0, 6.28); ctx.fill();
      ctx.fillStyle = shade(w.ground, 1.12); ctx.beginPath(); ctx.arc(-1.5, -1.5, 2, 0, 6.28); ctx.fill();
    }
    ctx.restore();
  }
}

function shade(hex, f) {
  const c = hex.replace("#", "");
  let r = parseInt(c.substr(0, 2), 16), g = parseInt(c.substr(2, 2), 16), b = parseInt(c.substr(4, 2), 16);
  r = clamp(Math.round(r * f), 0, 255); g = clamp(Math.round(g * f), 0, 255); b = clamp(Math.round(b * f), 0, 255);
  return "rgb(" + r + "," + g + "," + b + ")";
}

// ---- Creatures ----
function drawShadow(x, y, r) { ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.beginPath(); ctx.ellipse(x, y + r * 0.7, r * 0.9, r * 0.4, 0, 0, 6.28); ctx.fill(); }

function drawObstacle(o, w) {
  const x = o.x, y = o.y, ww = o.w, hh = o.h;
  // ground shadow
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath(); ctx.ellipse(x + ww / 2, y + hh - 4, ww * 0.55, hh * 0.22, 0, 0, 6.28); ctx.fill();
  if (w.deco === "grass") {
    // leafy bush: clustered blobs
    const base = "#3f8f55", dark = "#2f6f40", light = "#6fc07f";
    ctx.fillStyle = dark; roundRect(x, y + hh * 0.45, ww, hh * 0.5, 10); ctx.fill();
    const blobs = [[0.28, 0.42, 0.34], [0.62, 0.36, 0.4], [0.45, 0.62, 0.42], [0.78, 0.62, 0.3], [0.2, 0.66, 0.3]];
    for (const b of blobs) { ctx.fillStyle = base; ctx.beginPath(); ctx.arc(x + ww * b[0], y + hh * b[1], Math.min(ww, hh) * b[2], 0, 6.28); ctx.fill(); }
    ctx.fillStyle = light;
    ctx.beginPath(); ctx.arc(x + ww * 0.4, y + hh * 0.4, Math.min(ww, hh) * 0.18, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x + ww * 0.66, y + hh * 0.5, Math.min(ww, hh) * 0.13, 0, 6.28); ctx.fill();
  } else if (w.deco === "rock") {
    // jagged boulder, lighter, studded with bright minerals
    ctx.fillStyle = "#6a6076"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.1, y + hh); ctx.lineTo(x, y + hh * 0.45); ctx.lineTo(x + ww * 0.3, y + hh * 0.12);
    ctx.lineTo(x + ww * 0.72, y + hh * 0.05); ctx.lineTo(x + ww, y + hh * 0.5); ctx.lineTo(x + ww * 0.9, y + hh);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#807593"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.3, y + hh * 0.12); ctx.lineTo(x + ww * 0.72, y + hh * 0.05); ctx.lineTo(x + ww * 0.6, y + hh * 0.5);
    ctx.lineTo(x + ww * 0.28, y + hh * 0.55); ctx.closePath(); ctx.fill();
    // glowing crystal cluster (no shadowBlur — too costly when many are on screen)
    const tw = 0.7 + 0.3 * Math.sin(Date.now() / 500 + o.seed);
    const gem = (cx, cy, sz, col) => {
      ctx.save();
      // soft halo via a translucent larger fill instead of shadowBlur
      ctx.globalAlpha = 0.25 * tw; ctx.fillStyle = col;
      ctx.beginPath(); ctx.arc(cx, cy, sz * 1.5, 0, 6.28); ctx.fill();
      ctx.globalAlpha = 0.9 * tw;
      ctx.beginPath(); ctx.moveTo(cx, cy - sz); ctx.lineTo(cx - sz * 0.6, cy); ctx.lineTo(cx, cy + sz * 0.5); ctx.lineTo(cx + sz * 0.6, cy); ctx.closePath(); ctx.fill();
      ctx.restore();
    };
    gem(x + ww * 0.5, y + hh * 0.45, Math.min(ww, hh) * 0.22, "#c89cff");
    gem(x + ww * 0.66, y + hh * 0.55, Math.min(ww, hh) * 0.15, "#7fe0ff");
    gem(x + ww * 0.36, y + hh * 0.58, Math.min(ww, hh) * 0.13, "#ff9ad0");
  } else if (w.deco === "snow") {
    // snow-capped ice block
    ctx.fillStyle = "#7f99b3"; roundRect(x, y + hh * 0.25, ww, hh * 0.72, 8); ctx.fill();
    ctx.fillStyle = "#9fb8d2"; roundRect(x + 4, y + hh * 0.3, ww - 8, hh * 0.5, 6); ctx.fill();
    ctx.fillStyle = "#eaf4ff"; ctx.beginPath();
    ctx.moveTo(x, y + hh * 0.34); ctx.quadraticCurveTo(x + ww * 0.25, y + hh * 0.12, x + ww * 0.5, y + hh * 0.24);
    ctx.quadraticCurveTo(x + ww * 0.75, y + hh * 0.12, x + ww, y + hh * 0.34);
    ctx.lineTo(x + ww, y + hh * 0.44); ctx.quadraticCurveTo(x + ww * 0.5, y + hh * 0.3, x, y + hh * 0.44);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.35)"; roundRect(x + ww * 0.12, y + hh * 0.4, ww * 0.16, hh * 0.4, 4); ctx.fill();
  } else {
    // water world: a wet tide-pool rock with a little palm tuft
    ctx.fillStyle = "#6b5f52"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.08, y + hh); ctx.lineTo(x, y + hh * 0.55); ctx.lineTo(x + ww * 0.32, y + hh * 0.2);
    ctx.lineTo(x + ww * 0.7, y + hh * 0.22); ctx.lineTo(x + ww, y + hh * 0.55); ctx.lineTo(x + ww * 0.92, y + hh);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#837666";
    ctx.beginPath(); ctx.moveTo(x + ww * 0.32, y + hh * 0.2); ctx.lineTo(x + ww * 0.7, y + hh * 0.22); ctx.lineTo(x + ww * 0.6, y + hh * 0.55); ctx.lineTo(x + ww * 0.3, y + hh * 0.55); ctx.closePath(); ctx.fill();
    // glistening water pool on top
    const tw = 0.6 + 0.4 * Math.sin(Date.now() / 600 + o.seed);
    ctx.fillStyle = "rgba(110,200,230," + (0.5 + tw * 0.3) + ")";
    ctx.beginPath(); ctx.ellipse(x + ww * 0.5, y + hh * 0.34, ww * 0.26, hh * 0.12, 0, 0, 6.28); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.ellipse(x + ww * 0.44, y + hh * 0.31, ww * 0.08, hh * 0.04, 0, 0, 6.28); ctx.fill();
  }
}

function drawPlayer() {
  const p = player;
  const bobY = Math.sin(p.bob) * 2;
  const x = p.x, y = p.y + bobY;
  drawShadow(p.x, p.y, p.r);
  // dash ghost
  if (p.dashing) { ctx.globalAlpha = 0.4; }
  const blink = p.invuln > 0 && Math.floor(p.invuln * 20) % 2 === 0;
  if (blink && !p.dashing) ctx.globalAlpha = 0.5;
  ctx.save();
  ctx.translate(x, y);
  const flip = Math.cos(p.facing) < 0 ? -1 : 1;
  ctx.scale(flip, 1);
  // slight size growth with evolution stage
  const evoScale = 1 + p.evoStage * 0.12;
  ctx.scale(evoScale, evoScale);
  // evolution flash: brief bright pulse + expanding ring
  let evoFlash = false;
  if (p.evoAnim > 0) {
    const a = p.evoAnim / 1.6;
    if (Math.floor(p.evoAnim * 12) % 2 === 0) evoFlash = true;
  }
  drawStarterBody(p.key, p.r, p.hurtFlash > 0 || evoFlash, p.evoStage);
  ctx.restore();
  ctx.globalAlpha = 1;

  // Aegis Bubble shield(s): a shimmering sphere around the player
  if (p.bubble > 0) {
    ctx.save();
    const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 240);
    for (let i = 0; i < p.bubble; i++) {
      ctx.strokeStyle = "rgba(143,208,255," + (0.5 + pulse * 0.4) + ")"; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 8 + i * 5, 0, 6.28); ctx.stroke();
    }
    ctx.fillStyle = "rgba(143,208,255,0.10)";
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 8, 0, 6.28); ctx.fill();
    ctx.restore();
  }
  // Retaliation nova flash
  if (p.novaFx && p.novaFx.t > 0) {
    const prog = 1 - (p.novaFx.t / 0.35);
    const col = p.key === "squirtle" ? "159,230,255" : p.key === "bulbasaur" ? "143,207,90" : "255,140,77";
    ctx.save();
    ctx.globalAlpha = clamp(1 - prog, 0, 1) * 0.8;
    ctx.strokeStyle = "rgba(" + col + ",1)"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.novaFx.r * prog, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = 1; ctx.restore();
  }

  // evolution shockwave ring (drawn in world space, unflipped)
  if (p.evoAnim > 0) {
    const prog = 1 - (p.evoAnim / 1.6);
    ctx.save();
    ctx.globalAlpha = clamp(1 - prog, 0, 1) * 0.8;
    ctx.strokeStyle = "#ffe14d"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r + prog * 70, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = 1; ctx.restore();
  }

  // themed attack burst
  if (p.atkFx && p.atkFx.t > 0) drawAttackFx(p);
}

function drawAttackFx(p) {
  const fx = p.atkFx;
  const prog = 1 - clamp(fx.t / fx.dur, 0, 1); // 0..1
  const range = p.base.atkRange * p.mods.range, arc = p.base.atkArc * p.mods.arc;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(fx.dir);
  if (p.key === "charmander") {
    // FIRE — expanding flame cone
    const reach = range * (0.55 + prog * 0.55);
    const fade = 1 - prog;
    ctx.globalAlpha = 0.85 * fade;
    // outer cone
    const grad = ctx.createLinearGradient(0, 0, reach, 0);
    grad.addColorStop(0, "rgba(255,210,80,0.95)");
    grad.addColorStop(0.5, "rgba(255,120,40,0.9)");
    grad.addColorStop(1, "rgba(220,60,20,0.1)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.arc(0, 0, reach, -arc / 2, arc / 2); ctx.closePath(); ctx.fill();
    // flickering flame tongues
    ctx.globalAlpha = fade;
    for (let i = -2; i <= 2; i++) {
      const a = (i / 2) * (arc / 2) * 0.8;
      const fr = reach * (0.7 + Math.random() * 0.4);
      ctx.fillStyle = i % 2 ? "#ffd24d" : "#ff7a2a";
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * reach * 0.4, Math.sin(a) * reach * 0.4);
      ctx.quadraticCurveTo(Math.cos(a - 0.1) * fr, Math.sin(a - 0.1) * fr, Math.cos(a) * fr, Math.sin(a) * fr);
      ctx.quadraticCurveTo(Math.cos(a + 0.1) * fr, Math.sin(a + 0.1) * fr, Math.cos(a) * reach * 0.4, Math.sin(a) * reach * 0.4);
      ctx.fill();
    }
  } else if (p.key === "squirtle") {
    // WATER GUN — focused forward jet
    const reach = range * (0.4 + prog * 0.85);
    const fade = 1 - prog;
    ctx.globalAlpha = 0.9 * fade;
    const grad = ctx.createLinearGradient(0, 0, reach, 0);
    grad.addColorStop(0, "rgba(255,255,255,0.95)");
    grad.addColorStop(0.4, "rgba(120,200,240,0.9)");
    grad.addColorStop(1, "rgba(60,140,210,0.05)");
    ctx.fillStyle = grad;
    const halfW = 7 + prog * 4;
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.quadraticCurveTo(reach * 0.5, -halfW, reach, -halfW * 0.5);
    ctx.lineTo(reach, halfW * 0.5);
    ctx.quadraticCurveTo(reach * 0.5, halfW, 0, 6);
    ctx.closePath(); ctx.fill();
    // droplets at the tip
    for (let i = 0; i < 4; i++) {
      const a = rand(-0.25, 0.25);
      const rr = reach * rand(0.8, 1.05);
      ctx.fillStyle = "rgba(200,235,255,0.9)";
      ctx.beginPath(); ctx.arc(Math.cos(a) * rr, Math.sin(a) * rr, rand(2, 4), 0, 6.28); ctx.fill();
    }
  } else {
    // BULBASAUR — sweeping tail whip
    const fade = 1 - prog;
    const sweep = arc * 1.1;
    const ang = -sweep / 2 + sweep * prog; // sweeps across
    const reach = range * 0.95;
    ctx.globalAlpha = 0.85 * fade;
    // motion trail (a few fading arcs behind the sweep)
    for (let k = 0; k < 3; k++) {
      const pa = ang - k * 0.18 * p.swingDir;
      ctx.globalAlpha = (0.5 - k * 0.13) * fade;
      ctx.strokeStyle = k === 0 ? "#d8f2c8" : "#6fc28b";
      ctx.lineWidth = 6 - k * 1.5;
      ctx.beginPath(); ctx.arc(0, 0, reach * (0.7 + k * 0.05), pa - 0.5, pa + 0.5); ctx.stroke();
    }
    // the tail itself (a tapering green whip)
    ctx.globalAlpha = fade;
    ctx.strokeStyle = "#5aa86f"; ctx.lineWidth = 7; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(Math.cos(ang) * reach * 0.5, Math.sin(ang) * reach * 0.5,
                         Math.cos(ang) * reach, Math.sin(ang) * reach);
    ctx.stroke();
    // leafy tip
    ctx.fillStyle = "#7ec48f";
    ctx.beginPath(); ctx.ellipse(Math.cos(ang) * reach, Math.sin(ang) * reach, 9, 5, ang, 0, 6.28); ctx.fill();
    ctx.lineCap = "butt";
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawStarterBody(key, r, hurt, stage) {
  stage = stage || 0;
  const fn = STARTER_SPRITES[key] && STARTER_SPRITES[key][stage];
  if (fn) fn(r, hurt);
  else drawCharmander(r, hurt); // fallback
}

// helper for player eyes (dark with white glint)
function pEyes(r, e1x, e1y, e2x, e2y, er) {
  ctx.fillStyle = "#1a1a22";
  ctx.beginPath(); ctx.arc(e1x, e1y, er, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(e2x, e2y, er, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(e1x + er * 0.3, e1y - er * 0.3, er * 0.38, 0, 6.28); ctx.fill();
}

  const s = STARTERS.charmander, body = hurt ? "#fff" : s.evo[0].color, belly = s.evo[0].color2;

  ctx.fillStyle = hurt ? "#fff" : "#e0702c";
  ctx.beginPath(); ctx.moveTo(-r * 0.6, r * 0.2); ctx.quadraticCurveTo(-r * 1.4, 0, -r * 1.3, -r * 0.6); ctx.lineTo(-r, -r * 0.4); ctx.quadraticCurveTo(-r * 0.9, 0, -r * 0.5, r * 0.4); ctx.closePath(); ctx.fill();

  ctx.fillStyle = "#ff6a2a"; ctx.beginPath(); ctx.moveTo(-r * 1.3, -r * 0.6); ctx.quadraticCurveTo(-r * 1.6, -r * 1.4 - fl, -r * 1.15, -r * 1.6 - fl); ctx.quadraticCurveTo(-r * 1.0, -r * 1.1, -r * 1.15, -r * 0.6); ctx.closePath(); ctx.fill();

/* ============================ BULBASAUR LINE ============================ */
function drawBulbasaur(r, hurt) {
  const s = STARTERS.bulbasaur, body = hurt ? "#fff" : s.evo[0].color, belly = hurt ? "#fff" : s.evo[0].color2;
  // bulb on back
  ctx.fillStyle = hurt ? "#fff" : "#5aa86f";
  ctx.beginPath(); ctx.ellipse(-r * 0.4, -r * 0.7, r * 0.7, r * 0.6, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = hurt ? "#fff" : "#7ec48f";
  ctx.beginPath(); ctx.ellipse(-r * 0.4, -r * 0.8, r * 0.4, r * 0.35, 0, 0, 6.28); ctx.fill();
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, 0, r * 0.85, r, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(r * 0.15, r * 0.2, r * 0.5, r * 0.6, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(r * 0.35, -r * 0.55, r * 0.62, 0, 6.28); ctx.fill();
  // spots
  ctx.fillStyle = hurt ? "#eee" : shade(s.color, 0.78); ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.arc(r * 0.0, r * 0.1, r * 0.14, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.4, r * 0.35, r * 0.1, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  pEyes(r, r * 0.55, -r * 0.62, r * 0.15, -r * 0.66, r * 0.13);
  ctx.fillStyle = shade(s.color, 0.8);
  ctx.beginPath(); ctx.ellipse(-r * 0.2, r * 0.9, r * 0.25, r * 0.18, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.4, r * 0.9, r * 0.25, r * 0.18, 0, 0, 6.28); ctx.fill();
}

function drawIvysaur(r, hurt) {
  const s = STARTERS.bulbasaur, body = hurt ? "#fff" : s.evo[1].color, belly = hurt ? "#fff" : s.evo[1].color2;
  // bud (closed pink flower) on back with leaves
  ctx.fillStyle = hurt ? "#fff" : "#4f9a64";
  for (let i = -1; i <= 1; i++) { ctx.save(); ctx.translate(-r * 0.4, -r * 0.6); ctx.rotate(i * 0.5); ctx.beginPath(); ctx.ellipse(0, -r * 0.55, r * 0.28, r * 0.6, 0, 0, 6.28); ctx.fill(); ctx.restore(); }
  ctx.fillStyle = hurt ? "#fff" : "#e58fb0";
  ctx.beginPath(); ctx.arc(-r * 0.4, -r * 0.7, r * 0.42, 0, 6.28); ctx.fill();
  ctx.fillStyle = hurt ? "#fff" : "#f4b6cf";
  ctx.beginPath(); ctx.arc(-r * 0.4, -r * 0.78, r * 0.24, 0, 6.28); ctx.fill();
  // larger body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, r * 0.02, r * 0.92, r * 1.02, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(r * 0.18, r * 0.22, r * 0.52, r * 0.6, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(r * 0.4, -r * 0.5, r * 0.62, 0, 6.28); ctx.fill();
  ctx.fillStyle = hurt ? "#eee" : shade(s.color, 0.75); ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.arc(r * 0.05, r * 0.15, r * 0.15, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.45, r * 0.4, r * 0.11, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  pEyes(r, r * 0.6, -r * 0.58, r * 0.2, -r * 0.62, r * 0.12);
  ctx.fillStyle = shade(s.color, 0.8);
  ctx.beginPath(); ctx.ellipse(-r * 0.2, r * 0.95, r * 0.27, r * 0.18, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.45, r * 0.95, r * 0.27, r * 0.18, 0, 0, 6.28); ctx.fill();
}

function drawVenusaur(r, hurt) {
  const s = STARTERS.bulbasaur, body = hurt ? "#fff" : s.evo[2].color, belly = hurt ? "#fff" : s.evo[2].color2;
  // large bloomed flower with broad leaves
  ctx.fillStyle = hurt ? "#fff" : "#4a9560";
  for (let i = 0; i < 5; i++) { const a = (i / 5) * Math.PI * 2; ctx.save(); ctx.translate(-r * 0.35, -r * 0.55); ctx.rotate(a); ctx.beginPath(); ctx.ellipse(0, -r * 0.7, r * 0.34, r * 0.5, 0, 0, 6.28); ctx.fill(); ctx.restore(); }
  // flower petals
  ctx.fillStyle = hurt ? "#fff" : "#e07a98";
  for (let i = 0; i < 6; i++) { const a = (i / 6) * Math.PI * 2 + Math.sin(Date.now() / 1000) * 0.05; ctx.save(); ctx.translate(-r * 0.35, -r * 0.62); ctx.rotate(a); ctx.beginPath(); ctx.ellipse(0, -r * 0.42, r * 0.3, r * 0.44, 0, 0, 6.28); ctx.fill(); ctx.restore(); }
  ctx.fillStyle = hurt ? "#fff" : "#f0a8bf";
  ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.62, r * 0.3, 0, 6.28); ctx.fill();
  ctx.fillStyle = hurt ? "#fff" : "#ffd24d";
  ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.62, r * 0.14, 0, 6.28); ctx.fill();
  // hefty body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, r * 0.05, r * 1.0, r * 1.05, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = belly; ctx.beginPath(); ctx.ellipse(r * 0.2, r * 0.25, r * 0.56, r * 0.62, 0, 0, 6.28); ctx.fill();
  // broad head
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(r * 0.4, -r * 0.45, r * 0.66, 0, 6.28); ctx.fill();
  ctx.fillStyle = hurt ? "#eee" : shade(s.color, 0.72); ctx.globalAlpha = 0.55;
  ctx.beginPath(); ctx.arc(r * 0.1, r * 0.2, r * 0.17, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.5, r * 0.45, r * 0.12, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  // red eyes (Venusaur)
  ctx.fillStyle = "#1a1a22";
  ctx.beginPath(); ctx.arc(r * 0.62, -r * 0.52, r * 0.13, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.2, -r * 0.56, r * 0.12, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#d94a4a";
  ctx.beginPath(); ctx.arc(r * 0.62, -r * 0.52, r * 0.05, 0, 6.28); ctx.fill();
  // sturdy legs
  ctx.fillStyle = shade(s.color, 0.8);
  ctx.beginPath(); ctx.ellipse(-r * 0.2, r * 1.0, r * 0.3, r * 0.2, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.5, r * 1.0, r * 0.3, r * 0.2, 0, 0, 6.28); ctx.fill();
}

const STARTER_SPRITES = {
  charmander: [drawCharmander, drawCharmeleon, drawCharizard],
  squirtle:   [drawSquirtle, drawWartortle, drawBlastoise],
  bulbasaur:  [drawBulbasaur, drawIvysaur, drawVenusaur],
};

function drawEnemy(e) {
  // While burrowing underground, hide the sprite and show a travelling dirt mound
  if (e.burrow) {
    const mx = e.x, my = e.y;
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.18)"; ctx.beginPath(); ctx.ellipse(mx, my + 6, e.r * 1.1, e.r * 0.5, 0, 0, 6.28); ctx.fill();
    ctx.fillStyle = "#6e5038"; ctx.beginPath(); ctx.ellipse(mx, my, e.r * 0.9, e.r * 0.5, 0, 0, 6.28); ctx.fill();
    ctx.fillStyle = "#5a4030"; ctx.beginPath(); ctx.ellipse(mx, my + 2, e.r * 0.6, e.r * 0.32, 0, 0, 6.28); ctx.fill();
    ctx.restore();
    return;
  }
  drawShadow(e.x, e.y, e.r);
  const bobY = Math.sin(e.bob) * 2;
  const x = e.x, y = e.y + bobY;
  const flash = e.hurtFlash > 0;
  ctx.save(); ctx.translate(x, y);
  // Haunter blink: fade out then back in, with a faint ghostly afterimage
  if (e.blink) {
    const p2 = clamp(e.blink.t / e.blink.dur, 0, 1);
    // alpha dips to ~0 at the midpoint (teleport) then rises again
    ctx.globalAlpha = Math.abs(p2 - 0.5) * 2 * 0.85 + 0.05;
  }
  if (e.boss) drawBoss(e, flash);
  else if (e.elite) {
    const fn = ELITE_SPRITES[e.type] || drawGenericCritter;
    fn(e, flash);
    if (e.charging && e.chargeT > 0.2) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(0, 0, e.r + 6, 0, 6.28); ctx.stroke(); ctx.globalAlpha = 1; }
    if (e.burn > 0) { ctx.fillStyle = "rgba(255,120,40,0.6)"; ctx.beginPath(); ctx.arc(0, -e.r - 2, 4, 0, 6.28); ctx.fill(); }
  }
  else {
    const fn = ENEMY_SPRITES[e.type] || drawGenericCritter;
    fn(e, flash);
    // charger windup glow
    if (e.charging && e.chargeT > 0.2) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(0, 0, e.r + 4, 0, 6.28); ctx.stroke(); ctx.globalAlpha = 1; }
    if (e.burn > 0) { ctx.fillStyle = "rgba(255,120,40,0.6)"; ctx.beginPath(); ctx.arc(0, -e.r - 2, 3, 0, 6.28); ctx.fill(); }
  }
  // status tints (drawn over the sprite, still in translated space)
  if (e.frozen > 0) {
    ctx.fillStyle = "rgba(150,220,255,0.42)"; ctx.beginPath(); ctx.arc(0, 0, e.r + 2, 0, 6.28); ctx.fill();
    // ice crystal spikes
    ctx.fillStyle = "rgba(225,245,255,0.9)";
    for (let i = 0; i < 5; i++) { const ang = (i / 5) * 6.28 + e.bob * 0.2; const rr = e.r + 3; const cx = Math.cos(ang) * rr, cy = Math.sin(ang) * rr; ctx.beginPath(); ctx.moveTo(cx, cy - 4); ctx.lineTo(cx - 3, cy + 2); ctx.lineTo(cx + 3, cy + 2); ctx.closePath(); ctx.fill(); }
  } else if (e.poison > 0) {
    ctx.fillStyle = "rgba(120,200,74,0.38)"; ctx.beginPath(); ctx.arc(0, 0, e.r + 2, 0, 6.28); ctx.fill();
  }
  ctx.restore();
  if (e.hp < e.maxHp && !e.boss && !e.elite) {
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2, 4);
    ctx.fillStyle = "#ff5d5d"; ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2 * (e.hp / e.maxHp), 4);
  }
  // sleep Zzz indicator
  if (e.sleep > 0) {
    ctx.fillStyle = "#bfe6ff"; ctx.font = "16px " + FONT; ctx.textAlign = "left";
    const zb = Math.sin(Date.now() / 300 + e.x) * 2;
    ctx.fillText("z", e.x + e.r * 0.5, e.y - e.r - 6 + zb);
    ctx.font = "12px " + FONT; ctx.fillText("z", e.x + e.r * 0.5 + 10, e.y - e.r - 14 + zb);
  }
  // frozen snowflake marker
  if (e.frozen > 0) {
    ctx.fillStyle = "#cfeeff"; ctx.font = "14px " + FONT; ctx.textAlign = "center";
    ctx.fillText("❄", e.x, e.y - e.r - 6); ctx.textAlign = "left";
  }
  // poison rising bubbles
  if (e.poison > 0) {
    for (let i = 0; i < 2; i++) {
      const ph = ((Date.now() / 500 + i * 0.5 + e.x * 0.01) % 1);
      ctx.globalAlpha = (1 - ph) * 0.8; ctx.fillStyle = "#9be07a";
      ctx.beginPath(); ctx.arc(e.x + Math.sin(ph * 6 + i) * 6, e.y - e.r - ph * 14, 2.5, 0, 6.28); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

function drawHelper() {
  const h = helper;
  drawShadow(h.x, h.y, h.r);
  const y = h.y + Math.sin(h.bob) * 2.5;
  ctx.save(); ctx.translate(h.x, y);
  const flip = (player.x < h.x) ? -1 : 1; ctx.scale(flip, 1);
  if (h.key === "pikachu") drawPikachu(h.r);
  else drawJigglypuff(h.r, h.singFx > 0);
  // hurt flash overlay
  if (h.hurtFlash > 0) { ctx.globalAlpha = clamp(h.hurtFlash * 3, 0, 0.8); ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, h.r * 1.05, 0, 6.28); ctx.fill(); ctx.globalAlpha = 1; }
  ctx.restore();
  // pikachu: bold jagged lightning bolt (drawn over everything so it really pops)
  if (h.key === "pikachu") {
    if (h.zapFlash > 0) {
      // electric aura around Pikachu at the moment of the zap
      ctx.globalAlpha = clamp(h.zapFlash / 0.12, 0, 1) * 0.8;
      ctx.fillStyle = "#fff7c0"; ctx.beginPath(); ctx.arc(h.x, y, h.r * 1.8, 0, 6.28); ctx.fill();
      ctx.globalAlpha = 1;
    }
    if (h.bolt) {
      const fade = clamp(h.bolt.t / h.bolt.max, 0, 1);
      const pts = h.bolt.pts;
      ctx.save();
      ctx.lineJoin = "round"; ctx.lineCap = "round";
      // outer glow
      ctx.globalAlpha = fade;
      ctx.shadowColor = "#ffe14d"; ctx.shadowBlur = 16;
      ctx.strokeStyle = "rgba(255,210,60,0.9)"; ctx.lineWidth = 9;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.stroke();
      // mid layer
      ctx.shadowBlur = 6; ctx.strokeStyle = "#fff27a"; ctx.lineWidth = 5;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.stroke();
      // bright white core
      ctx.shadowBlur = 0; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.stroke();
      // impact burst ring at the target end
      const tip = pts[pts.length - 1];
      ctx.globalAlpha = fade * 0.9; ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(tip.x, tip.y, (1 - fade) * 26 + 6, 0, 6.28); ctx.stroke();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }
  // jigglypuff sing rings
  if (h.key === "jigglypuff" && h.singFx > 0) {
    const prog = 1 - (h.singFx / 1.2);
    ctx.globalAlpha = (1 - prog) * 0.7; ctx.strokeStyle = "#ffb6d5"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(h.x, y, 20 + prog * 220, 0, 6.28); ctx.stroke();
    ctx.globalAlpha = 1;
  }
  // HP bar above the helper
  const bw = h.r * 2.2, bx = h.x - bw / 2, by = h.y - h.r - 12;
  ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(bx - 1, by - 1, bw + 2, 5);
  ctx.fillStyle = h.color; ctx.fillRect(bx, by, bw * clamp(h.hp / h.maxHp, 0, 1), 3);
  // little tag so the player knows who it is
  ctx.fillStyle = h.color; ctx.font = "11px " + FONT; ctx.textAlign = "center";
  ctx.fillText(h.name, h.x, h.y + h.r + 14); ctx.textAlign = "left";
}

function drawPikachu(r) {
  const body = "#ffd23f", cheek = "#e85a4a";
  // tail (lightning bolt)
  ctx.fillStyle = "#e0a020";
  ctx.beginPath(); ctx.moveTo(-r * 0.6, r * 0.2); ctx.lineTo(-r * 1.2, -r * 0.2); ctx.lineTo(-r * 0.95, -r * 0.35); ctx.lineTo(-r * 1.5, -r * 0.9); ctx.lineTo(-r * 1.1, -r * 0.95); ctx.lineTo(-r * 0.55, -r * 0.3); ctx.closePath(); ctx.fill();
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, 0, r * 0.82, r, 0, 0, 6.28); ctx.fill();
  // ears (black tips)
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.moveTo(-r * 0.4, -r * 0.8); ctx.lineTo(-r * 0.7, -r * 1.6); ctx.lineTo(-r * 0.05, -r * 0.95); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.4, -r * 0.8); ctx.lineTo(r * 0.7, -r * 1.6); ctx.lineTo(r * 0.05, -r * 0.95); ctx.closePath(); ctx.fill();
  ctx.fillStyle = "#3a2d1a";
  ctx.beginPath(); ctx.moveTo(-r * 0.7, -r * 1.6); ctx.lineTo(-r * 0.5, -r * 1.25); ctx.lineTo(-r * 0.82, -r * 1.2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.7, -r * 1.6); ctx.lineTo(r * 0.5, -r * 1.25); ctx.lineTo(r * 0.82, -r * 1.2); ctx.closePath(); ctx.fill();
  // cheeks
  ctx.fillStyle = cheek;
  ctx.beginPath(); ctx.arc(-r * 0.45, r * 0.15, r * 0.18, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.45, r * 0.15, r * 0.18, 0, 6.28); ctx.fill();
  // eyes + nose
  eye(-r * 0.28, -r * 0.2, r * 0.16); eye(r * 0.28, -r * 0.2, r * 0.16);
  ctx.fillStyle = "#15151c"; ctx.beginPath(); ctx.arc(0, 0, r * 0.06, 0, 6.28); ctx.fill();
}

function drawJigglypuff(r, singing) {
  const body = "#ffb6d5";
  // round puffy body
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.fill();
  // ears (cat-like)
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 0.7); ctx.lineTo(-r * 0.75, -r * 1.3); ctx.lineTo(-r * 0.1, -r * 0.85); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.5, -r * 0.7); ctx.lineTo(r * 0.75, -r * 1.3); ctx.lineTo(r * 0.1, -r * 0.85); ctx.closePath(); ctx.fill();
  // curl of hair on forehead
  ctx.strokeStyle = "#e088b0"; ctx.lineWidth = 3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(-r * 0.1, -r * 0.7, r * 0.22, 0.2, 3.6); ctx.stroke(); ctx.lineCap = "butt";
  // big eyes
  eye(-r * 0.3, -r * 0.05, r * 0.22); eye(r * 0.3, -r * 0.05, r * 0.22);
  // mouth — open wide if singing
  ctx.fillStyle = "#c94f7a";
  if (singing) { ctx.beginPath(); ctx.ellipse(0, r * 0.4, r * 0.22, r * 0.3, 0, 0, 6.28); ctx.fill(); }
  else { ctx.strokeStyle = "#c94f7a"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, r * 0.3, r * 0.18, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke(); }
}

// tiny eye helper: white sclera + dark pupil
function eye(ex, ey, er, look) {
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(ex, ey, er, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#15151c"; ctx.beginPath(); ctx.arc(ex + (look || 0), ey, er * 0.5, 0, 6.28); ctx.fill();
}

function drawGenericCritter(e, flash) {
  const r = e.r;
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.arc(0, r * 0.3, r * 0.6, 0, 6.28); ctx.fill();
  eye(-r * 0.3, -r * 0.2, r * 0.16); eye(r * 0.3, -r * 0.2, r * 0.16);
}

// ---- World 1 ----
function drawCaterpie(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // tail segments behind
  ctx.fillStyle = dk;
  ctx.beginPath(); ctx.arc(-r * 0.85, r * 0.15, r * 0.5, 0, 6.28); ctx.fill();
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(-r * 0.3, r * 0.1, r * 0.68, 0, 6.28); ctx.fill();
  // yellow ring band
  ctx.fillStyle = flash ? "#fff" : "#f4d35e";
  ctx.beginPath(); ctx.ellipse(r * 0.12, r * 0.28, r * 0.5, r * 0.26, 0, 0, 6.28); ctx.fill();
  // head
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(r * 0.5, -r * 0.18, r * 0.78, 0, 6.28); ctx.fill();
  // red antenna
  ctx.strokeStyle = flash ? "#fff" : "#e0524d"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(r * 0.45, -r * 0.78); ctx.lineTo(r * 0.6, -r * 1.2); ctx.stroke();
  ctx.fillStyle = flash ? "#fff" : "#e0524d"; ctx.beginPath(); ctx.arc(r * 0.63, -r * 1.25, r * 0.16, 0, 6.28); ctx.fill();
  // big eye
  eye(r * 0.78, -r * 0.22, r * 0.3, r * 0.08);
}

function drawRattata(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // tail (long, curly)
  ctx.strokeStyle = dk; ctx.lineWidth = 3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-r * 0.7, r * 0.2); ctx.quadraticCurveTo(-r * 1.6, r * 0.1, -r * 1.3, -r * 0.6); ctx.stroke();
  ctx.lineCap = "butt";
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(-r * 0.1, r * 0.05, r * 0.9, r * 0.75, 0, 0, 6.28); ctx.fill();
  // belly
  ctx.fillStyle = flash ? "#fff" : "#f0eae0"; ctx.beginPath(); ctx.ellipse(0, r * 0.35, r * 0.5, r * 0.4, 0, 0, 6.28); ctx.fill();
  // head
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(r * 0.55, -r * 0.25, r * 0.62, 0, 6.28); ctx.fill();
  // big ears
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.moveTo(r * 0.2, -r * 0.7); ctx.lineTo(r * 0.05, -r * 1.3); ctx.lineTo(r * 0.55, -r * 0.85); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.75, -r * 0.75); ctx.lineTo(r * 0.95, -r * 1.25); ctx.lineTo(r * 1.0, -r * 0.6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : "#d98aa0";
  ctx.beginPath(); ctx.moveTo(r * 0.22, -r * 0.78); ctx.lineTo(r * 0.14, -r * 1.12); ctx.lineTo(r * 0.45, -r * 0.85); ctx.closePath(); ctx.fill();
  // eye + whiskers + buck teeth
  eye(r * 0.72, -r * 0.32, r * 0.2, r * 0.05);
  ctx.strokeStyle = dk; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(r * 1.0, -r * 0.1); ctx.lineTo(r * 1.5, -r * 0.25); ctx.moveTo(r * 1.0, r * 0.0); ctx.lineTo(r * 1.5, r * 0.05); ctx.stroke();
  ctx.fillStyle = "#fff"; ctx.fillRect(r * 0.95, r * 0.08, r * 0.12, r * 0.28);
}

function drawOddish(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, lf = flash ? "#fff" : "#5aa54f", lf2 = flash ? "#fff" : "#3f8a3a";
  // leaves on top (5)
  for (let i = -2; i <= 2; i++) {
    ctx.save(); ctx.translate(0, -r * 0.6); ctx.rotate(i * 0.42);
    ctx.fillStyle = i % 2 === 0 ? lf : lf2;
    ctx.beginPath(); ctx.ellipse(0, -r * 0.7, r * 0.22, r * 0.6, 0, 0, 6.28); ctx.fill();
    ctx.restore();
  }
  // round blue body
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(0, r * 0.1, r * 0.92, 0, 6.28); ctx.fill();
  // feet
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.ellipse(-r * 0.4, r * 0.95, r * 0.28, r * 0.18, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.4, r * 0.95, r * 0.28, r * 0.18, 0, 0, 6.28); ctx.fill();
  // wide face
  eye(-r * 0.32, 0, r * 0.2); eye(r * 0.32, 0, r * 0.2);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, r * 0.3, r * 0.4, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
}

// ---- World 2 ----
function drawGeodude(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // arms with fists (signature)
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(-r * 0.95, r * 0.15, r * 0.34, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.95, r * 0.15, r * 0.34, 0, 6.28); ctx.fill();
  ctx.strokeStyle = body; ctx.lineWidth = r * 0.3; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-r * 0.6, 0); ctx.lineTo(-r * 0.9, r * 0.15); ctx.moveTo(r * 0.6, 0); ctx.lineTo(r * 0.9, r * 0.15); ctx.stroke();
  ctx.lineCap = "butt";
  // rocky body (slightly faceted)
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(-r * 0.2, -r); ctx.lineTo(r * 0.55, -r * 0.8); ctx.lineTo(r, -r * 0.05);
  ctx.lineTo(r * 0.7, r * 0.85); ctx.lineTo(-r * 0.55, r * 0.9); ctx.lineTo(-r, r * 0.1); ctx.lineTo(-r * 0.75, -r * 0.6);
  ctx.closePath(); ctx.fill();
  // shading
  ctx.fillStyle = dk; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.moveTo(r, -r * 0.05); ctx.lineTo(r * 0.7, r * 0.85); ctx.lineTo(-r * 0.1, r * 0.5); ctx.closePath(); ctx.fill();
  ctx.globalAlpha = 1;
  // angry brows + eyes + mouth
  eye(-r * 0.3, -r * 0.1, r * 0.2); eye(r * 0.3, -r * 0.1, r * 0.2);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-r * 0.55, -r * 0.4); ctx.lineTo(-r * 0.12, -r * 0.22); ctx.moveTo(r * 0.55, -r * 0.4); ctx.lineTo(r * 0.12, -r * 0.22); ctx.stroke();
  ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-r * 0.25, r * 0.4); ctx.lineTo(r * 0.25, r * 0.4); ctx.stroke();
}

function drawZubat(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  const flap = Math.sin(Date.now() / 90 + e.bob) * 0.4;
  // wings (large, flapping)
  ctx.fillStyle = flash ? "#fff" : "#7e5fa8";
  for (const s of [-1, 1]) {
    ctx.save(); ctx.scale(s, 1); ctx.rotate(flap);
    ctx.beginPath(); ctx.moveTo(r * 0.3, 0);
    ctx.quadraticCurveTo(r * 1.4, -r * 0.6, r * 1.7, r * 0.1);
    ctx.quadraticCurveTo(r * 1.3, r * 0.1, r * 1.4, r * 0.6);
    ctx.quadraticCurveTo(r * 0.9, r * 0.3, r * 0.3, r * 0.5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(0, 0, r * 0.7, 0, 6.28); ctx.fill();
  // two ears
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.moveTo(-r * 0.35, -r * 0.55); ctx.lineTo(-r * 0.5, -r * 1.1); ctx.lineTo(-r * 0.05, -r * 0.6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.35, -r * 0.55); ctx.lineTo(r * 0.5, -r * 1.1); ctx.lineTo(r * 0.05, -r * 0.6); ctx.closePath(); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : "#c44a6a";
  ctx.beginPath(); ctx.moveTo(-r * 0.3, -r * 0.6); ctx.lineTo(-r * 0.42, -r * 0.95); ctx.lineTo(-r * 0.12, -r * 0.62); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.3, -r * 0.6); ctx.lineTo(r * 0.42, -r * 0.95); ctx.lineTo(r * 0.12, -r * 0.62); ctx.closePath(); ctx.fill();
  // open mouth with fangs (Zubat has no eyes)
  ctx.fillStyle = flash ? "#fff" : "#3a2535";
  ctx.beginPath(); ctx.ellipse(0, r * 0.15, r * 0.3, r * 0.22, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(-r * 0.2, r * 0.05); ctx.lineTo(-r * 0.1, r * 0.32); ctx.lineTo(-r * 0.02, r * 0.05); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.2, r * 0.05); ctx.lineTo(r * 0.1, r * 0.32); ctx.lineTo(r * 0.02, r * 0.05); ctx.closePath(); ctx.fill();
}

function drawGastly(e, flash) {
  const r = e.r;
  const t = Date.now() / 200;
  // wispy purple gas cloud
  ctx.fillStyle = flash ? "rgba(255,255,255,0.5)" : "rgba(120,90,170,0.45)";
  for (let i = 0; i < 9; i++) {
    const a = (i / 9) * Math.PI * 2 + t * 0.3;
    const rr = r * (1.1 + Math.sin(t + i) * 0.12);
    ctx.beginPath(); ctx.arc(Math.cos(a) * rr, Math.sin(a) * rr, r * 0.42, 0, 6.28); ctx.fill();
  }
  // dark core
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath(); ctx.arc(0, 0, r * 0.85, 0, 6.28); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.arc(0, r * 0.15, r * 0.6, 0, 6.28); ctx.fill();
  // big eyes + wide grin
  eye(-r * 0.34, -r * 0.12, r * 0.26); eye(r * 0.34, -r * 0.12, r * 0.26);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(0, r * 0.1, r * 0.5, 0.1 * Math.PI, 0.9 * Math.PI); ctx.stroke();
  // teeth
  ctx.fillStyle = "#fff";
  for (let i = -2; i <= 2; i++) { ctx.fillRect(i * r * 0.18 - r * 0.05, r * 0.3, r * 0.1, r * 0.16); }
}

// ---- World 3 ----
function drawMankey(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // limbs
  ctx.strokeStyle = body; ctx.lineWidth = r * 0.32; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-r * 0.4, r * 0.3); ctx.lineTo(-r * 0.85, r * 0.55);
  ctx.moveTo(r * 0.4, r * 0.3); ctx.lineTo(r * 0.85, r * 0.1);
  ctx.stroke(); ctx.lineCap = "butt";
  // round body/face
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(0, 0, r * 0.92, 0, 6.28); ctx.fill();
  // pig snout
  ctx.fillStyle = flash ? "#fff" : "#caa07a";
  ctx.beginPath(); ctx.ellipse(0, r * 0.25, r * 0.42, r * 0.3, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#5a4030";
  ctx.beginPath(); ctx.arc(-r * 0.15, r * 0.25, r * 0.08, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.15, r * 0.25, r * 0.08, 0, 6.28); ctx.fill();
  // fur tuft on head
  ctx.fillStyle = dk;
  for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i * r * 0.3, -r * 0.75); ctx.lineTo(i * r * 0.3 - r * 0.1, -r * 1.2); ctx.lineTo(i * r * 0.3 + r * 0.18, -r * 0.8); ctx.closePath(); ctx.fill(); }
  // angry eyes
  ctx.fillStyle = "#15151c";
  ctx.beginPath(); ctx.arc(-r * 0.3, -r * 0.15, r * 0.12, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.3, -r * 0.15, r * 0.12, 0, 6.28); ctx.fill();
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 0.42); ctx.lineTo(-r * 0.12, -r * 0.28); ctx.moveTo(r * 0.5, -r * 0.42); ctx.lineTo(r * 0.12, -r * 0.28); ctx.stroke();
}

function drawMagnemite(e, flash) {
  const r = e.r;
  const t = Date.now() / 150;
  // floating bob handled by caller; draw horseshoe magnets on sides
  for (const s of [-1, 1]) {
    ctx.save(); ctx.scale(s, 1);
    ctx.fillStyle = "#d0d4da"; ctx.beginPath(); ctx.arc(r * 1.0, 0, r * 0.42, 0, 6.28); ctx.fill();
    ctx.fillStyle = e.color2; ctx.beginPath(); ctx.arc(r * 1.0, 0, r * 0.24, 0, 6.28); ctx.fill();
    // tips (red/blue)
    ctx.fillStyle = s < 0 ? "#e04a4a" : "#4a6fe0";
    ctx.fillRect(r * 0.78, -r * 0.5, r * 0.18, r * 0.22);
    ctx.fillStyle = s < 0 ? "#4a6fe0" : "#e04a4a";
    ctx.fillRect(r * 0.78, r * 0.28, r * 0.18, r * 0.22);
    ctx.restore();
  }
  // steel sphere
  const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r);
  g.addColorStop(0, flash ? "#fff" : "#eef0f4"); g.addColorStop(1, flash ? "#fff" : e.color);
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(0, 0, r * 0.82, 0, 6.28); ctx.fill();
  // screws on top
  ctx.fillStyle = "#8a9098";
  ctx.beginPath(); ctx.moveTo(-r * 0.12, -r * 0.78); ctx.lineTo(r * 0.12, -r * 0.78); ctx.lineTo(0, -r * 1.15); ctx.closePath(); ctx.fill();
  // single big eye
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, r * 0.4, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#15151c"; ctx.beginPath(); ctx.arc(0, 0, r * 0.2, 0, 6.28); ctx.fill();
  // spark when charging shot
  if (e.shootCd < 0.4) { ctx.strokeStyle = "rgba(255,235,80,0.8)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(0, 0, r * (0.9 + Math.sin(t * 4) * 0.1), 0, 6.28); ctx.stroke(); }
}

function drawGraveler(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // four arms (two pairs)
  ctx.fillStyle = body;
  const arms = [[-1.0, -0.1], [1.0, -0.1], [-0.85, 0.55], [0.85, 0.55]];
  for (const a of arms) { ctx.beginPath(); ctx.arc(r * a[0], r * a[1], r * 0.3, 0, 6.28); ctx.fill(); }
  ctx.strokeStyle = body; ctx.lineWidth = r * 0.26; ctx.lineCap = "round";
  ctx.beginPath();
  for (const a of arms) { ctx.moveTo(r * a[0] * 0.55, r * a[1]); ctx.lineTo(r * a[0], r * a[1]); }
  ctx.stroke(); ctx.lineCap = "butt";
  // chunky boulder body
  ctx.fillStyle = body;
  ctx.beginPath();
  ctx.moveTo(-r * 0.3, -r); ctx.lineTo(r * 0.6, -r * 0.75); ctx.lineTo(r, 0);
  ctx.lineTo(r * 0.6, r * 0.9); ctx.lineTo(-r * 0.6, r * 0.9); ctx.lineTo(-r, 0); ctx.closePath(); ctx.fill();
  // rocky bumps / shading
  ctx.fillStyle = dk; ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.arc(-r * 0.4, r * 0.3, r * 0.22, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.45, -r * 0.2, r * 0.18, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  // face
  eye(-r * 0.28, -r * 0.05, r * 0.18); eye(r * 0.28, -r * 0.05, r * 0.18);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 0.32); ctx.lineTo(-r * 0.1, -r * 0.18); ctx.moveTo(r * 0.5, -r * 0.32); ctx.lineTo(r * 0.1, -r * 0.18); ctx.stroke();
  ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-r * 0.22, r * 0.35); ctx.lineTo(r * 0.22, r * 0.35); ctx.stroke();
}

function drawDiglett(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // mound of dirt it pokes out of
  ctx.fillStyle = flash ? "#eee" : "#5a4030";
  ctx.beginPath(); ctx.ellipse(0, r * 0.85, r * 1.2, r * 0.5, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : "#6e5038";
  ctx.beginPath(); ctx.ellipse(0, r * 0.7, r * 0.95, r * 0.4, 0, 0, 6.28); ctx.fill();
  // brown body poking up
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.moveTo(-r * 0.7, r * 0.7); ctx.quadraticCurveTo(-r * 0.8, -r * 0.9, 0, -r * 1.0); ctx.quadraticCurveTo(r * 0.8, -r * 0.9, r * 0.7, r * 0.7); ctx.closePath(); ctx.fill();
  // pink nose
  ctx.fillStyle = flash ? "#fff" : "#e0a0a0";
  ctx.beginPath(); ctx.ellipse(0, r * 0.1, r * 0.34, r * 0.26, 0, 0, 6.28); ctx.fill();
  // eyes (closed happy slits, classic Diglett)
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2.5; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-r * 0.42, -r * 0.45); ctx.lineTo(-r * 0.12, -r * 0.45);
  ctx.moveTo(r * 0.12, -r * 0.45); ctx.lineTo(r * 0.42, -r * 0.45); ctx.stroke();
  ctx.lineCap = "butt";
}

// ---- World 4 (Beach / Water) ----
function drawMagikarp(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  const flop = Math.sin(e.bob * 1.5) * 0.25;
  ctx.rotate(flop);
  // tail fin
  ctx.fillStyle = dk;
  ctx.beginPath(); ctx.moveTo(-r * 0.7, 0); ctx.lineTo(-r * 1.3, -r * 0.6); ctx.lineTo(-r * 1.15, 0); ctx.lineTo(-r * 1.3, r * 0.6); ctx.closePath(); ctx.fill();
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, 0, r, r * 0.7, 0, 0, 6.28); ctx.fill();
  // belly
  ctx.fillStyle = flash ? "#fff" : "#f0c89a"; ctx.beginPath(); ctx.ellipse(0, r * 0.25, r * 0.7, r * 0.32, 0, 0, 6.28); ctx.fill();
  // dorsal fin
  ctx.fillStyle = dk; ctx.beginPath(); ctx.moveTo(-r * 0.2, -r * 0.55); ctx.lineTo(r * 0.15, -r * 1.0); ctx.lineTo(r * 0.35, -r * 0.5); ctx.closePath(); ctx.fill();
  // barbels (whiskers)
  ctx.strokeStyle = flash ? "#fff" : "#f0e0a0"; ctx.lineWidth = 2; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(r * 0.7, r * 0.1); ctx.quadraticCurveTo(r * 1.1, r * 0.2, r * 1.0, r * 0.5); ctx.stroke(); ctx.lineCap = "butt";
  // big dull eye + frown
  eye(r * 0.4, -r * 0.18, r * 0.22);
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(r * 0.55, r * 0.35, r * 0.18, 1.1 * Math.PI, 1.9 * Math.PI); ctx.stroke();
}

function drawStarmie(e, flash) {
  const r = e.r;
  const spin = Date.now() / 600;
  ctx.rotate(spin);
  // two overlaid 5-point stars (purple), offset
  for (let layer = 0; layer < 2; layer++) {
    ctx.fillStyle = flash ? "#fff" : (layer ? e.color2 : e.color);
    ctx.rotate(layer ? 0.6 : 0);
    ctx.beginPath();
    for (let i = 0; i < 10; i++) { const a = (i / 10) * Math.PI * 2 - Math.PI / 2; const rr = i % 2 === 0 ? r * 1.15 : r * 0.45; const px = Math.cos(a) * rr, py = Math.sin(a) * rr; i ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
    ctx.closePath(); ctx.fill();
  }
  ctx.rotate(-0.6);
  // central jewel core
  ctx.fillStyle = flash ? "#fff" : "#ff5d7a"; ctx.shadowColor = "#ff8aa0"; ctx.shadowBlur = 10;
  ctx.beginPath();
  for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2; const rr = i % 2 ? r * 0.18 : r * 0.4; ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr); }
  ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
}

function drawPsyduck(e, flash) {
  const r = e.r, body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  // body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, r * 0.2, r * 0.78, r * 0.86, 0, 0, 6.28); ctx.fill();
  // head
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(0, -r * 0.45, r * 0.72, 0, 6.28); ctx.fill();
  // bill
  ctx.fillStyle = flash ? "#fff" : "#d8b85a";
  ctx.beginPath(); ctx.ellipse(0, -r * 0.18, r * 0.5, r * 0.22, 0, 0, 6.28); ctx.fill();
  // three hair strands
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2; ctx.lineCap = "round";
  for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i * r * 0.18, -r * 1.05); ctx.lineTo(i * r * 0.18, -r * 1.35); ctx.stroke(); }
  ctx.lineCap = "butt";
  // hands on head (the classic headache pose)
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(-r * 0.62, -r * 0.5, r * 0.22, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.62, -r * 0.5, r * 0.22, 0, 6.28); ctx.fill();
  // dazed eyes
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-r * 0.26, -r * 0.5, r * 0.1, 0, 6.28); ctx.moveTo(r * 0.36, -r * 0.5); ctx.arc(r * 0.26, -r * 0.5, r * 0.1, 0, 6.28); ctx.stroke();
}

function drawVoltorb(e, flash) {
  const r = e.r;
  // when arming to explode, pulse bright white/red
  const arming = e.fuse != null;
  const pulse = arming ? (0.5 + 0.5 * Math.sin(Date.now() / (60 + e.fuse * 60))) : 0;
  const topCol = flash ? "#fff" : (arming && pulse > 0.5 ? "#ffd0d0" : "#e8484a");
  // bottom white half
  ctx.fillStyle = flash ? "#fff" : "#e6e6ec"; ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI); ctx.fill();
  // top red half
  ctx.fillStyle = topCol; ctx.beginPath(); ctx.arc(0, 0, r, Math.PI, 6.28); ctx.fill();
  // middle band
  ctx.fillStyle = "#15151c"; ctx.fillRect(-r, -2.5, r * 2, 5);
  // eyes
  ctx.fillStyle = "#15151c"; ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.35, r * 0.12, 0, 6.28); ctx.arc(r * 0.35, -r * 0.35, r * 0.12, 0, 6.28); ctx.fill();
  // spark crackles while arming
  if (arming) {
    ctx.strokeStyle = "rgba(255,235,120," + (0.5 + pulse * 0.5) + ")"; ctx.lineWidth = 2;
    for (let i = 0; i < 4; i++) { const a = (i / 4) * 6.28 + Date.now() / 80; ctx.beginPath(); ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); ctx.lineTo(Math.cos(a + 0.3) * r * 1.4, Math.sin(a + 0.3) * r * 1.4); ctx.stroke(); }
  }
}

const ENEMY_SPRITES = {
  caterpie: drawCaterpie, rattata: drawRattata, oddish: drawOddish,
  geodude: drawGeodude, zubat: drawZubat, gastly: drawGastly, diglett: drawDiglett,
  mankey: drawMankey, magnemite: drawMagnemite, graveler: drawGraveler,
  magikarp: drawMagikarp, starmie: drawStarmie, psyduck: drawPsyduck, voltorb: drawVoltorb,
};

function drawBoss(e, flash) {
  const fn = BOSS_SPRITES[e.type];
  if (fn) fn(e, flash); else drawBossGeneric(e, flash);
  // enrage aura under half HP
  if (e.hp / e.maxHp < 0.5) {
    ctx.strokeStyle = "rgba(255,70,70," + (0.3 + Math.sin(Date.now() / 120) * 0.2) + ")";
    ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, 0, e.r + 14, 0, 6.28); ctx.stroke();
  }
}

function drawBossGeneric(e, flash) {
  const r = e.r;
  const body = flash ? "#fff" : e.color, dk = flash ? "#fff" : e.color2;
  const el = e.element || "wind";
  // element-flavored backdrop shape
  ctx.fillStyle = dk;
  if (el === "fire") {
    // flame mane spikes
    for (let i = 0; i < 9; i++) { const a = (i / 9) * 6.28; ctx.beginPath(); ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); ctx.lineTo(Math.cos(a) * r * 1.45, Math.sin(a) * r * 1.45); ctx.lineTo(Math.cos(a + 0.3) * r, Math.sin(a + 0.3) * r); ctx.closePath(); ctx.fill(); }
  } else if (el === "lightning") {
    // jagged electric crown
    for (let i = 0; i < 8; i++) { const a = (i / 8) * 6.28; ctx.beginPath(); ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); ctx.lineTo(Math.cos(a + 0.15) * r * 1.5, Math.sin(a + 0.15) * r * 1.5); ctx.lineTo(Math.cos(a + 0.3) * r, Math.sin(a + 0.3) * r); ctx.closePath(); ctx.fill(); }
  } else if (el === "water") {
    ctx.beginPath(); ctx.ellipse(0, 0, r * 1.15, r * 0.95, 0, 0, 6.28); ctx.fill();
  } else if (el === "psychic") {
    ctx.save(); ctx.globalAlpha = 0.4; ctx.fillStyle = e.accent; ctx.beginPath(); ctx.arc(0, 0, r * 1.3, 0, 6.28); ctx.fill(); ctx.restore();
  }
  // main body
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.fill();
  // belly / highlight
  ctx.fillStyle = flash ? "#eee" : shade(e.color, 1.15);
  ctx.beginPath(); ctx.ellipse(0, r * 0.3, r * 0.6, r * 0.5, 0, 0, 6.28); ctx.fill();
  // accent crest
  ctx.fillStyle = flash ? "#fff" : e.accent;
  ctx.beginPath(); ctx.moveTo(-r * 0.3, -r * 0.85); ctx.lineTo(0, -r * 1.3); ctx.lineTo(r * 0.3, -r * 0.85); ctx.closePath(); ctx.fill();
  // eyes
  eye(-r * 0.32, -r * 0.12, r * 0.16); eye(r * 0.32, -r * 0.12, r * 0.16);
  // brow
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(-r * 0.5, -r * 0.4); ctx.lineTo(-r * 0.12, -r * 0.28); ctx.moveTo(r * 0.5, -r * 0.4); ctx.lineTo(r * 0.12, -r * 0.28); ctx.stroke();
}

function drawButterfree(e, flash) {
  const r = e.r;

    ctx.save(); ctx.scale(s, 1); ctx.rotate(flap * s);

    ctx.fillStyle = flash ? "#fff" : "#f4f2fb";

    ctx.strokeStyle = flash ? "#fff" : e.accent; ctx.lineWidth = 4; ctx.stroke();

    ctx.beginPath(); ctx.ellipse(r * 0.8, r * 0.5, r * 0.5, r * 0.4, 0.3, 0, 6.28); ctx.fill();

  ctx.strokeStyle = flash ? "#fff" : shade(e.color2, 0.7); ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-r * 0.35, 0); ctx.lineTo(r * 0.35, 0); ctx.moveTo(-r * 0.3, r * 0.35); ctx.lineTo(r * 0.3, r * 0.35); ctx.stroke();
  // head
  ctx.fillStyle = flash ? "#fff" : e.color2;

  // antennae
  ctx.strokeStyle = flash ? "#fff" : e.color2; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-r * 0.15, -r * 1.0); ctx.lineTo(-r * 0.35, -r * 1.4); ctx.moveTo(r * 0.15, -r * 1.0); ctx.lineTo(r * 0.35, -r * 1.4); ctx.stroke();
  // big red compound eyes
  ctx.fillStyle = flash ? "#fff" : "#e04a5a";
  ctx.beginPath(); ctx.arc(-r * 0.22, -r * 0.7, r * 0.26, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.22, -r * 0.7, r * 0.26, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(-r * 0.28, -r * 0.78, r * 0.08, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.16, -r * 0.78, r * 0.08, 0, 6.28); ctx.fill();
}

function drawGolbat(e, flash) {

  ctx.beginPath(); ctx.moveTo(r * 0.45, r * 0.05); ctx.lineTo(r * 0.28, r * 0.45); ctx.lineTo(r * 0.12, r * 0.05); ctx.closePath(); ctx.fill();
}

function drawGolem(e, flash) {

function drawGyarados(e, flash) {
  const r = e.r;

    const sy = Math.sin(a) * r * 0.5 + i * r * 0.12;

  ctx.fillStyle = body;

  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(r * 0.55, r * 0.15, r * 0.55, r * 0.42, 0, 0, 6.28); ctx.fill();

  ctx.fillStyle = flash ? "#fff" : "#3a6aa0";
  for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i * r * 0.34 - r * 0.1, -r * 0.7); ctx.lineTo(i * r * 0.34, -r * 1.25); ctx.lineTo(i * r * 0.34 + r * 0.18, -r * 0.65); ctx.closePath(); ctx.fill(); }

  ctx.fillStyle = flash ? "#fff" : "#3a6aa0";
  ctx.beginPath(); ctx.moveTo(-r * 0.2, r * 0.4); ctx.lineTo(-r * 0.7, r * 1.1); ctx.lineTo(0.0, r * 0.85); ctx.closePath(); ctx.fill();
  // furious eyes
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.ellipse(-r * 0.12, -r * 0.2, r * 0.26, r * 0.18, -0.3, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#15151c"; ctx.beginPath(); ctx.arc(-r * 0.06, -r * 0.18, r * 0.1, 0, 6.28); ctx.fill();
  // angry brow
  ctx.strokeStyle = "#15151c"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(-r * 0.35, -r * 0.45); ctx.lineTo(r * 0.1, -r * 0.28); ctx.stroke();
  // gaping maw with fangs
  const chomp = (Math.sin(t * 1.4) + 1) / 2;
  ctx.fillStyle = flash ? "#fff" : "#7a2a3a";
  ctx.beginPath(); ctx.ellipse(r * 0.7, r * 0.3, r * 0.4, r * (0.16 + chomp * 0.3), 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.moveTo(r * 0.45, r * 0.18); ctx.lineTo(r * 0.55, r * 0.45); ctx.lineTo(r * 0.62, r * 0.18); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(r * 0.95, r * 0.18); ctx.lineTo(r * 0.85, r * 0.45); ctx.lineTo(r * 0.78, r * 0.18); ctx.closePath(); ctx.fill();
}

function drawMewTwo(e, flash) {
  const r = e.r;
  const t = Date.now() / 500;
  // psychic aura (layered)
  ctx.save();
  ctx.globalAlpha = 0.22 + 0.1 * Math.sin(t * 2);
  ctx.fillStyle = e.accent;
  ctx.beginPath(); ctx.arc(0, 0, r * 1.55, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 0.16; ctx.beginPath(); ctx.arc(0, 0, r * 1.2, 0, 6.28); ctx.fill();
  ctx.restore();
  const body = flash ? "#fff" : "#e6dcee", dk = flash ? "#fff" : "#9a7fb0";
  // long thick tail curling behind
  ctx.strokeStyle = dk; ctx.lineWidth = r * 0.2; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(-r * 0.1, r * 0.5); ctx.quadraticCurveTo(-r * 1.5, r * 0.4 + Math.sin(t) * 12, -r * 1.2, -r * 0.6); ctx.stroke(); ctx.lineCap = "butt";
  // thighs / lower body
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, r * 0.45, r * 0.55, r * 0.5, 0, 0, 6.28); ctx.fill();
  // torso (narrower waist)
  ctx.fillStyle = body; ctx.beginPath(); ctx.moveTo(-r * 0.42, r * 0.5); ctx.quadraticCurveTo(-r * 0.3, -r * 0.2, -r * 0.32, -r * 0.35); ctx.lineTo(r * 0.32, -r * 0.35); ctx.quadraticCurveTo(r * 0.3, -r * 0.2, r * 0.42, r * 0.5); ctx.closePath(); ctx.fill();
  // the signature neck tube from back of head to spine
  ctx.strokeStyle = dk; ctx.lineWidth = r * 0.14; ctx.lineCap = "round";
  ctx.beginPath(); ctx.moveTo(r * 0.05, -r * 0.95); ctx.quadraticCurveTo(r * 0.55, -r * 0.5, r * 0.18, -r * 0.2); ctx.stroke(); ctx.lineCap = "butt";
  // arms (3-fingered hands implied by rounded ends)
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(-r * 0.5, r * 0.05, r * 0.16, r * 0.42, 0.35, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.5, r * 0.05, r * 0.16, r * 0.42, -0.35, 0, 6.28); ctx.fill();
  ctx.fillStyle = body; ctx.beginPath(); ctx.arc(-r * 0.6, r * 0.28, r * 0.16, 0, 6.28); ctx.arc(r * 0.6, r * 0.28, r * 0.16, 0, 6.28); ctx.fill();
  // elongated head (egg shape, pointed crown)
  ctx.fillStyle = body; ctx.beginPath(); ctx.ellipse(0, -r * 0.6, r * 0.48, r * 0.56, 0, 0, 6.28); ctx.fill();
  // two short rounded horns / cranial bumps
  ctx.fillStyle = body;
  for (const s of [-1, 1]) { ctx.beginPath(); ctx.ellipse(s * r * 0.16, -r * 1.02, r * 0.1, r * 0.16, s * 0.2, 0, 6.28); ctx.fill(); }
  // brow ridge shading
  ctx.fillStyle = dk; ctx.globalAlpha = 0.4; ctx.beginPath(); ctx.ellipse(0, -r * 0.78, r * 0.42, r * 0.22, 0, 0, 6.28); ctx.fill(); ctx.globalAlpha = 1;
  // menacing purple eyes
  ctx.fillStyle = flash ? "#fff" : "#7a3ac0";
  ctx.beginPath(); ctx.ellipse(-r * 0.2, -r * 0.62, r * 0.13, r * 0.09, -0.35, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.2, -r * 0.62, r * 0.13, r * 0.09, 0.35, 0, 6.28); ctx.fill();
  // eye glint
  ctx.fillStyle = "#d9b3ff"; ctx.beginPath(); ctx.arc(-r * 0.22, -r * 0.64, r * 0.03, 0, 6.28); ctx.arc(r * 0.18, -r * 0.64, r * 0.03, 0, 6.28); ctx.fill();
}

function drawSnorlax(e, flash) {

  const segs = 6;

const ELITE_SPRITES = { raticate: drawRaticate, haunter: drawHaunter, onix: drawOnix, lapras: drawLapras,
  fearow: drawFearow, arbok: drawArbok, rhydon: drawRhydon, cloyster: drawCloyster };

function drawWave(wv) {
  const fx = wv.x + Math.cos(wv.a) * wv.pos;
  const fy = wv.y + Math.sin(wv.a) * wv.pos;
  const h = wv.half;
  const col = wv.color, glow = wv.glow;
  ctx.save();
  ctx.translate(fx, fy); ctx.rotate(wv.a);

  if (wv.style === "sonic") {
    // concentric sound arcs
    ctx.strokeStyle = col; ctx.lineWidth = 3;
    for (let i = 0; i < 3; i++) { const off = -i * 12; ctx.globalAlpha = 0.8 - i * 0.22; ctx.beginPath(); ctx.moveTo(off, -h); ctx.quadraticCurveTo(off + 18, 0, off, h); ctx.stroke(); }
    ctx.globalAlpha = 1;
  } else if (wv.style === "ripple") {
    // psychic warped ripple
    const t = wv.age * 14;
    ctx.strokeStyle = col; ctx.lineWidth = 3;
    ctx.beginPath();
    for (let y = -h; y <= h; y += 6) { const x = Math.sin(y * 0.12 + t) * 7; y === -h ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
    ctx.stroke();
    ctx.fillStyle = col; ctx.globalAlpha = 0.18; ctx.fillRect(-20, -h, 26, h * 2); ctx.globalAlpha = 1;
  } else if (wv.style === "rubble") {
    // tumbling rocks
    ctx.fillStyle = col;
    for (let s = -1; s <= 1; s++) {
      const cy = s * h * 0.55, sz = h * 0.34;
      ctx.beginPath();
      for (let k = 0; k < 6; k++) { const ang = (k / 6) * 6.28 + wv.age * 3 * (s + 2); const rr = sz * (k % 2 ? 0.75 : 1); const px = Math.cos(ang) * rr, py = cy + Math.sin(ang) * rr; k ? ctx.lineTo(px, py) : ctx.moveTo(px, py); }
      ctx.closePath(); ctx.fill();
    }
  } else if (wv.style === "flame") {
    // fire tongues
    const grad = ctx.createLinearGradient(-30, 0, 12, 0);
    grad.addColorStop(0, "rgba(255,80,0,0)"); grad.addColorStop(0.6, col); grad.addColorStop(1, glow);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.moveTo(-30, -h);
    for (let y = -h; y <= h; y += 8) { ctx.lineTo(10 + Math.sin(y * 0.2 + wv.age * 20) * 6, y); }
    ctx.lineTo(-30, h); ctx.closePath(); ctx.fill();
  } else if (wv.style === "bolt") {
    // lightning zigzag wall
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
    ctx.beginPath();
    for (let y = -h; y <= h; y += 10) { const x = (Math.floor(y / 10) % 2 ? 8 : -8); y === -h ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
    ctx.stroke();
    ctx.strokeStyle = col; ctx.lineWidth = 6; ctx.globalAlpha = 0.5; ctx.stroke(); ctx.globalAlpha = 1;
  } else {
    // wave/water — curved crescent
    const grad = ctx.createLinearGradient(-26, 0, 10, 0);
    grad.addColorStop(0, "rgba(86,176,224,0)"); grad.addColorStop(1, col);
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.moveTo(-26, -h); ctx.quadraticCurveTo(14, 0, -26, h);
    ctx.quadraticCurveTo(-6, 0, -26, -h); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = glow; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(8, -h); ctx.quadraticCurveTo(16, 0, 8, h); ctx.stroke();
  }
  ctx.restore();
}

function drawTelegraph(tg) {
  const prog = clamp(tg.t / tg.delay, 0, 1);
  const struck = tg.struck;
  ctx.save();
  if (tg.shape === "line") {
    ctx.translate(tg.x, tg.y); ctx.rotate(tg.a);
    const w = tg.len, h = tg.r * 2;
    ctx.fillStyle = struck ? "rgba(255,240,200,0.85)" : "rgba(255,60,60," + (0.12 + prog * 0.28) + ")";
    ctx.fillRect(0, -h / 2, w, h);
    ctx.strokeStyle = "rgba(255,80,80,0.9)"; ctx.lineWidth = 2; ctx.strokeRect(0, -h / 2, w, h);
    ctx.fillStyle = "rgba(255,90,90,0.35)"; ctx.fillRect(0, -h / 2, w * prog, h);
  } else if (tg.bolt) {
    // electric warning ring with charge-up sparks, then a big bolt on strike
    ctx.translate(tg.x, tg.y);
    if (!struck) {
      // pulsing yellow target ring + crackling sparks gathering inward
      ctx.strokeStyle = "rgba(255,225,77," + (0.4 + prog * 0.5) + ")"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, tg.r, 0, 6.28); ctx.stroke();
      ctx.strokeStyle = "rgba(255,245,160,0.9)"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, tg.r * (1 - prog * 0.8), 0, 6.28); ctx.stroke();
      // little sparks jittering around the ring
      ctx.strokeStyle = "rgba(255,235,120,0.85)"; ctx.lineWidth = 2;
      for (let i = 0; i < 5; i++) {
        const ang = (i / 5) * 6.28 + Date.now() / 90;
        const r1 = tg.r * 0.7, r2 = tg.r * 1.05;
        ctx.beginPath(); ctx.moveTo(Math.cos(ang) * r1, Math.sin(ang) * r1);
        ctx.lineTo(Math.cos(ang + 0.2) * r2, Math.sin(ang + 0.2) * r2); ctx.stroke();
      }
      // faint "incoming from above" hint line
      ctx.strokeStyle = "rgba(255,225,77,0.35)"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(0, -tg.r); ctx.lineTo(0, -tg.r - 120 * (1 - prog)); ctx.stroke();
    } else {
      // STRIKE: bright flash disc + a thick jagged lightning bolt crashing down
      const f = tg.flash || 1;
      ctx.fillStyle = "rgba(255,250,210," + (0.5 * f) + ")";
      ctx.beginPath(); ctx.arc(0, 0, tg.r * 1.2, 0, 6.28); ctx.fill();
      ctx.shadowColor = "#ffe14d"; ctx.shadowBlur = 16;
      const segs = 6, top = -340;
      const drawBolt = (w, col) => {
        ctx.strokeStyle = col; ctx.lineWidth = w; ctx.lineJoin = "round";
        ctx.beginPath(); ctx.moveTo(0, 0);
        let py = 0, px = 0;
        for (let i = 1; i <= segs; i++) { py = (top / segs) * i; px = (i === segs) ? 0 : (i % 2 ? -18 : 18) + rand(-6, 6); ctx.lineTo(px, py); }
        ctx.stroke();
      };
      drawBolt(9, "rgba(255,240,150,0.9)");
      drawBolt(4, "#ffffff");
      ctx.shadowBlur = 0;
    }
  } else if (tg.kind === "volcano") {
    // large molten eruption: pulsing magma ring + glowing cracks, big fire burst on strike
    ctx.translate(tg.x, tg.y);
    if (!struck) {
      // outer warning ring
      ctx.strokeStyle = "rgba(255,90,44," + (0.5 + prog * 0.4) + ")"; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.arc(0, 0, tg.r, 0, 6.28); ctx.stroke();
      // molten fill rising with the timer
      ctx.fillStyle = "rgba(255,80,30," + (0.1 + prog * 0.3) + ")";
      ctx.beginPath(); ctx.arc(0, 0, tg.r * (0.4 + prog * 0.6), 0, 6.28); ctx.fill();
      // radiating magma cracks
      ctx.strokeStyle = "rgba(255,180,60," + (0.4 + prog * 0.5) + ")"; ctx.lineWidth = 3;
      for (let i = 0; i < 8; i++) {
        const ang = (i / 8) * 6.28 + 0.2;
        ctx.beginPath(); ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(ang) * tg.r * (0.5 + prog * 0.5), Math.sin(ang) * tg.r * (0.5 + prog * 0.5));
        ctx.stroke();
      }
      // bubbling embers
      ctx.fillStyle = "rgba(255,210,120,0.8)";
      for (let i = 0; i < 6; i++) { const ang = (i / 6) * 6.28 + Date.now() / 200; const rr = tg.r * (0.3 + 0.5 * ((Date.now() / 300 + i) % 1)); ctx.beginPath(); ctx.arc(Math.cos(ang) * rr, Math.sin(ang) * rr, 3, 0, 6.28); ctx.fill(); }
    } else {
      // ERUPTION: bright burst disc + flung magma blobs
      const f = tg.flash || 1;
      ctx.fillStyle = "rgba(255,140,60," + (0.6 * f) + ")";
      ctx.beginPath(); ctx.arc(0, 0, tg.r * 1.1, 0, 6.28); ctx.fill();
      ctx.fillStyle = "rgba(255,90,30," + (0.7 * f) + ")";
      ctx.beginPath(); ctx.arc(0, 0, tg.r * 0.7, 0, 6.28); ctx.fill();
      ctx.fillStyle = "rgba(255,220,140," + (0.9 * f) + ")";
      for (let i = 0; i < 10; i++) { const ang = (i / 10) * 6.28; const rr = tg.r * 0.9; ctx.beginPath(); ctx.arc(Math.cos(ang) * rr, Math.sin(ang) * rr, 6, 0, 6.28); ctx.fill(); }
    }
  } else if (tg.kind === "rockdrop") {
    // ground target ring + a rock visibly falling from above toward the spot
    ctx.translate(tg.x, tg.y);
    if (!struck) {
      // shadow target ring on the ground (shrinks as the rock nears)
      ctx.strokeStyle = "rgba(180,176,188," + (0.5 + prog * 0.4) + ")"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, tg.r, 0, 6.28); ctx.stroke();
      ctx.fillStyle = "rgba(120,116,128," + (0.12 + prog * 0.18) + ")";
      ctx.beginPath(); ctx.ellipse(0, 0, tg.r * (1 - prog * 0.45), tg.r * 0.55 * (1 - prog * 0.45), 0, 0, 6.28); ctx.fill();

      ctx.beginPath();
      ctx.moveTo(0, rockY - rs);
      ctx.lineTo(rs * 0.9, rockY - rs * 0.2);
      ctx.lineTo(rs * 0.6, rockY + rs * 0.8);
      ctx.lineTo(-rs * 0.6, rockY + rs * 0.7);
      ctx.lineTo(-rs * 0.9, rockY - rs * 0.3);

      ctx.beginPath(); ctx.moveTo(0, rockY - rs); ctx.lineTo(rs * 0.6, rockY + rs * 0.8); ctx.lineTo(-rs * 0.6, rockY + rs * 0.7); ctx.closePath(); ctx.fill();
