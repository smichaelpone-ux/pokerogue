<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0c1320">
<title>PokéRogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #070b12;
    font-family: 'VT323', monospace;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(circle at 30% 20%, #16243a 0%, #0a0f1a 55%, #06090f 100%);
  }
  #game {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #0c1320;
    box-shadow: 0 0 0 2px #1d2c44, 0 20px 60px rgba(0,0,0,0.6);
    border-radius: 6px;
    touch-action: none;
  }
  /* Landscape prompt for mobile portrait */
  #rotate {
    position: fixed; inset: 0; z-index: 50;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0f1a; color: #cfe0ff; text-align: center; padding: 24px;
  }
  #rotate .ph { font-size: 64px; margin-bottom: 18px; animation: rot 2s ease-in-out infinite; }
  #rotate h2 { font-family: 'Press Start 2P', monospace; font-size: 16px; color: #ffd23f; margin-bottom: 14px; line-height: 1.6; }
  #rotate p { font-size: 22px; color: #9fb3c8; }
  @keyframes rot { 0%,100% { transform: rotate(0deg);} 50% { transform: rotate(90deg);} }
  #hint {
    position: fixed; bottom: 6px; left: 0; right: 0; text-align: center;
    color: #3f4d60; font-size: 15px; pointer-events: none; z-index: 5;
  }
  @media (pointer: coarse) { #hint { display: none; } }
</style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="540"></canvas>
  </div>
  <div id="rotate">
    <div class="ph">📱</div>
    <h2>Rotate your device</h2>
    <p>PokéRogue plays best in landscape mode.</p>
  </div>
  <div id="hint">WASD move &nbsp;·&nbsp; J attack &nbsp;·&nbsp; K special &nbsp;·&nbsp; SPACE dash &nbsp;·&nbsp; ESC pause &nbsp;·&nbsp; M mute</div>
<script>
/* =========================================================================
   PokéRogue — a Hades-style roguelike with elemental starters
   Vanilla JS + Canvas. Desktop (WASD + J/K/Space) and mobile (touch) support.
   ========================================================================= */
(() => {
"use strict";

// ----------------------------------------------------------------------------
// Canvas setup
// ----------------------------------------------------------------------------
const VW = 960, VH = 540;            // internal virtual resolution (16:9)
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = VW; canvas.height = VH;

let scale = 1, offX = 0, offY = 0;   // for mapping screen->virtual coords
function resize() {
  const wrap = document.getElementById("wrap");
  const w = wrap.clientWidth, h = wrap.clientHeight;
  const s = Math.min(w / VW, h / VH);
  canvas.style.width = (VW * s) + "px";
  canvas.style.height = (VH * s) + "px";
  const rect = canvas.getBoundingClientRect();
  scale = rect.width / VW;
  offX = rect.left; offY = rect.top;
  checkOrientation();
}
window.addEventListener("resize", resize);
window.addEventListener("orientationchange", () => setTimeout(resize, 200));

const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
function checkOrientation() {
  const rot = document.getElementById("rotate");
  if (isTouch && window.innerHeight > window.innerWidth) rot.style.display = "flex";
  else rot.style.display = "none";
}

// ----------------------------------------------------------------------------
// Persistence — window.storage (Claude artifacts) with localStorage fallback
// ----------------------------------------------------------------------------
const Persist = {
  async load(key, def) {
    try {
      if (window.storage && window.storage.get) {
        const r = await window.storage.get(key);
        return r && r.value ? JSON.parse(r.value) : def;
      }
    } catch (e) {}
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; }
    catch (e) {}
    return def;
  },
  async save(key, val) {
    const s = JSON.stringify(val);
    try { if (window.storage && window.storage.set) { await window.storage.set(key, s); return; } }
    catch (e) {}
    try { localStorage.setItem(key, s); } catch (e) {}
  }
};

// ----------------------------------------------------------------------------
// Tiny WebAudio SFX
// ----------------------------------------------------------------------------
const Audio2 = (() => {
  let ac = null, muted = false;
  function ensure() { if (!ac) { try { ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } return ac; }
  function blip(freq, dur, type, vol) {
    if (muted) return; const a = ensure(); if (!a) return;
    try {
      const o = a.createOscillator(), g = a.createGain();
      o.type = type || "square"; o.frequency.value = freq;
      g.gain.value = (vol || 0.08);
      o.connect(g); g.connect(a.destination);
      const t = a.currentTime;
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.start(t); o.stop(t + dur);
    } catch (e) {}
  }
  return {
    resume() { const a = ensure(); if (a && a.state === "suspended") a.resume(); },
    toggleMute() { muted = !muted; return muted; },
    isMuted() { return muted; },
    attack() { blip(420, 0.07, "square", 0.05); },
    special() { blip(620, 0.18, "sawtooth", 0.06); },
    dash() { blip(220, 0.1, "sine", 0.05); },
    hit() { blip(180, 0.06, "triangle", 0.05); },
    hurt() { blip(120, 0.18, "sawtooth", 0.09); },
    pickup() { blip(880, 0.08, "square", 0.05); },
    boon() { blip(660, 0.12, "triangle", 0.08); blip(990, 0.12, "triangle", 0.06); },
    die() { blip(160, 0.5, "sawtooth", 0.1); },
    boss() { blip(90, 0.6, "sawtooth", 0.1); },
    ui() { blip(520, 0.05, "square", 0.04); }
  };
})();

// ----------------------------------------------------------------------------
// Input
// ----------------------------------------------------------------------------
const keys = {};
const justPressed = {};
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (!keys[k]) justPressed[k] = true;
  keys[k] = true;
  if (["arrowup","arrowdown","arrowleft","arrowright"," "].includes(k)) e.preventDefault();
  Audio2.resume();
});
window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

// touch input state
const touch = {
  move: { active: false, id: null, ox: 0, oy: 0, dx: 0, dy: 0 },
  buttons: { attack: false, special: false, dash: false }
};
// edge-trigger helpers for touch buttons
const touchEdge = { attack: false, special: false, dash: false };

function vcoords(clientX, clientY) {
  return { x: (clientX - offX) / scale, y: (clientY - offY) / scale };
}

// ----------------------------------------------------------------------------
// Utility
// ----------------------------------------------------------------------------
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];
const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; };
const dist = (ax, ay, bx, by) => Math.sqrt(dist2(ax, ay, bx, by));
function angDiff(a, b) { let d = a - b; while (d > Math.PI) d -= Math.PI * 2; while (d < -Math.PI) d += Math.PI * 2; return d; }

// Arena bounds (play field inside the frame)
const ARENA = { x: 70, y: 70, w: VW - 140, h: VH - 140 };
ARENA.r = ARENA.x + ARENA.w; ARENA.b = ARENA.y + ARENA.h;
ARENA.cx = ARENA.x + ARENA.w / 2; ARENA.cy = ARENA.y + ARENA.h / 2;

// ----------------------------------------------------------------------------
// Starters
// ----------------------------------------------------------------------------
const STARTERS = {
  charmander: {
    name: "Charmander", type: "Fire", color: "#f0803c", color2: "#fce0a8", accent: "#ff5a2c",
    desc: "Aggressive bruiser. A close-range Fire burst and an explosive Fireball.",

            spDmg: 34, spCd: 1.7 },

  },

    name: "Squirtle", type: "Water", color: "#56b0e0", color2: "#cfeefb", accent: "#2f7fb8",
    desc: "Balanced & sturdy. A focused Water Gun jet and a 3-shot Aqua Pulse.",
    base: { maxHp: 115, speed: 3.2, atkDmg: 18, atkCd: 0.33, atkRange: 92, atkArc: 0.95,
            spDmg: 16, spCd: 1.5 },
    special: "aqua", melee: "water", passive: "Sturdier shell: starts with bonus HP."
  },

            spDmg: 13, spCd: 1.4 },

  }
};

// ----------------------------------------------------------------------------
// Boons (in-run power-ups offered at gates)
// ----------------------------------------------------------------------------
const BOONS = [
  { id: "claws", name: "Sharp Claws", icon: "⚔", color: "#ff7a45", desc: "+30% Attack damage", apply: p => p.mods.atkDmg *= 1.30 },
  { id: "power", name: "Power Surge", icon: "✦", color: "#ffd23f", desc: "+35% Special damage", apply: p => p.mods.spDmg *= 1.35 },
  { id: "swift", name: "Quick Strikes", icon: "»", color: "#9ad0ff", desc: "+22% Attack speed", apply: p => p.mods.atkCd *= 0.78 },
  { id: "vital", name: "Vitality", icon: "❤", color: "#ff5d7a", desc: "+30 Max HP & heal", apply: p => { p.mods.maxHp += 30; p.heal(30); } },
  { id: "burn", name: "Burning Touch", icon: "🔥", color: "#ff6a2a", desc: "Attacks apply Burn", apply: p => p.mods.burn = true },
  { id: "vamp", name: "Vampiric Edge", icon: "🩸", color: "#d24b6a", desc: "Lifesteal 9% of melee dmg", apply: p => p.mods.lifesteal += 0.09 },

  { id: "trail", name: "Searing Trail", icon: "♨", color: "#ff9442", desc: "Dash leaves a damaging trail", apply: p => p.mods.dashTrail = true },
  { id: "feet", name: "Swift Feet", icon: "➤", color: "#7ee8c0", desc: "+16% Move speed", apply: p => p.mods.speed *= 1.16 },
  { id: "crit", name: "Critical Eye", icon: "◎", color: "#ffe14d", desc: "25% chance for 2× damage", apply: p => p.mods.crit += 0.25 },
  { id: "multi", name: "Multishot", icon: "⋔", color: "#86e0ff", desc: "Special fires +2 projectiles", apply: p => p.mods.multishot += 2 },
  { id: "hide", name: "Thick Hide", icon: "🛡", color: "#9fb3c8", desc: "Take 16% less damage", apply: p => p.mods.dmgTaken *= 0.84 },
  { id: "explo", name: "Volatile Special", icon: "✸", color: "#ff8c4d", desc: "Special explodes on hit", apply: p => p.mods.explode = true },
  { id: "wind", name: "Second Wind", icon: "✚", color: "#7df0a0", desc: "Heal 18 HP each new room", apply: p => p.mods.roomHeal += 18 },
  { id: "greed", name: "Lucky Charm", icon: "★", color: "#ffd95e", desc: "+45% Stardust drops", apply: p => p.mods.greed += 0.45 },
  { id: "pierce", name: "Piercing Shot", icon: "→", color: "#a0ffe0", desc: "Special pierces enemies", apply: p => p.mods.pierce = true },
];

// ----------------------------------------------------------------------------
// Meta upgrades (permanent, bought with Stardust in the hub)
// ----------------------------------------------------------------------------
const UPGRADES = [
  { id: "tough",   name: "Reinforced Vest", icon: "🛡", desc: "+22 Max HP", max: 6, cost: l => 40 + l * 35 },
  { id: "power",   name: "Power Band",      icon: "⚔", desc: "+3 base Attack dmg", max: 6, cost: l => 45 + l * 35 },
  { id: "focus",   name: "Mystic Lens",     icon: "✦", desc: "+12% base Special dmg", max: 6, cost: l => 45 + l * 35 },
  { id: "agility", name: "Swift Boots",     icon: "✺", desc: "-0.06s dash cooldown", max: 4, cost: l => 60 + l * 50 },
  { id: "fortune", name: "Lucky Coin",      icon: "★", desc: "+15% Stardust earned", max: 5, cost: l => 50 + l * 45 },
  { id: "resolve", name: "Revival Herb",    icon: "✚", desc: "Start each run with +1 revive", max: 2, cost: l => 150 + l * 200 },
  { id: "headstart", name: "Battle Charm",  icon: "◈", desc: "Begin run with a random boon", max: 3, cost: l => 120 + l * 120 },
];

// ----------------------------------------------------------------------------
// World definitions
// ----------------------------------------------------------------------------
const WORLDS = [
  { name: "Verdant Plains", short: "Grassland", sky: "#2e5d3a", ground: "#3a7a48", ground2: "#347042",
    accent: "#7be08a", fog: "rgba(40,90,55,0.0)", deco: "grass",
    enemies: ["grub", "buzzer", "spitter"], boss: "vilethorn", hpMul: 1, dmgMul: 1 },
  { name: "Echo Caverns", short: "Cave", sky: "#1b1726", ground: "#2c2433", ground2: "#26202e",
    accent: "#a878ff", fog: "rgba(20,15,30,0.35)", deco: "rock",
    enemies: ["pebble", "bat", "spark"], boss: "boulderon", hpMul: 1.7, dmgMul: 1.4 },
  { name: "Frostpeak Summit", short: "Mountain", sky: "#1f3550", ground: "#5b6f86", ground2: "#54687d",
    accent: "#9fdcff", fog: "rgba(190,215,240,0.10)", deco: "snow",

];

// Enemy archetype definitions
const ENEMY_DEFS = {
  grub:    { name: "Grub", r: 16, hp: 34, speed: 1.5, dmg: 9, kind: "rusher", color: "#9bd06a", color2: "#6fa83f", touchCd: 0.7, sd: 4 },
  buzzer:  { name: "Buzzer", r: 13, hp: 24, speed: 2.9, dmg: 8, kind: "charger", color: "#f2d34a", color2: "#caa72b", touchCd: 0.6, sd: 5 },
  spitter: { name: "Spitter", r: 18, hp: 40, speed: 0.9, dmg: 11, kind: "shooter", color: "#7fbf6a", color2: "#4f8c46", touchCd: 0.8, sd: 6, projSpeed: 3.4, shootCd: 1.8 },

  bat:     { name: "Cave Bat", r: 13, hp: 30, speed: 3.4, dmg: 10, kind: "charger", color: "#7a5fb0", color2: "#523f7d", touchCd: 0.55, sd: 6 },
  spark:   { name: "Spark", r: 15, hp: 44, speed: 1.6, dmg: 12, kind: "shooter", color: "#ffe14d", color2: "#caa400", touchCd: 0.7, sd: 8, projSpeed: 4.6, shootCd: 1.5 },
  frostling: { name: "Frostling", r: 16, hp: 70, speed: 1.7, dmg: 15, kind: "shooter", color: "#bfe6ff", color2: "#7fb8d8", touchCd: 0.7, sd: 10, projSpeed: 4.0, shootCd: 1.4 },
  raptor:  { name: "Raptor", r: 15, hp: 60, speed: 3.9, dmg: 16, kind: "charger", color: "#e08a5a", color2: "#a85f33", touchCd: 0.5, sd: 11 },
  ironclad: { name: "Ironclad", r: 22, hp: 150, speed: 1.0, dmg: 20, kind: "tank", color: "#9fb0c2", color2: "#6b7c8e", touchCd: 1.0, sd: 14 },
};

const BOSS_DEFS = {
  vilethorn: { name: "Vilethorn", r: 46, hp: 620, speed: 1.1, dmg: 16, color: "#5fae5f", color2: "#3a7a3a", accent: "#caff9a", sd: 90 },
  boulderon: { name: "Boulderon", r: 54, hp: 1150, speed: 1.3, dmg: 22, color: "#8a7c6a", color2: "#5e5346", accent: "#c8b89a", sd: 150 },
  drakon:    { name: "Drakon", r: 58, hp: 1900, speed: 1.5, dmg: 28, color: "#b0566a", color2: "#7a3346", accent: "#ffb0c0", sd: 260 },
};

// ----------------------------------------------------------------------------
// Game state
// ----------------------------------------------------------------------------
const STATE = { TITLE: "title", HUB: "hub", PLAY: "play", BOON: "boon", DEAD: "dead", WIN: "win", PAUSE: "pause" };
let state = STATE.TITLE;
let prevState = STATE.HUB;

let meta = {
  stardust: 0,
  upgrades: { tough: 0, power: 0, focus: 0, agility: 0, fortune: 0, resolve: 0, headstart: 0 },
  bestWorld: 0, runs: 0, wins: 0,
};

let player = null;
let run = null;            // current run context
let enemies = [];
let projectiles = [];
let particles = [];
let pickups = [];
let floaters = [];         // damage numbers
let gates = [];            // exit boon gates
let obstacles = [];        // solid cover that blocks movement & projectiles
let shake = 0;
let timeScale = 1;
let flashMsg = null;       // {text, t, color}

let selectedStarter = "charmander";
let boonChoices = [];

// UI clickable regions, rebuilt each render of menu states
let uiButtons = [];
function addBtn(x, y, w, h, label, fn, opts) { uiButtons.push({ x, y, w, h, label, fn, opts: opts || {} }); }
function hitButtons(vx, vy) {
  for (let i = uiButtons.length - 1; i >= 0; i--) {
    const b = uiButtons[i];
    if (vx >= b.x && vx <= b.x + b.w && vy >= b.y && vy <= b.y + b.h) {
      if (!b.opts.disabled) { Audio2.ui(); b.fn(); }
      return true;
    }
  }
  return false;
}

// ----------------------------------------------------------------------------
// Player
// ----------------------------------------------------------------------------
function makePlayer(starterKey) {
  const s = STARTERS[starterKey];
  const u = meta.upgrades;
  const p = {
    key: starterKey, s,
    x: ARENA.cx, y: ARENA.cy, r: 16,
    facing: 0,
    hp: 0, // set below
    invuln: 0,           // i-frame timer
    atkTimer: 0, spTimer: 0, dashTimer: 0, dashCdTimer: 0,
    dashing: false, dashVx: 0, dashVy: 0,
    swing: 0,            // melee swing animation timer
    swingDir: 1,
    bob: 0,
    hurtFlash: 0,
    revives: u.resolve,
    // base stats with meta upgrades baked in
    base: {
      maxHp: s.base.maxHp + u.tough * 22,
      speed: s.base.speed,
      atkDmg: s.base.atkDmg + u.power * 3,
      atkCd: s.base.atkCd,
      atkRange: s.base.atkRange,
      atkArc: s.base.atkArc,
      spDmg: s.base.spDmg * (1 + u.focus * 0.12),
      spCd: s.base.spCd,
      dashCd: 0.7 - u.agility * 0.06,
      dashIframe: 0.2,
    },
    // multiplicative / additive in-run modifiers from boons
    mods: {
      maxHp: 0, speed: 1, atkDmg: 1, atkCd: 1, spDmg: 1,
      crit: 0, lifesteal: 0, multishot: 0, dmgTaken: 1, greed: meta.upgrades.fortune * 0.15,
      burn: false, dashTrail: false, explode: false, pierce: false,
      dashCd: 1, dashIframe: 0, roomHeal: 0,
    },
    boons: [],
  };
  p.heal = function (n) { this.hp = clamp(this.hp + n, 0, this.maxHp()); };
  p.maxHp = function () { return Math.round(this.base.maxHp + this.mods.maxHp); };
  p.spd = function () { return this.base.speed * this.mods.speed; };
  p.atkDamage = function () { return this.base.atkDmg * this.mods.atkDmg; };
  p.atkCooldown = function () { return this.base.atkCd * this.mods.atkCd; };
  p.spDamage = function () { return this.base.spDmg * this.mods.spDmg; };
  p.dashCooldown = function () { return this.base.dashCd * this.mods.dashCd; };
  p.dashIframes = function () { return this.base.dashIframe + this.mods.dashIframe; };
  p.hp = p.maxHp();
  return p;
}

function applyBoon(boon) {
  boon.apply(player);
  player.boons.push(boon);
  Audio2.boon();
}

// ----------------------------------------------------------------------------
// Run / world management
// ----------------------------------------------------------------------------
function startRun() {
  player = makePlayer(selectedStarter);
  run = { world: 0, room: 0, roomsInWorld: randi(5, 7), stardust: 0, kills: 0, cleared: false };
  enemies = []; projectiles = []; particles = []; pickups = []; floaters = []; gates = []; obstacles = [];
  meta.runs++;
  // head-start boons
  for (let i = 0; i < meta.upgrades.headstart; i++) applyBoon(pick(BOONS));
  state = STATE.PLAY;
  enterRoom();
  flash("WORLD 1 — " + WORLDS[0].short, WORLDS[0].accent);
}

function enterRoom() {
  enemies = []; projectiles = []; pickups = []; gates = [];
  particles = []; floaters = [];
  player.x = ARENA.x + 60; player.y = ARENA.cy;
  player.invuln = 1.0;
  run.cleared = false;
  if (player.mods.roomHeal > 0) player.heal(player.mods.roomHeal);

  const w = WORLDS[run.world];
  const isBoss = run.room >= run.roomsInWorld;
  genObstacles(w, isBoss);
  if (isBoss) { spawnBoss(w); Audio2.boss(); flash("⚠ BOSS: " + BOSS_DEFS[w.boss].name, "#ff6a6a"); }
  else spawnRoomEnemies(w);
}

// ---- Obstacles -------------------------------------------------------------
function genObstacles(w, isBoss) {
  obstacles = [];
  const count = isBoss ? 2 : randi(3, 5);
  const startZone = { x: ARENA.x + 60, y: ARENA.cy }; // keep player spawn clear
  let tries = 0;
  while (obstacles.length < count && tries < 200) {
    tries++;
    const ow = rand(50, 92), oh = rand(46, 84);
    const ox = rand(ARENA.x + 40, ARENA.r - 110 - ow); // leave the right gate column clear
    const oy = rand(ARENA.y + 40, ARENA.b - 40 - oh);
    const cx = ox + ow / 2, cy = oy + oh / 2;
    // keep spawn area and arena center lanes navigable
    if (dist(cx, cy, startZone.x, startZone.y) < 150) continue;
    if (isBoss && dist(cx, cy, ARENA.cx, ARENA.cy) < 170) continue;
    let overlap = false;
    for (const o of obstacles) {
      if (ox < o.x + o.w + 28 && ox + ow + 28 > o.x && oy < o.y + o.h + 28 && oy + oh + 28 > o.y) { overlap = true; break; }
    }
    if (overlap) continue;
    obstacles.push({ x: ox, y: oy, w: ow, h: oh, seed: rand(0, 1000) });
  }
}

// Push a circular entity {x,y,r} out of any obstacle it overlaps.
function resolveObstacles(ent) {
  for (const o of obstacles) {
    const nx = clamp(ent.x, o.x, o.x + o.w);
    const ny = clamp(ent.y, o.y, o.y + o.h);
    let dx = ent.x - nx, dy = ent.y - ny;
    let d2 = dx * dx + dy * dy;
    if (d2 < ent.r * ent.r) {
      if (d2 > 0.0001) {
        const d = Math.sqrt(d2);
        ent.x = nx + (dx / d) * ent.r;
        ent.y = ny + (dy / d) * ent.r;
      } else {
        // center inside the rect: eject along the shallowest axis
        const left = ent.x - o.x, right = o.x + o.w - ent.x;
        const top = ent.y - o.y, bottom = o.y + o.h - ent.y;
        const m = Math.min(left, right, top, bottom);
        if (m === left) ent.x = o.x - ent.r;
        else if (m === right) ent.x = o.x + o.w + ent.r;
        else if (m === top) ent.y = o.y - ent.r;
        else ent.y = o.y + o.h + ent.r;
      }
    }
  }
}

function hitsObstacle(x, y, r) {
  for (const o of obstacles) {
    const nx = clamp(x, o.x, o.x + o.w), ny = clamp(y, o.y, o.y + o.h);
    const dx = x - nx, dy = y - ny;
    if (dx * dx + dy * dy < r * r) return true;
  }
  return false;
}

function difficulty() {
  // global difficulty grows slowly across rooms and worlds
  const w = WORLDS[run.world];
  const roomScale = 1 + run.room * 0.06;
  return { hp: w.hpMul * roomScale, dmg: w.dmgMul * (1 + run.room * 0.03) };
}

function spawnRoomEnemies(w) {
  const diff = difficulty();
  const count = clamp(3 + run.room + run.world, 3, 9);
  for (let i = 0; i < count; i++) {
    const type = pick(w.enemies);
    spawnEnemy(type, diff);
  }
}

function spawnEnemy(type, diff) {
  const d = ENEMY_DEFS[type];
  let x, y, tries = 0;
  do {
    x = rand(ARENA.x + 30, ARENA.r - 30);
    y = rand(ARENA.y + 30, ARENA.b - 30);
    tries++;
  } while ((dist(x, y, player.x, player.y) < 180 || hitsObstacle(x, y, d.r + 6)) && tries < 40);
  enemies.push({
    type, name: d.name, x, y, r: d.r,
    hp: Math.round(d.hp * diff.hp), maxHp: Math.round(d.hp * diff.hp),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: d.kind,
    color: d.color, color2: d.color2, sd: d.sd,
    touchCd: 0, touchCdMax: d.touchCd, shootCd: rand(0.5, d.shootCd || 2),
    shootCdMax: d.shootCd || 2, projSpeed: d.projSpeed || 3,
    burn: 0, hurtFlash: 0, bob: rand(0, 6), kb: { x: 0, y: 0 },
    chargeT: 0, charging: false, boss: false,
  });
}

function spawnBoss(w) {
  const d = BOSS_DEFS[w.boss];
  const diff = difficulty();
  enemies.push({
    type: w.boss, name: d.name, boss: true,
    x: ARENA.cx, y: ARENA.y + 120, r: d.r,
    hp: Math.round(d.hp * (0.8 + run.world * 0.1)), maxHp: Math.round(d.hp * (0.8 + run.world * 0.1)),
    speed: d.speed, dmg: d.dmg * diff.dmg, kind: "boss",
    color: d.color, color2: d.color2, accent: d.accent, sd: d.sd,
    touchCd: 0, touchCdMax: 0.8, burn: 0, hurtFlash: 0, bob: 0, kb: { x: 0, y: 0 },
    phase: 0, atkTimer: 1.5, atkIndex: 0, moveTimer: 0, tx: ARENA.cx, ty: ARENA.cy,
  });
}

function onRoomCleared() {
  run.cleared = true;
  // open gates
  const isLastRoomBeforeBoss = run.room === run.roomsInWorld - 1;
  if (run.room >= run.roomsInWorld) {
    // boss cleared -> next world or win
    bossCleared();
    return;
  }
  openGates();
  flash("ROOM CLEAR", WORLDS[run.world].accent);
}

function openGates() {
  const n = randi(2, 3);
  const pool = BOONS.slice();
  // shuffle
  for (let i = pool.length - 1; i > 0; i--) { const j = randi(0, i); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  const chosen = pool.slice(0, n);
  gates = [];
  const gapY = ARENA.h / (n + 1);
  for (let i = 0; i < n; i++) {
    gates.push({
      x: ARENA.r - 6, y: ARENA.y + gapY * (i + 1),
      w: 46, h: 76, boon: chosen[i], glow: 0,
    });
  }
}

function takeGate(boon) {
  applyBoon(boon);
  run.room++;
  gates = [];
  if (run.room >= run.roomsInWorld) {
    enterRoom(); // boss room
  } else {
    enterRoom();
  }
}

function bossCleared() {
  meta.bestWorld = Math.max(meta.bestWorld, run.world + 1);
  if (run.world >= WORLDS.length - 1) {
    // WIN
    endRun(true);
  } else {
    run.world++;
    run.room = 0;
    run.roomsInWorld = randi(5, 7);
    enterRoom();
    flash("WORLD " + (run.world + 1) + " — " + WORLDS[run.world].short, WORLDS[run.world].accent);
  }
}

function endRun(won) {
  const earned = Math.round(run.stardust * (1 + meta.upgrades.fortune * 0.15));
  run.earned = earned;
  meta.stardust += earned;
  if (won) meta.wins++;
  shake = 0; timeScale = 1;
  state = won ? STATE.WIN : STATE.DEAD;
  if (won) Audio2.boss(); else Audio2.die();
  Persist.save("pokerogue_meta", meta); // fire-and-forget; state already updated
}

// ----------------------------------------------------------------------------
// Combat helpers
// ----------------------------------------------------------------------------
function flash(text, color) { flashMsg = { text, t: 1.8, color: color || "#fff" }; }

function floater(x, y, text, color, big) {
  floaters.push({ x, y, vy: -28, t: 0.9, text, color: color || "#fff", big: !!big });
}

function damageEnemy(e, amount, opts) {
  opts = opts || {};
  let dmg = amount;
  let crit = false;
  if (!opts.noCrit && Math.random() < player.mods.crit) { dmg *= 2; crit = true; }
  dmg = Math.round(dmg);
  e.hp -= dmg;
  e.hurtFlash = 0.12;
  floater(e.x, e.y - e.r - 6, dmg + (crit ? "!" : ""), crit ? "#ffe14d" : "#ffffff", crit || e.boss);
  if (player.mods.lifesteal > 0 && opts.melee) player.heal(dmg * player.mods.lifesteal);
  Audio2.hit();
  spawnParticles(e.x, e.y, e.color, crit ? 10 : 5);
  if (opts.knockback) { const a = Math.atan2(e.y - player.y, e.x - player.x); e.kb.x += Math.cos(a) * opts.knockback; e.kb.y += Math.sin(a) * opts.knockback; }
  if (player.mods.burn && opts.melee) e.burn = Math.max(e.burn, 2.2);
  if (e.hp <= 0) killEnemy(e);
}

function killEnemy(e) {
  e.dead = true;
  spawnParticles(e.x, e.y, e.color, e.boss ? 40 : 12);
  run.kills++;
  const sd = Math.round(e.sd * (1 + player.mods.greed));
  pickups.push({ x: e.x, y: e.y, r: 7, vy: 0, t: 0, value: sd, type: "stardust" });
  if (e.boss) shake = 0.5;
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2), sp = rand(0.5, 4);
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: rand(1.5, 4), t: rand(0.3, 0.7), color });
  }
}

function spawnProjectile(o) { projectiles.push(Object.assign({ r: 7, life: 2.5, pierce: false, hits: [], owner: "player", explode: false, burn: false }, o)); }

function hurtPlayer(amount) {
  if (player.invuln > 0 || player.dashing) return;
  let dmg = Math.round(amount * player.mods.dmgTaken);
  player.hp -= dmg;
  player.invuln = 0.6;
  player.hurtFlash = 0.3;
  shake = Math.max(shake, 0.35);
  Audio2.hurt();
  floater(player.x, player.y - player.r - 8, "-" + dmg, "#ff6a6a");
  if (player.hp <= 0) {
    if (player.revives > 0) { player.revives--; player.hp = Math.round(player.maxHp() * 0.5); player.invuln = 1.5; flash("REVIVED!", "#7df0a0"); spawnParticles(player.x, player.y, "#7df0a0", 30); }
    else { endRun(false); }
  }
}

// ----------------------------------------------------------------------------
// Player actions
// ----------------------------------------------------------------------------
function doAttack() {
  if (player.atkTimer > 0) return;
  player.atkTimer = player.atkCooldown();
  player.swing = 0.18;
  player.swingDir *= -1;
  player.atkFx = { t: 0.22, dur: 0.22, dir: player.facing };
  Audio2.attack();
  const range = player.base.atkRange, arc = player.base.atkArc;
  const dmg = player.atkDamage();
  for (const e of enemies) {
    const d = dist(player.x, player.y, e.x, e.y);
    if (d <= range + e.r) {
      const a = Math.atan2(e.y - player.y, e.x - player.x);
      if (Math.abs(angDiff(a, player.facing)) <= arc / 1.4) {
        damageEnemy(e, dmg, { melee: true, knockback: player.key === "squirtle" ? 8 : 3 });
      }
    }
  }
}

function doSpecial() {
  if (player.spTimer > 0) return;
  player.spTimer = player.base.spCd;
  Audio2.special();
  const dmg = player.spDamage();
  const type = player.s.special;
  const base = player.facing;
  const explode = player.mods.explode, pierce = player.mods.pierce;
  if (type === "fireball") {
    const n = 1 + player.mods.multishot;
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * 0.14;
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 6, vy: Math.sin(a) * 6, r: 11, dmg, life: 1.6, color: "#ff7a2c", trail: "#ffd27a", explode: true, burn: true, pierce, big: true });
    }
  } else if (type === "aqua") {
    const n = 3 + player.mods.multishot;
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * 0.22;
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 7, vy: Math.sin(a) * 7, r: 8, dmg, life: 1.3, color: "#56b0e0", trail: "#cfeefb", explode, pierce, knockback: 4 });
    }
  } else if (type === "leaf") {
    const n = 5 + player.mods.multishot;
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * 0.16;
      spawnProjectile({ x: player.x, y: player.y, vx: Math.cos(a) * 7.5, vy: Math.sin(a) * 7.5, r: 7, dmg, life: 1.4, color: "#6fc28b", trail: "#d8f2c8", explode, pierce: true, leaf: true });
    }
  }
}

function doDash() {
  if (player.dashCdTimer > 0 || player.dashing) return;
  let dx = 0, dy = 0;
  if (keys["a"] || keys["arrowleft"]) dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;
  if (keys["w"] || keys["arrowup"]) dy -= 1;
  if (keys["s"] || keys["arrowdown"]) dy += 1;
  if (touch.move.active) { dx = touch.move.dx; dy = touch.move.dy; }
  if (dx === 0 && dy === 0) { dx = Math.cos(player.facing); dy = Math.sin(player.facing); }
  const m = Math.hypot(dx, dy) || 1;
  player.dashVx = dx / m; player.dashVy = dy / m;
  player.dashing = true;
  player.dashTimer = 0.16;
  player.dashCdTimer = player.dashCooldown();
  player.invuln = Math.max(player.invuln, player.dashIframes());
  Audio2.dash();
  spawnParticles(player.x, player.y, player.s.color2, 8);
}

// ----------------------------------------------------------------------------
// Update
// ----------------------------------------------------------------------------
function update(dt) {
  if (state !== STATE.PLAY) return;

  // timers
  if (shake > 0) shake = Math.max(0, shake - dt);
  if (flashMsg) { flashMsg.t -= dt; if (flashMsg.t <= 0) flashMsg = null; }

  const p = player;
  p.bob += dt * 8;
  if (p.atkTimer > 0) p.atkTimer -= dt;
  if (p.spTimer > 0) p.spTimer -= dt;
  if (p.dashCdTimer > 0) p.dashCdTimer -= dt;
  if (p.invuln > 0) p.invuln -= dt;
  if (p.swing > 0) p.swing -= dt;
  if (p.atkFx && p.atkFx.t > 0) p.atkFx.t -= dt;
  if (p.hurtFlash > 0) p.hurtFlash -= dt;

  // input -> movement
  let dx = 0, dy = 0;
  if (keys["a"] || keys["arrowleft"]) dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;
  if (keys["w"] || keys["arrowup"]) dy -= 1;
  if (keys["s"] || keys["arrowdown"]) dy += 1;
  if (touch.move.active) { dx = touch.move.dx; dy = touch.move.dy; }

  if (p.dashing) {
    p.dashTimer -= dt;
    const sp = 9.5;
    p.x += p.dashVx * sp;
    p.y += p.dashVy * sp;
    if (p.mods.dashTrail) {
      particles.push({ x: p.x, y: p.y, vx: 0, vy: 0, r: 10, t: 0.4, color: "#ff8c4d", trail: true, dmg: p.atkDamage() * 0.4 });
    }
    if (p.dashTimer <= 0) p.dashing = false;
  } else {
    const m = Math.hypot(dx, dy);
    if (m > 0) {
      const sp = p.spd();
      p.x += (dx / m) * sp;
      p.y += (dy / m) * sp;
      p.facing = Math.atan2(dy, dx);
    }
  }
  p.x = clamp(p.x, ARENA.x + p.r, ARENA.r - p.r);
  p.y = clamp(p.y, ARENA.y + p.r, ARENA.b - p.r);
  resolveObstacles(p);

  // actions (keyboard edge + touch edge)
  if (justPressed["j"] || touchEdge.attack) doAttack();
  if (justPressed["k"] || touchEdge.special) doSpecial();
  if (justPressed[" "] || touchEdge.dash) doDash();
  // dash trail damage
  for (const pt of particles) {
    if (pt.trail && pt.dmg) {
      for (const e of enemies) {
        if (!e.dead && dist(pt.x, pt.y, e.x, e.y) < e.r + pt.r) {
          if (!pt._hit) { pt._hit = {}; }
          if (!pt._hit[e.type + e.x.toFixed(0)]) { damageEnemy(e, pt.dmg, { noCrit: true }); pt.dmg = 0; }
        }
      }
    }
  }

  clearEdges();

  // update enemies
  for (const e of enemies) {
    if (e.dead) continue;
    updateEnemy(e, dt);
  }
  enemies = enemies.filter(e => !e.dead);

  // projectiles
  updateProjectiles(dt);

  // particles
  for (const pt of particles) { pt.x += pt.vx; pt.y += pt.vy; pt.vx *= 0.92; pt.vy *= 0.92; pt.t -= dt; }
  particles = particles.filter(pt => pt.t > 0);

  // pickups
  for (const pk of pickups) {
    pk.t += dt;
    const d = dist(pk.x, pk.y, p.x, p.y);
    if (d < 120) { const a = Math.atan2(p.y - pk.y, p.x - pk.x); pk.x += Math.cos(a) * 3.2; pk.y += Math.sin(a) * 3.2; }
    if (d < p.r + pk.r) { collectPickup(pk); pk.dead = true; }
  }
  pickups = pickups.filter(pk => !pk.dead);

  // floaters
  for (const f of floaters) { f.y += f.vy * dt; f.vy *= 0.94; f.t -= dt; }
  floaters = floaters.filter(f => f.t > 0);

  // room clear check
  if (!run.cleared && enemies.length === 0 && pickups.length === 0) {
    // small grace so the last drop can be grabbed; we check pickups too
    onRoomCleared();
  } else if (!run.cleared && enemies.length === 0 && gates.length === 0) {
    // enemies gone but pickups remain — open gates once pickups collected handled above
  }

  // gates
  for (const g of gates) {
    g.glow += dt;
    if (p.x + p.r > g.x && Math.abs(p.y - (g.y)) < g.h / 2 + 4) {
      takeGate(g.boon);
      break;
    }
  }
}

function collectPickup(pk) {
  if (pk.type === "stardust") { run.stardust += pk.value; Audio2.pickup(); floater(pk.x, pk.y - 8, "+" + pk.value + "✦", "#ffd95e"); }
}

function updateEnemy(e, dt) {
  if (e.burn > 0) { e.burn -= dt; e._burnTick = (e._burnTick || 0) - dt; if (e._burnTick <= 0) { e._burnTick = 0.4; e.hp -= 3; floater(e.x, e.y - e.r, "3", "#ff8c4d"); spawnParticles(e.x, e.y, "#ff8c4d", 2); if (e.hp <= 0) { killEnemy(e); return; } } }
  if (e.hurtFlash > 0) e.hurtFlash -= dt;
  if (e.touchCd > 0) e.touchCd -= dt;
  e.bob += dt * 6;
  // knockback decay
  e.x += e.kb.x; e.y += e.kb.y; e.kb.x *= 0.8; e.kb.y *= 0.8;

  if (e.kind === "boss") { updateBoss(e, dt); }
  else {
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    const d = dist(e.x, e.y, player.x, player.y);
    if (e.kind === "rusher" || e.kind === "tank") {
      e.x += Math.cos(a) * e.speed; e.y += Math.sin(a) * e.speed;
    } else if (e.kind === "charger") {
      // wind up then dash
      if (!e.charging && d < 280) { e.charging = true; e.chargeT = 0.5; e.chargeA = a; }
      if (e.charging) {
        e.chargeT -= dt;
        if (e.chargeT > 0.2) { /* windup, slow */ e.x += Math.cos(a) * e.speed * 0.2; e.y += Math.sin(a) * e.speed * 0.2; }
        else { e.x += Math.cos(e.chargeA) * e.speed * 1.8; e.y += Math.sin(e.chargeA) * e.speed * 1.8; }
        if (e.chargeT <= -0.25) e.charging = false;
      } else { e.x += Math.cos(a) * e.speed * 0.6; e.y += Math.sin(a) * e.speed * 0.6; }
    } else if (e.kind === "shooter") {
      // keep distance
      if (d < 200) { e.x -= Math.cos(a) * e.speed; e.y -= Math.sin(a) * e.speed; }
      else if (d > 300) { e.x += Math.cos(a) * e.speed; e.y += Math.sin(a) * e.speed; }
      e.shootCd -= dt;
      if (e.shootCd <= 0) {
        e.shootCd = e.shootCdMax;
        projectiles.push({ x: e.x, y: e.y, vx: Math.cos(a) * e.projSpeed, vy: Math.sin(a) * e.projSpeed, r: 8, dmg: e.dmg, life: 3, color: e.color2, owner: "enemy", trail: e.color });
      }
    }
  }
  // bounds
  e.x = clamp(e.x, ARENA.x + e.r, ARENA.r - e.r);
  e.y = clamp(e.y, ARENA.y + e.r, ARENA.b - e.r);
  resolveObstacles(e);

  // contact damage
  if (e.touchCd <= 0 && dist(e.x, e.y, player.x, player.y) < e.r + player.r) {
    hurtPlayer(e.dmg); e.touchCd = e.touchCdMax;
  }
}

function updateBoss(e, dt) {
  e.atkTimer -= dt;
  e.moveTimer -= dt;
  const a = Math.atan2(player.y - e.y, player.x - e.x);
  // hover-move toward a target point, keeping mid distance
  if (e.moveTimer <= 0) { e.moveTimer = rand(1.2, 2.2); e.tx = rand(ARENA.x + 120, ARENA.r - 120); e.ty = rand(ARENA.y + 100, ARENA.cy + 40); }
  const ta = Math.atan2(e.ty - e.y, e.tx - e.x);
  if (dist(e.x, e.y, e.tx, e.ty) > 10) { e.x += Math.cos(ta) * e.speed; e.y += Math.sin(ta) * e.speed; }
  e.x = clamp(e.x, ARENA.x + e.r, ARENA.r - e.r);
  e.y = clamp(e.y, ARENA.y + e.r, ARENA.b - e.r);

  const hpFrac = e.hp / e.maxHp;
  const enraged = hpFrac < 0.5;
  if (e.atkTimer <= 0) {
    e.atkIndex = (e.atkIndex + 1) % 3;
    if (e.type === "vilethorn") bossAttackSpread(e, a, enraged ? 12 : 8, 4);
    else if (e.type === "boulderon") {
      if (e.atkIndex === 0) bossAttackSpread(e, a, enraged ? 16 : 10, 3.6);
      else bossAttackAimed(e, a, 3, 5);
    } else { // drakon
      if (e.atkIndex === 0) bossAttackSpread(e, a, enraged ? 20 : 14, 4.5);
      else if (e.atkIndex === 1) bossAttackRing(e, enraged ? 16 : 12, 3.4);
      else bossAttackAimed(e, a, 5, 6);
    }
    e.atkTimer = enraged ? rand(0.9, 1.4) : rand(1.4, 2.0);
  }
  if (e.touchCd <= 0 && dist(e.x, e.y, player.x, player.y) < e.r + player.r) {
    hurtPlayer(e.dmg); e.touchCd = e.touchCdMax;
  }
}
function bossProj(e, a, sp) {
  projectiles.push({ x: e.x, y: e.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 10, dmg: e.dmg, life: 4, color: e.accent, owner: "enemy", trail: e.color });
}
function bossAttackSpread(e, a, count, sp) { const spread = 0.9; for (let i = 0; i < count; i++) { const ang = a - spread / 2 + spread * (i / (count - 1)); bossProj(e, ang, sp); } }
function bossAttackRing(e, count, sp) { for (let i = 0; i < count; i++) { bossProj(e, (i / count) * Math.PI * 2, sp); } }
function bossAttackAimed(e, a, count, sp) {
  // Fire a straight stream in ONE locked direction (snapshot at volley start) — no homing.
  for (let i = 0; i < count; i++) {
    setTimeout(() => { if (!e.dead && state === STATE.PLAY) bossProj(e, a, sp); }, i * 110);
  }
}

function updateProjectiles(dt) {
  for (const pr of projectiles) {
    pr.x += pr.vx; pr.y += pr.vy; pr.life -= dt;
    if (pr.trail) particles.push({ x: pr.x, y: pr.y, vx: 0, vy: 0, r: pr.r * 0.6, t: 0.25, color: typeof pr.trail === "string" ? pr.trail : pr.color });
    // out of bounds
    if (pr.x < ARENA.x || pr.x > ARENA.r || pr.y < ARENA.y || pr.y > ARENA.b) {
      if (pr.owner === "player" && pr.explode) explode(pr); pr.dead = true; continue;
    }
    // blocked by obstacles
    if (hitsObstacle(pr.x, pr.y, pr.r)) {
      if (pr.owner === "player" && pr.explode) explode(pr);
      spawnParticles(pr.x, pr.y, pr.color, 4);
      pr.dead = true; continue;
    }
    pr.life <= 0 && (pr.dead = true);
    if (pr.owner === "player") {
      for (const e of enemies) {
        if (e.dead) continue;
        if (pr.hits.includes(e)) continue;
        if (dist(pr.x, pr.y, e.x, e.y) < pr.r + e.r) {
          damageEnemy(e, pr.dmg, { knockback: pr.knockback || 0 });
          if (pr.burn) e.burn = Math.max(e.burn, 2.2);
          pr.hits.push(e);
          if (pr.explode) { explode(pr); pr.dead = true; break; }
          if (!pr.pierce) { pr.dead = true; break; }
        }
      }
    } else {
      if (dist(pr.x, pr.y, player.x, player.y) < pr.r + player.r) { hurtPlayer(pr.dmg); pr.dead = true; }
    }
  }
  projectiles = projectiles.filter(pr => !pr.dead);
}

function explode(pr) {
  spawnParticles(pr.x, pr.y, pr.color, 16);
  shake = Math.max(shake, 0.15);
  const R = 60;
  for (const e of enemies) { if (!e.dead && dist(pr.x, pr.y, e.x, e.y) < R + e.r) damageEnemy(e, pr.dmg * 0.6, { noCrit: true }); }
}

function clearEdges() { for (const k in justPressed) justPressed[k] = false; touchEdge.attack = touchEdge.special = touchEdge.dash = false; }

// ----------------------------------------------------------------------------
// Rendering
// ----------------------------------------------------------------------------
const FONT = "'VT323', monospace";
const FONTH = "'Press Start 2P', monospace";

function setFont(size, head) { ctx.font = (head ? "" : "") + size + "px " + (head ? FONTH : FONT); }

function render() {
  ctx.save();
  // screen shake — only while actively playing (never on win/dead/menus)
  if (shake > 0 && (state === STATE.PLAY || state === STATE.PAUSE)) {
    ctx.translate(rand(-shake, shake) * 8, rand(-shake, shake) * 8);
  }

  if (state === STATE.TITLE) renderTitle();
  else if (state === STATE.HUB) renderHub();
  else if (state === STATE.PLAY || state === STATE.PAUSE) { renderPlay(); if (state === STATE.PAUSE) renderPause(); }
  else if (state === STATE.DEAD) { renderPlay(); renderDead(); }
  else if (state === STATE.WIN) renderWin();

  ctx.restore();
}

// ---- Backgrounds ----
function bgGradient(top, bottom) {
  const g = ctx.createLinearGradient(0, 0, 0, VH);
  g.addColorStop(0, top); g.addColorStop(1, bottom);
  ctx.fillStyle = g; ctx.fillRect(0, 0, VW, VH);
}

function renderPlay() {
  const w = WORLDS[run.world];
  // sky/backdrop
  bgGradient(shade(w.sky, 1.1), w.sky);
  // arena floor
  drawArena(w);
  // entities sorted by y
  const ents = [];
  for (const pk of pickups) ents.push({ y: pk.y, draw: () => drawPickup(pk) });
  for (const o of obstacles) ents.push({ y: o.y + o.h, draw: () => drawObstacle(o, w) });
  for (const e of enemies) ents.push({ y: e.y, draw: () => drawEnemy(e) });
  ents.push({ y: player.y, draw: () => drawPlayer() });
  ents.sort((a, b) => a.y - b.y);
  // ground particles below
  for (const pt of particles) drawParticle(pt);
  for (const e of ents) e.draw();
  for (const pr of projectiles) drawProjectile(pr);
  // gates
  for (const g of gates) drawGate(g);
  // floaters
  for (const f of floaters) drawFloater(f);

  // fog overlay
  if (w.fog && w.fog !== "rgba(40,90,55,0.0)") { ctx.fillStyle = w.fog; ctx.fillRect(0, 0, VW, VH); }

  drawHUD();
  if (flashMsg) drawFlash();
  if (isTouch) drawTouchControls();
}

function drawArena(w) {
  // checker floor
  const tile = 60;
  for (let y = ARENA.y; y < ARENA.b; y += tile) {
    for (let x = ARENA.x; x < ARENA.r; x += tile) {
      const odd = ((Math.floor((x - ARENA.x) / tile) + Math.floor((y - ARENA.y) / tile)) % 2) === 0;
      ctx.fillStyle = odd ? w.ground : w.ground2;
      ctx.fillRect(x, y, Math.min(tile, ARENA.r - x), Math.min(tile, ARENA.b - y));
    }
  }
  // decorations
  drawDeco(w);
  // border frame
  ctx.lineWidth = 6; ctx.strokeStyle = shade(w.ground, 0.6);
  ctx.strokeRect(ARENA.x, ARENA.y, ARENA.w, ARENA.h);
  ctx.lineWidth = 2; ctx.strokeStyle = shade(w.accent, 0.8);
  ctx.strokeRect(ARENA.x + 3, ARENA.y + 3, ARENA.w - 6, ARENA.h - 6);
  // vignette
  const vg = ctx.createRadialGradient(VW / 2, VH / 2, VH * 0.3, VW / 2, VH / 2, VH * 0.8);
  vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(0,0,0,0.35)");
  ctx.fillStyle = vg; ctx.fillRect(0, 0, VW, VH);
}

let decoCache = null, decoWorld = -1, decoRoom = -1;
function drawDeco(w) {
  if (decoWorld !== run.world || decoRoom !== run.room) {
    decoWorld = run.world; decoRoom = run.room; decoCache = [];
    for (let i = 0; i < 22; i++) decoCache.push({ x: rand(ARENA.x + 20, ARENA.r - 20), y: rand(ARENA.y + 20, ARENA.b - 20), s: rand(0.7, 1.4), rot: rand(0, 6.28) });
  }
  for (const d of decoCache) {
    ctx.save(); ctx.translate(d.x, d.y); ctx.scale(d.s, d.s);
    if (w.deco === "grass") {
      ctx.strokeStyle = shade(w.ground, 1.4); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(0, 4); ctx.quadraticCurveTo(-3, -4, -5, -8); ctx.moveTo(0, 4); ctx.quadraticCurveTo(0, -5, 0, -10); ctx.moveTo(0, 4); ctx.quadraticCurveTo(3, -4, 5, -8); ctx.stroke();
    } else if (w.deco === "rock") {
      ctx.fillStyle = shade(w.ground, 0.7); ctx.beginPath(); ctx.moveTo(-6, 4); ctx.lineTo(-3, -5); ctx.lineTo(4, -4); ctx.lineTo(6, 4); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(168,120,255,0.25)"; ctx.fillRect(-1, -3, 2, 4);
    } else if (w.deco === "snow") {
      ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.arc(0, 0, 2.5, 0, 6.28); ctx.fill();
      ctx.fillStyle = shade(w.ground, 0.8); ctx.beginPath(); ctx.moveTo(-5, 5); ctx.lineTo(0, -6); ctx.lineTo(5, 5); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }
}

function shade(hex, f) {
  const c = hex.replace("#", "");
  let r = parseInt(c.substr(0, 2), 16), g = parseInt(c.substr(2, 2), 16), b = parseInt(c.substr(4, 2), 16);
  r = clamp(Math.round(r * f), 0, 255); g = clamp(Math.round(g * f), 0, 255); b = clamp(Math.round(b * f), 0, 255);
  return "rgb(" + r + "," + g + "," + b + ")";
}

// ---- Creatures ----
function drawShadow(x, y, r) { ctx.fillStyle = "rgba(0,0,0,0.25)"; ctx.beginPath(); ctx.ellipse(x, y + r * 0.7, r * 0.9, r * 0.4, 0, 0, 6.28); ctx.fill(); }

function drawObstacle(o, w) {
  const x = o.x, y = o.y, ww = o.w, hh = o.h;
  // ground shadow
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath(); ctx.ellipse(x + ww / 2, y + hh - 4, ww * 0.55, hh * 0.22, 0, 0, 6.28); ctx.fill();
  if (w.deco === "grass") {
    // leafy bush: clustered blobs
    const base = "#3f8f55", dark = "#2f6f40", light = "#6fc07f";
    ctx.fillStyle = dark; roundRect(x, y + hh * 0.45, ww, hh * 0.5, 10); ctx.fill();
    const blobs = [[0.28, 0.42, 0.34], [0.62, 0.36, 0.4], [0.45, 0.62, 0.42], [0.78, 0.62, 0.3], [0.2, 0.66, 0.3]];
    for (const b of blobs) { ctx.fillStyle = base; ctx.beginPath(); ctx.arc(x + ww * b[0], y + hh * b[1], Math.min(ww, hh) * b[2], 0, 6.28); ctx.fill(); }
    ctx.fillStyle = light;
    ctx.beginPath(); ctx.arc(x + ww * 0.4, y + hh * 0.4, Math.min(ww, hh) * 0.18, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(x + ww * 0.66, y + hh * 0.5, Math.min(ww, hh) * 0.13, 0, 6.28); ctx.fill();
  } else if (w.deco === "rock") {
    // jagged boulder with crystal
    ctx.fillStyle = "#5a5060"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.1, y + hh); ctx.lineTo(x, y + hh * 0.45); ctx.lineTo(x + ww * 0.3, y + hh * 0.12);
    ctx.lineTo(x + ww * 0.72, y + hh * 0.05); ctx.lineTo(x + ww, y + hh * 0.5); ctx.lineTo(x + ww * 0.9, y + hh);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#6e6276"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.3, y + hh * 0.12); ctx.lineTo(x + ww * 0.72, y + hh * 0.05); ctx.lineTo(x + ww * 0.6, y + hh * 0.5);
    ctx.lineTo(x + ww * 0.28, y + hh * 0.55); ctx.closePath(); ctx.fill();
    // crystal accent
    ctx.fillStyle = "rgba(168,120,255,0.85)"; ctx.beginPath();
    ctx.moveTo(x + ww * 0.5, y + hh * 0.3); ctx.lineTo(x + ww * 0.58, y + hh * 0.58); ctx.lineTo(x + ww * 0.46, y + hh * 0.66);
    ctx.lineTo(x + ww * 0.4, y + hh * 0.42); ctx.closePath(); ctx.fill();
  } else {
    // snow-capped ice block
    ctx.fillStyle = "#7f99b3"; roundRect(x, y + hh * 0.25, ww, hh * 0.72, 8); ctx.fill();
    ctx.fillStyle = "#9fb8d2"; roundRect(x + 4, y + hh * 0.3, ww - 8, hh * 0.5, 6); ctx.fill();
    ctx.fillStyle = "#eaf4ff"; ctx.beginPath();
    ctx.moveTo(x, y + hh * 0.34); ctx.quadraticCurveTo(x + ww * 0.25, y + hh * 0.12, x + ww * 0.5, y + hh * 0.24);
    ctx.quadraticCurveTo(x + ww * 0.75, y + hh * 0.12, x + ww, y + hh * 0.34);
    ctx.lineTo(x + ww, y + hh * 0.44); ctx.quadraticCurveTo(x + ww * 0.5, y + hh * 0.3, x, y + hh * 0.44);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.35)"; roundRect(x + ww * 0.12, y + hh * 0.4, ww * 0.16, hh * 0.4, 4); ctx.fill();
  }
}

function drawPlayer() {
  const p = player;
  const bobY = Math.sin(p.bob) * 2;
  const x = p.x, y = p.y + bobY;
  drawShadow(p.x, p.y, p.r);
  // dash ghost
  if (p.dashing) { ctx.globalAlpha = 0.4; }
  const blink = p.invuln > 0 && Math.floor(p.invuln * 20) % 2 === 0;
  if (blink && !p.dashing) ctx.globalAlpha = 0.5;
  ctx.save();
  ctx.translate(x, y);
  const flip = Math.cos(p.facing) < 0 ? -1 : 1;
  ctx.scale(flip, 1);
  drawStarterBody(p.key, p.r, p.hurtFlash > 0);
  ctx.restore();
  ctx.globalAlpha = 1;

  // themed attack burst
  if (p.atkFx && p.atkFx.t > 0) drawAttackFx(p);
}

function drawAttackFx(p) {
  const fx = p.atkFx;
  const prog = 1 - clamp(fx.t / fx.dur, 0, 1); // 0..1
  const range = p.base.atkRange, arc = p.base.atkArc;
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(fx.dir);
  if (p.key === "charmander") {
    // FIRE — expanding flame cone
    const reach = range * (0.55 + prog * 0.55);
    const fade = 1 - prog;
    ctx.globalAlpha = 0.85 * fade;
    // outer cone
    const grad = ctx.createLinearGradient(0, 0, reach, 0);
    grad.addColorStop(0, "rgba(255,210,80,0.95)");
    grad.addColorStop(0.5, "rgba(255,120,40,0.9)");
    grad.addColorStop(1, "rgba(220,60,20,0.1)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.moveTo(0, 0);
    ctx.arc(0, 0, reach, -arc / 2, arc / 2); ctx.closePath(); ctx.fill();
    // flickering flame tongues
    ctx.globalAlpha = fade;
    for (let i = -2; i <= 2; i++) {
      const a = (i / 2) * (arc / 2) * 0.8;
      const fr = reach * (0.7 + Math.random() * 0.4);
      ctx.fillStyle = i % 2 ? "#ffd24d" : "#ff7a2a";
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * reach * 0.4, Math.sin(a) * reach * 0.4);
      ctx.quadraticCurveTo(Math.cos(a - 0.1) * fr, Math.sin(a - 0.1) * fr, Math.cos(a) * fr, Math.sin(a) * fr);
      ctx.quadraticCurveTo(Math.cos(a + 0.1) * fr, Math.sin(a + 0.1) * fr, Math.cos(a) * reach * 0.4, Math.sin(a) * reach * 0.4);
      ctx.fill();
    }
  } else if (p.key === "squirtle") {
    // WATER GUN — focused forward jet
    const reach = range * (0.4 + prog * 0.85);
    const fade = 1 - prog;
    ctx.globalAlpha = 0.9 * fade;
    const grad = ctx.createLinearGradient(0, 0, reach, 0);
    grad.addColorStop(0, "rgba(255,255,255,0.95)");
    grad.addColorStop(0.4, "rgba(120,200,240,0.9)");
    grad.addColorStop(1, "rgba(60,140,210,0.05)");
    ctx.fillStyle = grad;
    const halfW = 7 + prog * 4;
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.quadraticCurveTo(reach * 0.5, -halfW, reach, -halfW * 0.5);
    ctx.lineTo(reach, halfW * 0.5);
    ctx.quadraticCurveTo(reach * 0.5, halfW, 0, 6);
    ctx.closePath(); ctx.fill();
    // droplets at the tip
    for (let i = 0; i < 4; i++) {
      const a = rand(-0.25, 0.25);
      const rr = reach * rand(0.8, 1.05);
      ctx.fillStyle = "rgba(200,235,255,0.9)";
      ctx.beginPath(); ctx.arc(Math.cos(a) * rr, Math.sin(a) * rr, rand(2, 4), 0, 6.28); ctx.fill();
    }
  } else {
    // BULBASAUR — sweeping tail whip
    const fade = 1 - prog;
    const sweep = arc * 1.1;
    const ang = -sweep / 2 + sweep * prog; // sweeps across
    const reach = range * 0.95;
    ctx.globalAlpha = 0.85 * fade;
    // motion trail (a few fading arcs behind the sweep)
    for (let k = 0; k < 3; k++) {
      const pa = ang - k * 0.18 * p.swingDir;
      ctx.globalAlpha = (0.5 - k * 0.13) * fade;
      ctx.strokeStyle = k === 0 ? "#d8f2c8" : "#6fc28b";
      ctx.lineWidth = 6 - k * 1.5;
      ctx.beginPath(); ctx.arc(0, 0, reach * (0.7 + k * 0.05), pa - 0.5, pa + 0.5); ctx.stroke();
    }
    // the tail itself (a tapering green whip)
    ctx.globalAlpha = fade;
    ctx.strokeStyle = "#5aa86f"; ctx.lineWidth = 7; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(Math.cos(ang) * reach * 0.5, Math.sin(ang) * reach * 0.5,
                         Math.cos(ang) * reach, Math.sin(ang) * reach);
    ctx.stroke();
    // leafy tip
    ctx.fillStyle = "#7ec48f";
    ctx.beginPath(); ctx.ellipse(Math.cos(ang) * reach, Math.sin(ang) * reach, 9, 5, ang, 0, 6.28); ctx.fill();
    ctx.lineCap = "butt";
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawStarterBody(key, r, hurt) {
  const s = STARTERS[key];
  const body = hurt ? "#ffffff" : s.color;
  const belly = s.color2;
  // tail/back feature behind
  if (key === "charmander") {
    // tail with flame
    ctx.save();
    ctx.fillStyle = hurt ? "#fff" : "#e0702c";
    ctx.beginPath(); ctx.moveTo(-r * 0.6, r * 0.2); ctx.quadraticCurveTo(-r * 1.4, 0, -r * 1.3, -r * 0.6); ctx.lineTo(-r, -r * 0.4); ctx.quadraticCurveTo(-r * 0.9, 0, -r * 0.5, r * 0.4); ctx.closePath(); ctx.fill();
    // flame
    const fl = Math.sin(Date.now() / 90) * 2;
    ctx.fillStyle = "#ff6a2a"; ctx.beginPath(); ctx.moveTo(-r * 1.3, -r * 0.6); ctx.quadraticCurveTo(-r * 1.6, -r * 1.4 - fl, -r * 1.15, -r * 1.6 - fl); ctx.quadraticCurveTo(-r * 1.0, -r * 1.1, -r * 1.15, -r * 0.6); ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ffd24d"; ctx.beginPath(); ctx.ellipse(-r * 1.2, -r * 1.0 - fl, r * 0.12, r * 0.3, 0, 0, 6.28); ctx.fill();
    ctx.restore();
  } else if (key === "bulbasaur") {
    // bulb on back
    ctx.fillStyle = hurt ? "#fff" : "#5aa86f";
    ctx.beginPath(); ctx.ellipse(-r * 0.4, -r * 0.7, r * 0.7, r * 0.6, 0, 0, 6.28); ctx.fill();
    ctx.fillStyle = hurt ? "#fff" : "#7ec48f";
    ctx.beginPath(); ctx.ellipse(-r * 0.4, -r * 0.8, r * 0.4, r * 0.35, 0, 0, 6.28); ctx.fill();
  } else if (key === "squirtle") {
    // shell on back
    ctx.fillStyle = hurt ? "#fff" : "#b06a3c";
    ctx.beginPath(); ctx.ellipse(-r * 0.5, -r * 0.1, r * 0.6, r * 0.7, 0, 0, 6.28); ctx.fill();
    ctx.strokeStyle = "#8a4f2a"; ctx.lineWidth = 2; ctx.stroke();
  }
  // body
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.ellipse(0, 0, r * 0.85, r, 0, 0, 6.28); ctx.fill();
  // belly
  ctx.fillStyle = belly;
  ctx.beginPath(); ctx.ellipse(r * 0.15, r * 0.2, r * 0.5, r * 0.6, 0, 0, 6.28); ctx.fill();
  // head
  ctx.fillStyle = body;
  ctx.beginPath(); ctx.arc(r * 0.35, -r * 0.55, r * 0.62, 0, 6.28); ctx.fill();
  // eyes
  ctx.fillStyle = "#1a1a22";
  ctx.beginPath(); ctx.arc(r * 0.55, -r * 0.65, r * 0.13, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.15, -r * 0.7, r * 0.12, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(r * 0.59, -r * 0.69, r * 0.05, 0, 6.28); ctx.fill();
  // feet
  ctx.fillStyle = shade(s.color, 0.8);
  ctx.beginPath(); ctx.ellipse(-r * 0.2, r * 0.9, r * 0.25, r * 0.18, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(r * 0.4, r * 0.9, r * 0.25, r * 0.18, 0, 0, 6.28); ctx.fill();
}

function drawEnemy(e) {
  drawShadow(e.x, e.y, e.r);
  const bobY = Math.sin(e.bob) * 2;
  const x = e.x, y = e.y + bobY;
  const flash = e.hurtFlash > 0;
  ctx.save(); ctx.translate(x, y);
  if (e.boss) drawBoss(e, flash);
  else {
    // generic critter
    ctx.fillStyle = flash ? "#fff" : e.color;
    ctx.beginPath(); ctx.arc(0, 0, e.r, 0, 6.28); ctx.fill();
    ctx.fillStyle = flash ? "#fff" : e.color2;
    ctx.beginPath(); ctx.arc(0, e.r * 0.3, e.r * 0.6, 0, 6.28); ctx.fill();
    // eyes
    ctx.fillStyle = "#15151c";
    ctx.beginPath(); ctx.arc(-e.r * 0.3, -e.r * 0.2, e.r * 0.16, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(e.r * 0.3, -e.r * 0.2, e.r * 0.16, 0, 6.28); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(-e.r * 0.26, -e.r * 0.25, e.r * 0.06, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.arc(e.r * 0.34, -e.r * 0.25, e.r * 0.06, 0, 6.28); ctx.fill();
    // charger windup glow
    if (e.charging && e.chargeT > 0.2) { ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(0, 0, e.r + 4, 0, 6.28); ctx.stroke(); ctx.globalAlpha = 1; }
    if (e.burn > 0) { ctx.fillStyle = "rgba(255,120,40,0.5)"; ctx.beginPath(); ctx.arc(0, -e.r, 3, 0, 6.28); ctx.fill(); }
  }
  ctx.restore();
  // hp bar
  if (e.hp < e.maxHp && !e.boss) {
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2, 4);
    ctx.fillStyle = "#ff5d5d"; ctx.fillRect(e.x - e.r, e.y - e.r - 10, e.r * 2 * (e.hp / e.maxHp), 4);
  }
}

function drawBoss(e, flash) {
  const r = e.r;
  ctx.fillStyle = flash ? "#fff" : e.color;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.28); ctx.fill();
  ctx.fillStyle = flash ? "#fff" : e.color2;
  ctx.beginPath(); ctx.arc(0, r * 0.25, r * 0.7, 0, 6.28); ctx.fill();
  // spiky crown
  ctx.fillStyle = e.accent;
  for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2; ctx.beginPath(); ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r); ctx.lineTo(Math.cos(a) * (r + 12), Math.sin(a) * (r + 12)); ctx.lineTo(Math.cos(a + 0.2) * r, Math.sin(a + 0.2) * r); ctx.closePath(); ctx.fill(); }
  // eyes
  ctx.fillStyle = "#15151c";
  ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.15, r * 0.18, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.35, -r * 0.15, r * 0.18, 0, 6.28); ctx.fill();
  ctx.fillStyle = "#ff3a3a";
  ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.15, r * 0.08, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(r * 0.35, -r * 0.15, r * 0.08, 0, 6.28); ctx.fill();
}

function drawProjectile(pr) {
  ctx.save();
  if (pr.leaf) {
    ctx.translate(pr.x, pr.y); ctx.rotate(Math.atan2(pr.vy, pr.vx));
    ctx.fillStyle = pr.color; ctx.beginPath(); ctx.ellipse(0, 0, pr.r * 1.3, pr.r * 0.6, 0, 0, 6.28); ctx.fill();
  } else {
    const g = ctx.createRadialGradient(pr.x, pr.y, 0, pr.x, pr.y, pr.r);
    g.addColorStop(0, "#fff"); g.addColorStop(0.4, pr.color); g.addColorStop(1, shade(pr.color, 0.6));
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(pr.x, pr.y, pr.r, 0, 6.28); ctx.fill();
  }
  ctx.restore();
}

function drawPickup(pk) {
  const fl = Math.sin(Date.now() / 150 + pk.x) * 2;
  ctx.save(); ctx.translate(pk.x, pk.y + fl);
  ctx.fillStyle = "#ffd95e"; ctx.shadowColor = "#ffd95e"; ctx.shadowBlur = 8;
  // 4-point star
  ctx.beginPath();
  for (let i = 0; i < 8; i++) { const a = (i / 8) * Math.PI * 2; const rr = i % 2 === 0 ? pk.r : pk.r * 0.45; ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr); }
  ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0; ctx.restore();
}

function drawParticle(pt) {
  ctx.globalAlpha = clamp(pt.t * 2, 0, 1);
  ctx.fillStyle = pt.color;
  ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawGate(g) {
  const pulse = (Math.sin(g.glow * 4) + 1) / 2;
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(g.x - 2, g.y - g.h / 2, g.w + 4, g.h);
  // portal glow
  const grad = ctx.createLinearGradient(g.x, 0, g.x + g.w, 0);
  grad.addColorStop(0, shade(g.boon.color, 0.5)); grad.addColorStop(1, g.boon.color);
  ctx.fillStyle = grad; ctx.fillRect(g.x, g.y - g.h / 2, g.w, g.h);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2 + pulse * 2; ctx.globalAlpha = 0.6 + pulse * 0.4;
  ctx.strokeRect(g.x, g.y - g.h / 2, g.w, g.h);
  ctx.globalAlpha = 1;
  // icon
  ctx.fillStyle = "#fff"; ctx.font = "22px " + FONT; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(g.boon.icon, g.x + g.w / 2, g.y - 18);
  // label box pointing left
  ctx.font = "16px " + FONT; ctx.textAlign = "right";
  const tw = ctx.measureText(g.boon.name).width;
  ctx.fillStyle = "rgba(10,10,18,0.85)"; ctx.fillRect(g.x - tw - 16, g.y - 14, tw + 12, 44);
  ctx.fillStyle = g.boon.color; ctx.fillText(g.boon.name, g.x - 8, g.y);
  ctx.fillStyle = "#cfd6e0"; ctx.font = "13px " + FONT;
  wrapTextRight(g.boon.desc, g.x - 8, g.y + 16, tw + 4);
  ctx.restore();
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}
function wrapTextRight(text, x, y, maxw) { ctx.textAlign = "right"; ctx.fillText(text, x, y); }

function drawFloater(f) {
  ctx.globalAlpha = clamp(f.t * 1.6, 0, 1);
  ctx.font = (f.big ? 22 : 18) + "px " + FONT;
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText(f.text, f.x + 1, f.y + 1);

// ---- HUD ----
function drawHUD() {
  const p = player;
  // top-left HP
  ctx.font = "20px " + FONT; ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  const hpW = 240, hpH = 22, hx = 24, hy = 22;
  ctx.fillStyle = "rgba(0,0,0,0.55)"; roundRect(hx - 4, hy - 4, hpW + 8, hpH + 8, 6); ctx.fill();
  ctx.fillStyle = "#3a1820"; roundRect(hx, hy, hpW, hpH, 4); ctx.fill();
  const frac = clamp(p.hp / p.maxHp(), 0, 1);
  const hg = ctx.createLinearGradient(hx, 0, hx + hpW, 0);
  hg.addColorStop(0, "#ff5d7a"); hg.addColorStop(1, "#ff9aae");
  ctx.fillStyle = hg; roundRect(hx, hy, hpW * frac, hpH, 4); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = "18px " + FONT; ctx.textAlign = "center";
  ctx.fillText("HP " + Math.max(0, Math.ceil(p.hp)) + " / " + p.maxHp(), hx + hpW / 2, hy + 16);
  ctx.textAlign = "left";

  // revives
  if (p.revives > 0) { ctx.fillStyle = "#7df0a0"; ctx.font = "18px " + FONT; ctx.fillText("✚".repeat(p.revives), hx + hpW + 16, hy + 16); }

  // cooldown pips (special & dash) bottom-left, desktop only show keys
  const cy = VH - 40;
  drawCdPip(24, cy, "K", "SPECIAL", 1 - clamp(p.spTimer / p.base.spCd, 0, 1), p.s.accent);
  drawCdPip(150, cy, "SPACE", "DASH", 1 - clamp(p.dashCdTimer / p.dashCooldown(), 0, 1), "#b69cff");
  drawCdPip(300, cy, "J", "ATTACK", 1, "#ffd27a");

  // top-right: world / room / stardust
  ctx.textAlign = "right"; ctx.font = "20px " + FONT; ctx.fillStyle = "#fff";
  const w = WORLDS[run.world];
  const roomLabel = run.room >= run.roomsInWorld ? "BOSS" : ("Room " + (run.room + 1) + "/" + run.roomsInWorld);
  ctx.fillStyle = "rgba(0,0,0,0.5)"; roundRect(VW - 250, 18, 226, 54, 6); ctx.fill();
  ctx.fillStyle = w.accent; ctx.font = "16px " + FONT; ctx.fillText("WORLD " + (run.world + 1) + " · " + w.short, VW - 34, 40);
  ctx.fillStyle = "#fff"; ctx.fillText(roomLabel, VW - 34, 60);
  ctx.fillStyle = "#ffd95e"; ctx.fillText("✦ " + run.stardust, VW - 150, 60);
  ctx.textAlign = "left";

  // boons strip (top center)
  let bx = VW / 2 - (p.boons.length * 16);
  for (const b of p.boons) {
    ctx.fillStyle = b.color; ctx.font = "18px " + FONT; ctx.textAlign = "center";
    ctx.fillText(b.icon, bx, 36); bx += 32;
  }
  ctx.textAlign = "left";

  // boss hp bar
  const boss = enemies.find(e => e.boss);
  if (boss) {
    const bw = 560, bh = 20, bxx = VW / 2 - bw / 2, byy = VH - 30;
    ctx.fillStyle = "rgba(0,0,0,0.6)"; roundRect(bxx - 4, byy - 22, bw + 8, bh + 24, 6); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "16px " + FONT; ctx.textAlign = "center"; ctx.fillText("⚠ " + boss.name, VW / 2, byy - 6);
    ctx.fillStyle = "#2a0c10"; roundRect(bxx, byy, bw, bh, 4); ctx.fill();
    const bf = clamp(boss.hp / boss.maxHp, 0, 1);
    const bg = ctx.createLinearGradient(bxx, 0, bxx + bw, 0); bg.addColorStop(0, "#ff3a3a"); bg.addColorStop(1, "#ff7a4d");
    ctx.fillStyle = bg; roundRect(bxx, byy, bw * bf, bh, 4); ctx.fill();
    ctx.textAlign = "left";
  }

  // hint when cleared
  if (run.cleared && gates.length > 0) {
    ctx.fillStyle = "#fff"; ctx.font = "18px " + FONT; ctx.textAlign = "center";
    ctx.fillText("→ Walk into a gate to choose a power-up", VW / 2, VH - 56);
    ctx.textAlign = "left";
  }
}

function drawCdPip(x, y, key, label, ready, color) {
  if (isTouch) return; // mobile has on-screen buttons
  ctx.fillStyle = "rgba(0,0,0,0.5)"; roundRect(x, y, 110, 30, 5); ctx.fill();
  ctx.fillStyle = ready >= 1 ? color : "rgba(255,255,255,0.2)";
  roundRect(x, y, 110 * ready, 30, 5); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = "15px " + FONT; ctx.textAlign = "left";
  ctx.fillText("[" + key + "] " + label, x + 8, y + 20);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
}

function drawFlash() {
  const a = clamp(flashMsg.t * 1.5, 0, 1);
  ctx.globalAlpha = a;
  ctx.font = "30px " + FONTH; ctx.textAlign = "center";
  ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillText(flashMsg.text, VW / 2 + 2, VH / 2 - 80 + 2);
  ctx.fillStyle = flashMsg.color; ctx.fillText(flashMsg.text, VW / 2, VH / 2 - 80);
  ctx.globalAlpha = 1; ctx.textAlign = "left";
}

// ---- Touch controls ----
function drawTouchControls() {
  // joystick base bottom-left
  const jb = touchJoyBase();
  ctx.globalAlpha = 0.25; ctx.fillStyle = "#ffffff";
  ctx.beginPath(); ctx.arc(jb.x, jb.y, jb.r, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 0.5;
  let kx = jb.x, ky = jb.y;
  if (touch.move.active) { kx = jb.x + touch.move.dx * jb.r * 0.6; ky = jb.y + touch.move.dy * jb.r * 0.6; }
  ctx.beginPath(); ctx.arc(kx, ky, jb.r * 0.45, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1;
  // buttons
  const bs = touchBtns();
  drawTouchBtn(bs.attack, "J", "#ffd27a", player && player.atkTimer <= 0);
  drawTouchBtn(bs.special, "K", player ? player.s.accent : "#fff", player && player.spTimer <= 0);
  drawTouchBtn(bs.dash, "⤢", "#b69cff", player && player.dashCdTimer <= 0);
}
function touchJoyBase() { return { x: 110, y: VH - 110, r: 70 }; }
function touchBtns() {
  return {
    attack: { x: VW - 90, y: VH - 90, r: 46 },
    special: { x: VW - 190, y: VH - 120, r: 40 },
    dash: { x: VW - 150, y: VH - 210, r: 40 },
  };
}
function drawTouchBtn(b, label, color, ready) {
  ctx.globalAlpha = ready ? 0.55 : 0.25; ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.28); ctx.fill();
  ctx.globalAlpha = 1; ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.28); ctx.stroke();
  ctx.fillStyle = "#fff"; ctx.font = (b.r * 0.7) + "px " + FONT; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(label, b.x, b.y + 2);
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
}

function wrapText(text, x, y, maxw, lh) {
  const words = text.split(" "); let line = "", yy = y;
  for (const w of words) {
    const test = line + w + " ";
    if (ctx.measureText(test).width > maxw && line) { ctx.fillText(line, x, yy); line = w + " "; yy += lh; }
    else line = test;
  }
  ctx.fillText(line, x, yy);
}

  ctx.font = "48px " + FONTH;
  const tg = ctx.createLinearGradient(VW / 2 - 200, 0, VW / 2 + 200, 0);
  tg.addColorStop(0, "#ff7a45"); tg.addColorStop(0.5, "#ffd23f"); tg.addColorStop(1, "#56b0e0");
  ctx.fillStyle = tg; ctx.fillText("VICTORY!", VW / 2, ty);
  ctx.font = "20px " + FONT; ctx.fillStyle = "#fff";
  ctx.fillText("You conquered all three worlds with " + STARTERS[player.key].name + "!", VW / 2, ty + 46);
  ctx.fillText("Enemies defeated: " + run.kills, VW / 2, ty + 74);
  ctx.fillStyle = "#ffd95e"; ctx.font = "26px " + FONT;
  ctx.fillText("✦ " + run.earned + " Stardust banked", VW / 2, ty + 120);
  ctx.fillStyle = "#9fb3c8"; ctx.font = "16px " + FONT;
  ctx.fillText("Try a tougher run with a new partner — difficulty & gear carry forward.", VW / 2, ty + 150);
  const bw = 280, bh = 54, bx = VW / 2 - bw / 2, by = ty + 190;
  ctx.fillStyle = "#ffd23f"; roundRect(bx, by, bw, bh, 10); ctx.fill();
  ctx.fillStyle = "#1a2a3f"; ctx.font = "20px " + FONTH; ctx.fillText("BASE CAMP", VW / 2, by + 35);
  addBtn(bx, by, bw, bh, "hub", () => { state = STATE.HUB; });
  ctx.textAlign = "left";
}

// ----------------------------------------------------------------------------
// Pointer (mouse + touch) handling
// ----------------------------------------------------------------------------
function pointerDown(clientX, clientY, id) {
  Audio2.resume();
  const v = vcoords(clientX, clientY);
  // menu states use buttons
  if (state === STATE.TITLE || state === STATE.HUB || state === STATE.DEAD || state === STATE.WIN || state === STATE.PAUSE) {
    hitButtons(v.x, v.y);
    return;
  }
  if (state === STATE.PLAY) {
    if (isTouch) {
      const jb = touchJoyBase();
      // joystick zone: left half
      if (v.x < VW / 2) {
        touch.move.active = true; touch.move.id = id; touch.move.ox = jb.x; touch.move.oy = jb.y;
        updateJoy(v.x, v.y);
        return;
      }
      // buttons
      const bs = touchBtns();
      if (dist(v.x, v.y, bs.attack.x, bs.attack.y) < bs.attack.r) { touchEdge.attack = true; touch._atkId = id; return; }
      if (dist(v.x, v.y, bs.special.x, bs.special.y) < bs.special.r) { touchEdge.special = true; return; }
      if (dist(v.x, v.y, bs.dash.x, bs.dash.y) < bs.dash.r) { touchEdge.dash = true; return; }
      // pause via top-right corner tap
      if (v.x > VW - 60 && v.y < 60) { prevState = state; state = STATE.PAUSE; }
    } else {
      // desktop pause button area (top-right small) — clicking does nothing else
    }
  }
}
function updateJoy(vx, vy) {
  const jb = touchJoyBase();
  let dx = vx - jb.x, dy = vy - jb.y;
  const m = Math.hypot(dx, dy);
  const dead = 8;
  if (m < dead) { touch.move.dx = 0; touch.move.dy = 0; }
  else { touch.move.dx = dx / m; touch.move.dy = dy / m; }
}
function pointerMove(clientX, clientY, id) {
  if (state === STATE.PLAY && touch.move.active && (touch.move.id === id || id === undefined)) {
    const v = vcoords(clientX, clientY);
    updateJoy(v.x, v.y);
  }
}
function pointerUp(id) {
  if (touch.move.id === id) { touch.move.active = false; touch.move.dx = 0; touch.move.dy = 0; touch.move.id = null; }
}

// mouse
canvas.addEventListener("mousedown", (e) => { pointerDown(e.clientX, e.clientY, "mouse"); });
canvas.addEventListener("mousemove", (e) => { pointerMove(e.clientX, e.clientY, "mouse"); });
window.addEventListener("mouseup", () => { pointerUp("mouse"); });
// touch
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerDown(t.clientX, t.clientY, t.identifier); }, { passive: false });
canvas.addEventListener("touchmove", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerMove(t.clientX, t.clientY, t.identifier); }, { passive: false });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); for (const t of e.changedTouches) pointerUp(t.identifier); }, { passive: false });
canvas.addEventListener("touchcancel", (e) => { for (const t of e.changedTouches) pointerUp(t.identifier); });

// mute toggle (M)
window.addEventListener("keydown", (e) => { if (e.key.toLowerCase() === "m") Audio2.toggleMute(); });

// pause toggle (Esc / P)
window.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();
  if (k === "escape" || k === "p") {
    if (state === STATE.PLAY) { prevState = state; state = STATE.PAUSE; }
    else if (state === STATE.PAUSE) { state = STATE.PLAY; }
  }
});

// ----------------------------------------------------------------------------
// Main loop
// ----------------------------------------------------------------------------
let last = performance.now();
function loop(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.05) dt = 0.05; // clamp big frame gaps
  update(dt * timeScale);
  ctx.clearRect(0, 0, VW, VH);
  render();
  // clear keyboard edges if not consumed by play update
  if (state !== STATE.PLAY) { for (const k in justPressed) justPressed[k] = false; touchEdge.attack = touchEdge.special = touchEdge.dash = false; }
  requestAnimationFrame(loop);
}

// ----------------------------------------------------------------------------
// Boot
// ----------------------------------------------------------------------------
async function boot() {
  const saved = await Persist.load("pokerogue_meta", null);
  if (saved) meta = Object.assign(meta, saved);
  const defUp = { tough: 0, power: 0, focus: 0, agility: 0, fortune: 0, resolve: 0, headstart: 0 };
  meta.upgrades = Object.assign(defUp, (saved && saved.upgrades) || {});
  resize();
  requestAnimationFrame(loop);
}
window.addEventListener("load", () => { resize(); });
boot();

// Lightweight debug handle (harmless; used for automated smoke tests)
if (typeof window !== "undefined") {
  window.__pr = {
    get state() { return state; },
    get run() { return run; },
    get player() { return player; },
    get enemies() { return enemies; },
    get obstacles() { return obstacles; },
    get meta() { return meta; },
    startRun: () => startRun(),
    killAll: () => { for (const e of enemies.slice()) killEnemy(e); pickups = []; },
    takeFirstGate: () => { if (gates[0]) takeGate(gates[0].boon); },
    hurtSelf: (n) => hurtPlayer(n),
  };
}

})();

</script>
